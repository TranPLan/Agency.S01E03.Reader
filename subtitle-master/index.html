es":[{"start":3328.46782,"end":3336.246521}]},{"id":526,"readerNo":527,"displayNo":833,"n":833,"kind":"sub","type":"merged","vi":"Anh không thiếu thời gian, mà thiếu nhân cách nên mới không có bạn.\nNày, cậu có bỏ cái thói ăn nói hỗn…","ko":"[한나] 시간이 아니라 인성이 부족해서\n- [흥미로운 음악] - 친구가 없는 거겠지?\n[서정] 야, 강한나 너 말 자꾸 개같…","en":"You lack character, not time.\nHey, stop talking like a little--","text":"Anh không thiếu thời gian, mà thiếu nhân cách nên mới không có bạn.\nNày, cậu có bỏ cái thói ăn nói hỗn…\n[한나] 시간이 아니라 인성이 부족해서\n- [흥미로운 음악] - 친구가 없는 거겠지?\n[서정] 야, 강한나 너 말 자꾸 개같…\nYou lack character, not time.\nHey, stop talking like a little--","sourceUid":"merged-mrar17nk-131","sourceNo":833,"viRanges":[{"start":3223.96714,"end":3233.905112}],"koRanges":[{"start":3336.246521,"end":3344.954976}]},{"id":527,"readerNo":528,"displayNo":836,"n":836,"kind":"sub","type":"merged","vi":"Ôi, con xin lỗi.\nTôi không có gì phải bận tâm đến chuyện hai đứa nhỏ kết hôn.","ko":"- [서정] 죄송합니다 - [우원의 웃음]\n[우원] 아, 이거\n결혼할 당사자 사이는 걱정이 안 되는데","en":"I apologize.\nI'm not worried about these two getting married.","text":"Ôi, con xin lỗi.\nTôi không có gì phải bận tâm đến chuyện hai đứa nhỏ kết hôn.\n- [서정] 죄송합니다 - [우원의 웃음]\n[우원] 아, 이거\n결혼할 당사자 사이는 걱정이 안 되는데\nI apologize.\nI'm not worried about these two getting married.","sourceUid":"merged-mrar2rmm-132","sourceNo":836,"viRanges":[{"start":3233.905112,"end":3247.314422}],"koRanges":[{"start":3344.954976,"end":3359.345558}]},{"id":528,"readerNo":529,"displayNo":841,"n":841,"kind":"sub","type":"merged","vi":"Nhưng với sui gia thì hơi đáng ngại đó.\nHai đứa nó học cùng cấp một và cấp hai mà.\n- Chung cả trường đại học nữa nhỉ? - Khác đấy ạ.\nMay là tụi cháu được chọn trường đại học.","ko":"이 시누이 사이가 걱정이 됩니다\n초중고 동창이었잖습니까\n[용호] 씁, 대학도 같은 데인가?\n대학은 다른데\n대학이야 원하는 데로 골라서 가니까요","en":"But I'm quite worried about the in-law.\nThey went to the same primary and secondary school.\n-Was it also the same university? -No, different ones.\nThankfully, we get to choose universities.","text":"Nhưng với sui gia thì hơi đáng ngại đó.\nHai đứa nó học cùng cấp một và cấp hai mà.\n- Chung cả trường đại học nữa nhỉ? - Khác đấy ạ.\nMay là tụi cháu được chọn trường đại học.\n이 시누이 사이가 걱정이 됩니다\n초중고 동창이었잖습니까\n[용호] 씁, 대학도 같은 데인가?\n대학은 다른데\n대학이야 원하는 데로 골라서 가니까요\nBut I'm quite worried about the in-law.\nThey went to the same primary and secondary school.\n-Was it also the same university? -No, different ones.\nThankfully, we get to choose universities.","sourceUid":"merged-mrar4lue-134","sourceNo":841,"viRanges":[{"start":3247.314422,"end":3257.992717}],"koRanges":[{"start":3359.345558,"end":3369.928052}]},{"id":529,"readerNo":530,"displayNo":734,"n":734,"kind":"sub","type":"merged","vi":"Cậu đâu có được chọn. Điểm thấp quá mà.\nCòn cậu thì sao?\nThôi nào, hai đứa.\nTụi nó quen nhau, lại còn giống nhau nên mới cãi nhau được.\nCứ cãi nhau tiếp đi.","ko":"네가 원하는 데로 갔냐? 점수 맞춰 갔지\n씨, 그러는 너는\n- [용호] 씁, 어허, 좀 - [근철의 말리는 소리]\n[근철] 아니까 싸우지 급이 맞으니까 싸우고\n계속 싸우라우","en":"You didn't get to choose. You had poor grades.\nWhat about you?\nEnough.\nThey squabble because they know each other and are similar.\nKeep the argument going.","text":"Cậu đâu có được chọn. Điểm thấp quá mà.\nCòn cậu thì sao?\nThôi nào, hai đứa.\nTụi nó quen nhau, lại còn giống nhau nên mới cãi nhau được.\nCứ cãi nhau tiếp đi.\n네가 원하는 데로 갔냐? 점수 맞춰 갔지\n씨, 그러는 너는\n- [용호] 씁, 어허, 좀 - [근철의 말리는 소리]\n[근철] 아니까 싸우지 급이 맞으니까 싸우고\n계속 싸우라우\nYou didn't get to choose. You had poor grades.\nWhat about you?\nEnough.\nThey squabble because they know each other and are similar.\nKeep the argument going.","sourceUid":"merged-mrar7266-137","sourceNo":734,"viRanges":[{"start":3257.992717,"end":3269.794259}],"koRanges":[{"start":3369.928052,"end":3381.758619}]},{"id":530,"readerNo":531,"displayNo":848,"n":848,"kind":"sub","type":"ko","vi":"[Mọi người cười]","ko":"[사람들의 웃음]","en":"[People laughing]","text":"[Mọi người cười]\n[사람들의 웃음]\n[People laughing]","sourceUid":"ko-mr905eaf-1719","sourceNo":848,"viRanges":[],"koRanges":[]},{"id":531,"readerNo":532,"displayNo":741,"n":741,"kind":"sub","type":"merged","vi":"Bên nào thắng là ông bênh.\nCháu đích tôn.\nVâng?\nCháu ăn nhiều vào mà chiến đấu.\nVâng ạ.\nKhi nào chúng ta nên tổ chức hôn lễ?","ko":"이기는 편 우리 편이야\n장손\n네\n많이 먹어, 싸우려면\n[용호] 결혼식은 언제로 잡을까요?","en":"I'll be on the winner's team.\nHan-su.\nYes?\nYou should eat up for the fight.\nYes, sir.\nWhen should they get married?","text":"Bên nào thắng là ông bênh.\nCháu đích tôn.\nVâng?\nCháu ăn nhiều vào mà chiến đấu.\nVâng ạ.\nKhi nào chúng ta nên tổ chức hôn lễ?\n이기는 편 우리 편이야\n장손\n네\n많이 먹어, 싸우려면\n[용호] 결혼식은 언제로 잡을까요?\nI'll be on the winner's team.\nHan-su.\nYes?\nYou should eat up for the fight.\nYes, sir.\nWhen should they get married?","sourceUid":"merged-mrar8ev0-139","sourceNo":741,"viRanges":[{"start":3269.794259,"end":3295.504554}],"koRanges":[{"start":3381.758619,"end":3408.02809}]},{"id":532,"readerNo":533,"displayNo":858,"n":858,"kind":"sub","type":"merged","vi":"Càng sớm càng tốt.\nTôi đồng ý.\nVới số cổ phần ông nắm giữ ở công ty tôi,\nmong ông sẽ hỗ trợ tôi.\nCòn số cổ phần ông nắm giữ ở công ty tôi,\nông cũng hãy hỗ trợ tôi nhé.\nTất nhiên rồi.","ko":"[우원] 아, 빨리 합쳐야죠\n[용호] 그렇죠?\n우원 회장님이 가진 저희 회사 지분으로\n제 편에 서 주시고\n강 회장님이 가지신 저희 회사 지분으로\n제 편에 서 주시면\n- 아, 예 [웃음] - [우원의 웃음]","en":"As soon as possible. I agree. With the shares you hold in our company, you can support me. And with the shares you hold in our company, you can support me as well. Of course.","text":"Càng sớm càng tốt.\nTôi đồng ý.\nVới số cổ phần ông nắm giữ ở công ty tôi,\nmong ông sẽ hỗ trợ tôi.\nCòn số cổ phần ông nắm giữ ở công ty tôi,\nông cũng hãy hỗ trợ tôi nhé.\nTất nhiên rồi.\n[우원] 아, 빨리 합쳐야죠\n[용호] 그렇죠?\n우원 회장님이 가진 저희 회사 지분으로\n제 편에 서 주시고\n강 회장님이 가지신 저희 회사 지분으로\n제 편에 서 주시면\n- 아, 예 [웃음] - [우원의 웃음]\nAs soon as possible. I agree. With the shares you hold in our company, you can support me. And with the shares you hold in our company, you can support me as well. Of course.","sourceUid":"merged-mrargszf-145","sourceNo":858,"viRanges":[{"start":3295.504554,"end":3309.96888}],"koRanges":[{"start":3408.02809,"end":3421.624053}]},{"id":533,"readerNo":534,"displayNo":861,"n":861,"kind":"sub","type":"merged","vi":"Có nhiều người cản trở việc vận hành công ty của tôi quá.","ko":"[용호] 아, 자꾸 이 경영에 간섭하는 것들이 많아서","en":"There are so many people that hinder me from running the company.","text":"Có nhiều người cản trở việc vận hành công ty của tôi quá.\n[용호] 아, 자꾸 이 경영에 간섭하는 것들이 많아서\nThere are so many people that hinder me from running the company.","sourceUid":"merged-mrargomm-144","sourceNo":861,"viRanges":[{"start":3309.96888,"end":3313.483601}],"koRanges":[{"start":3421.624053,"end":3426.105516}]},{"id":534,"readerNo":535,"displayNo":"N200","n":"N200","kind":"narration","type":"narration","vi":"S#50 Han-Na Bên ngoài nhà (đêm)","ko":"S#50 한나 집 밖(밤)","en":"S#50 Han-Na Outside the house (night)","text":"S#50 Han-Na Bên ngoài nhà (đêm)\nS#50 한나 집 밖(밤)\nS#50 Han-Na Outside the house (night)","sourceUid":"nar-mrc51ak7-snx2c5","sourceNo":"N200","viRanges":[],"koRanges":[]},{"id":535,"readerNo":536,"displayNo":863,"n":863,"kind":"sub","type":"ko","vi":"[âm nhạc đen tối]","ko":"[어두운 음악]","en":"[dark music]","text":"[âm nhạc đen tối]\n[어두운 음악]\n[dark music]","sourceUid":"ko-mr905eaf-1734","sourceNo":863,"viRanges":[],"koRanges":[]},{"id":536,"readerNo":537,"displayNo":"N201","n":"N201","kind":"narration","type":"narration","vi":"Các công tố viên đang tập trung bên ngoài một ngôi nhà sang trọng dành cho một gia đình và công tố viên (Kang Woo-seok/nam, 38 tuổi) rung chuông và chờ đợi. Gia đình chủ tịch Woowon và gia đình Han-Na xuất hiện.","ko":"고급 단독주택 밖에 검찰이 몰려와있고, 검사(강우석/남/38세) 벨 누르고 대기. 우원 회장 가족과 한나네 가족이 나온다.","en":"Prosecutors are gathered outside a luxury single-family home, and prosecutor (Kang Woo-seok/male, 38 years old) rings the bell and waits. Chairman Woowon's family and the Han-Na family appear.","text":"Các công tố viên đang tập trung bên ngoài một ngôi nhà sang trọng dành cho một gia đình và công tố viên (Kang Woo-seok/nam, 38 tuổi) rung chuông và chờ đợi. Gia đình chủ tịch Woowon và gia đình Han-Na xuất hiện.\n고급 단독주택 밖에 검찰이 몰려와있고, 검사(강우석/남/38세) 벨 누르고 대기. 우원 회장 가족과 한나네 가족이 나온다.\nProsecutors are gathered outside a luxury single-family home, and prosecutor (Kang Woo-seok/male, 38 years old) rings the bell and waits. Chairman Woowon's family and the Han-Na family appear.","sourceUid":"nar-mrc51hkf-7hnym4","sourceNo":"N201","viRanges":[],"koRanges":[]},{"id":537,"readerNo":538,"displayNo":"N202","n":"N202","kind":"narration","type":"dialogue","vi":"검사: (cúi đầu 90 độ) Chủ tịch Kim Woo-won. Đây là Công tố viên Kim Woo-seok thuộc Phòng Công tố Đặc biệt Quận 1. (Giữ lệnh) Lệnh đã được ban hành vì vi phạm Đạo luật Giao dịch Ngoại hối. Chúng ta hãy đi cùng nhau.","ko":"검사:    (90도로 인사하고) 김우원 회장님. 중앙지검 특수1부 김우석 검사입니다. (영장 내밀며) 외환거래법 위반으로 영장 발부됐습니다. 같이 가시죠.","en":"검사: (bowing at 90 degrees) Chairman Kim Woo-won. This is Prosecutor Kim Woo-seok of the Central District Prosecutors' Office Special Division 1. (Holding out a warrant) A warrant has been issued for violating the Foreign Exchange Transactions Act. Let's go together.","text":"검사: (cúi đầu 90 độ) Chủ tịch Kim Woo-won. Đây là Công tố viên Kim Woo-seok thuộc Phòng Công tố Đặc biệt Quận 1. (Giữ lệnh) Lệnh đã được ban hành vì vi phạm Đạo luật Giao dịch Ngoại hối. Chúng ta hãy đi cùng nhau.\n검사:    (90도로 인사하고) 김우원 회장님. 중앙지검 특수1부 김우석 검사입니다. (영장 내밀며) 외환거래법 위반으로 영장 발부됐습니다. 같이 가시죠.\n검사: (bowing at 90 degrees) Chairman Kim Woo-won. This is Prosecutor Kim Woo-seok of the Central District Prosecutors' Office Special Division 1. (Holding out a warrant) A warrant has been issued for violating the Foreign Exchange Transactions Act. Let's go together.","sourceUid":"nar-mrc51kbv-kj4pso","sourceNo":"N202","viRanges":[],"koRanges":[]},{"id":538,"readerNo":539,"displayNo":866,"n":866,"kind":"sub","type":"merged","vi":"Thưa Chủ tịch.\nSao?\nỞ đây sao?\nLỆNH BẮT GIỮ\nÔng đã vi phạm Luật Giao dịch Ngoại hối.","ko":"[비서] 회장님\n뭐?\n여기로?\n[김 검사] 외국환 거래법 위반으로 영장 발부됐습니다","en":"Sir.\nWhat?\nHere?\nARREST WARRANT\nYou have violated the Foreign Exchange Transactions Act.","text":"Thưa Chủ tịch.\nSao?\nỞ đây sao?\nLỆNH BẮT GIỮ\nÔng đã vi phạm Luật Giao dịch Ngoại hối.\n[비서] 회장님\n뭐?\n여기로?\n[김 검사] 외국환 거래법 위반으로 영장 발부됐습니다\nSir.\nWhat?\nHere?\nARREST WARRANT\nYou have violated the Foreign Exchange Transactions Act.","sourceUid":"merged-mrari55h-146","sourceNo":866,"viRanges":[{"start":3313.483601,"end":3329.001776}],"koRanges":[{"start":3426.105516,"end":3440.93921}]},{"id":539,"readerNo":540,"displayNo":869,"n":869,"kind":"sub","type":"merged","vi":"Mời ông đi theo chúng tôi.\nCác anh có nhất định phải đến vào giờ này,\nvà đến tận đây không?","ko":"같이 가시죠\n[우원] 굳이 이 시간에\n여기로 왔다?","en":"Please come with us.\nDid you have to come at this hour\nto this place?","text":"Mời ông đi theo chúng tôi.\nCác anh có nhất định phải đến vào giờ này,\nvà đến tận đây không?\n같이 가시죠\n[우원] 굳이 이 시간에\n여기로 왔다?\nPlease come with us.\nDid you have to come at this hour\nto this place?","sourceUid":"merged-mrarki2o-147","sourceNo":869,"viRanges":[{"start":3329.001776,"end":3337.360975}],"koRanges":[{"start":3440.93921,"end":3449.228748}]},{"id":540,"readerNo":541,"displayNo":761,"n":761,"kind":"sub","type":"merged","vi":"Các anh đang cố làm bẽ mặt tôi đấy à?\nThực thi công vụ\nthì đâu bị giới hạn giờ giấc và địa điểm.\nTôi nghĩ tạm thời ông nên đi, Chủ tịch.","ko":"대놓고 망신 주겠다 이거야?\n공무 집행에 시간과 장소가 따로 있습니까?\n일단은 가셔야 될 거 같습니다 회장님","en":"Are you trying to humiliate me?\nCarrying out an official duty\nisn't constrained by time and place.\nI think you should go for now, sir.","text":"Các anh đang cố làm bẽ mặt tôi đấy à?\nThực thi công vụ\nthì đâu bị giới hạn giờ giấc và địa điểm.\nTôi nghĩ tạm thời ông nên đi, Chủ tịch.\n대놓고 망신 주겠다 이거야?\n공무 집행에 시간과 장소가 따로 있습니까?\n일단은 가셔야 될 거 같습니다 회장님\nAre you trying to humiliate me?\nCarrying out an official duty\nisn't constrained by time and place.\nI think you should go for now, sir.","sourceUid":"merged-mrarlzva-149","sourceNo":761,"viRanges":[{"start":3337.360975,"end":3354.97172}],"koRanges":[{"start":3449.228748,"end":3467.755369}]},{"id":541,"readerNo":542,"displayNo":875,"n":875,"kind":"sub","type":"merged","vi":"Tôi xin lỗi vì đã gây ồn ào.\nChắc ông sẽ vất vả lắm đây.\nChúng tôi cũng sẽ giúp bằng mọi giá.\nCảm ơn ông.","ko":"[우원] 시끄럽게 해서 죄송합니다\n골치 좀 썩으시겠네요\n[용호] 저희 쪽에서도 도울 일 있으면 돕겠습니다","en":"I'm sorry for all the commotion.\nThis must be hard for you.\nWe'll help however we can.\nThank you.","text":"Tôi xin lỗi vì đã gây ồn ào.\nChắc ông sẽ vất vả lắm đây.\nChúng tôi cũng sẽ giúp bằng mọi giá.\nCảm ơn ông.\n[우원] 시끄럽게 해서 죄송합니다\n골치 좀 썩으시겠네요\n[용호] 저희 쪽에서도 도울 일 있으면 돕겠습니다\nI'm sorry for all the commotion.\nThis must be hard for you.\nWe'll help however we can.\nThank you.","sourceUid":"merged-mraro5w6-151","sourceNo":875,"viRanges":[{"start":3354.97172,"end":3366.692008}],"koRanges":[{"start":3467.755369,"end":3479.403079}]},{"id":542,"readerNo":543,"displayNo":774,"n":774,"kind":"sub","type":"vi","vi":"VĂN PHÒNG GIÁM ĐỐC DỰ ÁN","ko":"","en":"","text":"VĂN PHÒNG GIÁM ĐỐC DỰ ÁN","sourceUid":"vi-mr905aah-774","sourceNo":774,"viRanges":[],"koRanges":[]},{"id":543,"readerNo":544,"displayNo":876,"n":876,"kind":"sub","type":"merged","vi":"Anh định thế nào đây?","ko":"[임원1] 어쩌실 거예요?","en":"What will you do?","text":"Anh định thế nào đây?\n[임원1] 어쩌실 거예요?\nWhat will you do?","sourceUid":"merged-mrarot3h-152","sourceNo":876,"viRanges":[{"start":3384,"end":3386.342}],"koRanges":[{"start":3495,"end":3497.904909}]},{"id":544,"readerNo":545,"displayNo":879,"n":879,"kind":"sub","type":"merged","vi":"Anh biết Giám đốc Go vốn không dễ khuất phục mà.\nTrời ạ, tôi xấu hổ không dám nhìn mặt hậu bối luôn.\nSau này còn ai coi chúng ta là tiền bối nữa.","ko":"[기호] 고 상무 원래 일 험하게 하는 거 아셨잖아요\n[임원2] 아, 이거 후배들 보기 부끄러워서\n[기호] 앞으로 누가 우리를 선배로 모시겠습니까?","en":"You know Director Go isn't the type to back down.\nGosh, I'm too embarrassed to face my juniors.\nNo one will treat us as their seniors.","text":"Anh biết Giám đốc Go vốn không dễ khuất phục mà.\nTrời ạ, tôi xấu hổ không dám nhìn mặt hậu bối luôn.\nSau này còn ai coi chúng ta là tiền bối nữa.\n[기호] 고 상무 원래 일 험하게 하는 거 아셨잖아요\n[임원2] 아, 이거 후배들 보기 부끄러워서\n[기호] 앞으로 누가 우리를 선배로 모시겠습니까?\nYou know Director Go isn't the type to back down.\nGosh, I'm too embarrassed to face my juniors.\nNo one will treat us as their seniors.","sourceUid":"merged-mrarr0pl-154","sourceNo":879,"viRanges":[{"start":3386.342,"end":3396.593674}],"koRanges":[{"start":3497.904909,"end":3508.383401}]},{"id":545,"readerNo":546,"displayNo":882,"n":882,"kind":"sub","type":"merged","vi":"Tôi cũng chả thể phản kháng vì cô ta nói đúng quá.\nTôi…\nsẽ xử lý việc này.","ko":"[임원3] 맞는 말만 하니까 반대할 수도 없고, 참 [쓴웃음]\n제가\n해결하겠습니다","en":"I can't argue with her since she only states the facts.\nI will…\ntake care of it.","text":"Tôi cũng chả thể phản kháng vì cô ta nói đúng quá.\nTôi…\nsẽ xử lý việc này.\n[임원3] 맞는 말만 하니까 반대할 수도 없고, 참 [쓴웃음]\n제가\n해결하겠습니다\nI can't argue with her since she only states the facts.\nI will…\ntake care of it.","sourceUid":"merged-mrars0pr-156","sourceNo":882,"viRanges":[{"start":3396.593674,"end":3407.322909}],"koRanges":[{"start":3508.383401,"end":3519.110601}]},{"id":546,"readerNo":547,"displayNo":887,"n":887,"kind":"sub","type":"merged","vi":"Với lại, sao các anh lại ngây thơ vậy?\nCác anh nghĩ Giám đốc Go làm vậy vì công ty sao?\nCô ta làm vậy để lôi kéo người về phe mình thôi.","ko":"[창수] 그리고\n왜들 이렇게 순진들 하십니까?\n고 상무가 회사 위해서 저러는 거 같습니까?\n지 편 만들려고 저러는 거지","en":"Also, why are you all so naive?\nYou think Director Go is doing that for the company?\nThis is her attempt to bring people to her side.","text":"Với lại, sao các anh lại ngây thơ vậy?\nCác anh nghĩ Giám đốc Go làm vậy vì công ty sao?\nCô ta làm vậy để lôi kéo người về phe mình thôi.\n[창수] 그리고\n왜들 이렇게 순진들 하십니까?\n고 상무가 회사 위해서 저러는 거 같습니까?\n지 편 만들려고 저러는 거지\nAlso, why are you all so naive?\nYou think Director Go is doing that for the company?\nThis is her attempt to bring people to her side.","sourceUid":"merged-mrartau7-158","sourceNo":887,"viRanges":[{"start":3407.322909,"end":3420.450903}],"koRanges":[{"start":3519.110601,"end":3532.080405}]},{"id":547,"readerNo":548,"displayNo":890,"n":890,"kind":"sub","type":"merged","vi":"Anh nói vậy là sao?\nCái đó gọi là \"chia để trị\".\nBắt đầu tạo phe cho riêng mình là vừa rồi.","ko":"무슨 말씀이세요?\n디바이드 앤 룰 아닙니까\n[아인] 이제 슬슬 내 편 좀 만들어 볼까?","en":"What do you mean?\nIt's called \"divide and rule.\"\nIt's time to bring people onto my side.","text":"Anh nói vậy là sao?\nCái đó gọi là \"chia để trị\".\nBắt đầu tạo phe cho riêng mình là vừa rồi.\n무슨 말씀이세요?\n디바이드 앤 룰 아닙니까\n[아인] 이제 슬슬 내 편 좀 만들어 볼까?\nWhat do you mean?\nIt's called \"divide and rule.\"\nIt's time to bring people onto my side.","sourceUid":"merged-mraruejn-159","sourceNo":890,"viRanges":[{"start":3420.450903,"end":3431.962196}],"koRanges":[{"start":3532.080405,"end":3544.029991}]},{"id":548,"readerNo":549,"displayNo":"N203","n":"N203","kind":"narration","type":"narration","vi":"INSERT Phần 3 S#17 Agency/Go-A-In Room (Ban đêm).","ko":"INSERT 3부 S#17 대행사/아인 방(밤).","en":"INSERT Part 3 S#17 Agency/Go-A-In Room (Night).","text":"INSERT Phần 3 S#17 Agency/Go-A-In Room (Ban đêm).\nINSERT 3부 S#17 대행사/아인 방(밤).\nINSERT Part 3 S#17 Agency/Go-A-In Room (Night).","sourceUid":"nar-mrc55bhw-lgp2is","sourceNo":"N203","viRanges":[],"koRanges":[]},{"id":549,"readerNo":550,"displayNo":892,"n":892,"kind":"sub","type":"merged","vi":"Cô ta đang cố chia rẽ và kéo một nửa nhân sự về phe mình.\nAnh biết rồi mà vẫn để việc này xảy ra sao?","ko":"[창수] 내부에 대립을 만들어서\n절반은 확실하게 자기편을 만들겠다는\n그걸 아는 분이 일을 이렇게 만듭니까?","en":"She's trying to divide them up and bring half of them onto her side.\nYou knew, but you still let this happen?","text":"Cô ta đang cố chia rẽ và kéo một nửa nhân sự về phe mình.\nAnh biết rồi mà vẫn để việc này xảy ra sao?\n[창수] 내부에 대립을 만들어서\n절반은 확실하게 자기편을 만들겠다는\n그걸 아는 분이 일을 이렇게 만듭니까?\nShe's trying to divide them up and bring 다리세요\n곱게 자란 그 멘털에\n비바람 몰아쳐 드릴 테니까","en":"What?\nYou'll see.\nI'll send a storm\ninto that feeble and spoiled mind of yours.","text":"Cái gì?\nAnh hãy đợi đi.\nTôi sẽ gửi cho anh một cơn bão\nđến khuấy đảo tinh thần nhu nhược của anh.\n- 뭐? - [아인] 기다리세요\n곱게 자란 그 멘털에\n비바람 몰아쳐 드릴 테니까\nWhat?\nYou'll see.\nI'll send a storm\ninto that feeble and spoiled mind of yours.","sourceUid":"merged-mraswpkt-191","sourceNo":970,"viRanges":[{"start":3720.989937,"end":3731.496966}],"koRanges":[{"start":3832.949541,"end":3847.978657}]},{"id":592,"readerNo":593,"displayNo":974,"n":974,"kind":"sub","type":"merged","vi":"Họ nổi dậy rồi.\nĐây là bản kiến nghị sa thải cô.\nLá bài của tôi thế nào?\nKém cỏi không thể tả.","ko":"[병수] 들고일어났습니다\n[우철] 상무님 해고 결의안입니다\n[창수] 어때? 내 카드가?\n[한나] 후지다, 진짜 후져\n[아인] 차원이 다른 사람에게 뒷정리시킬 거야","en":"They're protesting.\nIt's a petition for your resignation.\nHow do you like my move?\nIt's so lousy.","text":"Họ nổi dậy rồi.\nĐây là bản kiến nghị sa thải cô.\nLá bài của tôi thế nào?\nKém cỏi không thể tả.\n[병수] 들고일어났습니다\n[우철] 상무님 해고 결의안입니다\n[창수] 어때? 내 카드가?\n[한나] 후지다, 진짜 후져\n[아인] 차원이 다른 사람에게 뒷정리시킬 거야\nThey're protesting.\nIt's a petition for your resignation.\nHow do you like my move?\nIt's so lousy.","sourceUid":"merged-mrasymc5-192","sourceNo":974,"viRanges":[],"koRanges":[]},{"id":593,"readerNo":594,"displayNo":861,"n":861,"kind":"sub","type":"merged","vi":"Biên dịch: Nguyễn Phương Hà","ko":"","en":"Subtitle translation by: Jea-heon Chung","text":"Biên dịch: Nguyễn Phương Hà\nSubtitle translation by: Jea-heon Chung","sourceUid":"merged-mrat1q5p-194","sourceNo":861,"viRanges":[],"koRanges":[]},{"id":594,"readerNo":595,"displayNo":982,"n":982,"kind":"sub","type":"merged","vi":"[Changsu] Thật điên rồ…\n[Ain] Có những cơn mưa đủ thổi bay cả căn nhà\nPhụ đề: Choi In Jeong","ko":"[창수] 저 미친…\n[아인] 하우스가 날아갈 정도의 비바람도 있다는 걸\n자막: 최인정","en":"[Changsu] That crazy…\n[Ain] There are rainstorms that are enough to blow the house away\nSubtitle: Choi In-jeong","text":"[Changsu] Th let idx=0,stop=false,viUrl='',koUrl='',unlocked=false,token=0;
const $=id=>document.getElementById(id);
const engine=()=>$('engine');
function toggleSettings(){const p=$('settingsPanel');if(p)p.classList.toggle('show')}
let audioCtx=null,gainNode=null,mediaSource=null,engineKind='vi';
const VOL_KEY='master_reader_volume_'+String(project.githubSlug||project.title||'reader').replace(/[^A-Za-z0-9._-]+/g,'_');

function esc2(s){return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})}
function fmt(t){t=Number(t||0);let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.floor(t%60),ms=Math.round((t-Math.floor(t))*1000);if(ms>=1000){s++;ms-=1000}return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+','+String(ms).padStart(3,'0')}
function rangeLabel(arr){if(!arr||!arr.length)return '';let a=arr[0],b=arr[arr.length-1];return fmt(a.start)+' → '+fmt(b.end)+(arr.length>1?' x'+arr.length:'')}
function hasRange(k,b){let arr=k==='vi'?b.viRanges:b.koRanges;return !!(arr&&arr.length)}
function folderPath(){let f=String(project.audioFolder||'audio').trim();while(f.endsWith('/'))f=f.slice(0,-1);return f||'audio'}
function pathFor(k){let folder=folderPath();let file=k==='vi'?project.viAudioFile:project.koAudioFile;if(!file)return '';if(file.startsWith('http://')||file.startsWith('https://'))return file;if(folder==='.'||folder==='')return './'+file;if(folder.startsWith('../')||folder.startsWith('./'))return folder+'/'+file;return './'+folder+'/'+file}
function clampVol(v){v=Number(v);if(!Number.isFinite(v))v=100;return Math.max(0,Math.min(200,v))}
function loadVolSettings(){try{return JSON.parse(localStorage.getItem(VOL_KEY)||'{}')||{}}catch(e){return {}}}
function saveVolSettings(){try{localStorage.setItem(VOL_KEY,JSON.stringify({vi:clampVol($('viVol')?.value||100),ko:clampVol($('koVol')?.value||100)}))}catch(e){}}
function volValue(k){return clampVol($(k+'Vol')?.value||100)}
function ensureGain(){
  try{
    const a=engine();
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(!mediaSource){
      mediaSource=audioCtx.createMediaElementSource(a);
      gainNode=audioCtx.createGain();
      mediaSource.connect(gainNode);
      gainNode.connect(audioCtx.destination);
    }
    if(audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});
    return true;
  }catch(e){return false}
}
function applyVisibleVolume(k){
  const v=volValue(k), label=$(k+'VolLabel');
  if(label)label.textContent=Math.round(v)+'%';
}
function applyEngineVolume(k){
  engineKind=k||engineKind||'vi';
  const v=volValue(engineKind), a=engine();
  const ok=ensureGain();
  if(ok&&gainNode){a.volume=1;gainNode.gain.value=v/100}
  else a.volume=Math.min(1,v/100);
  applyVisibleVolume(engineKind);
}
function setReaderVolume(k,v,persist=true){
  const slider=$(k+'Vol');
  if(slider)slider.value=String(clampVol(v));
  applyVisibleVolume(k);
  if(engineKind===k)applyEngineVolume(k);
  if(persist)saveVolSettings();
}
function initReaderVolumeControls(){
  const saved=loadVolSettings();
  ['vi','ko'].forEach(k=>{
    const slider=$(k+'Vol');
    const val=clampVol(saved[k]??100);
    if(slider){
      slider.value=String(val);
      slider.oninput=()=>setReaderVolume(k,slider.value,true);
      slider.onchange=()=>setReaderVolume(k,slider.value,true);
    }
    setReaderVolume(k,val,false);
  });
}
function loadPaths(){viUrl=pathFor('vi');koUrl=pathFor('ko');applyVisibleVolume('vi');applyVisibleVolume('ko');$('audioInfo').textContent='Paths: '+viUrl+' | '+koUrl}
function showAudioPaths(){alert('VI: '+viUrl+'\nKO: '+koUrl+'\n\nNếu đặt reader trong thư mục subtitle-master, audio folder thường là ../audio.')}
function loadLocal(k,f){if(!f)return;if(k==='vi')viUrl=URL.createObjectURL(f);else koUrl=URL.createObjectURL(f);applyVisibleVolume(k);$('audioInfo').textContent='Loaded local '+k+': '+f.name}
function toggleAudio(){toggleSettings()}

function badgeHtml(b){
  const vi=hasRange('vi',b)?'<span class="badge vi timingBadge">VI '+rangeLabel(b.viRanges)+'</span>':'<span class="badge no">No VI</span>';
  const ko=hasRange('ko',b)?'<span class="badge vi timingBadge">KO '+rangeLabel(b.koRanges)+'</span>':'<span class="badge no">No KO</span>';
  const type=b.kind==='narration'?'<span class="badge narr">Narration</span>':'<span class="badge">Cue</span>';
  return '<div class="badges">'+type+vi+ko+'</div>';
}
function render(){
  const q=($('q').value||'').toLowerCase();
  let h='';
  project.blocks.forEach(function(b,i){
    const hay=[b.vi,b.ko,b.en,b.text,b.displayNo,b.sourceNo].join(' ').toLowerCase();
    if(q&&!hay.includes(q))return;
    const title=(b.kind==='narration'?'Narration #':'Cue #')+(b.displayNo||b.sourceNo||i+1);
    h+='<div class="item '+(b.kind==='narration'?'narr':'')+' '+(i===idx?'active':'')+'" onclick="idx='+i+';render()">';
    h+='<div class="meta"><span>'+esc2(title)+'</span><span>'+(i===idx?'SELECTED':'')+'</span></div>';
    h+=badgeHtml(b);
    h+='<div class="txt">'+(b.vi?'<div>'+esc2(b.vi)+'</div>':'')+(b.ko?'<div class="ko">'+esc2(b.ko)+'</div>':'')+(b.en?'<div class="en">'+esc2(b.en)+'</div>':'')+'</div>';
    h+='<div class="row" style="margin-top:8px"><button onclick="event.stopPropagation();idx='+i+';readKoCurrent()">Read KO</button><button class="good" onclick="event.stopPropagation();idx='+i+';playCurrent(\'vi\')">VI Dub</button><button class="violet" onclick="event.stopPropagation();idx='+i+';playCurrent(\'ko\')">KO Live</button><button class="warn" onclick="event.stopPropagation();idx='+i+';playCueMode()">VI→VI→KO→KO</button></div>';
    h+='</div>';
  });
  $('list').innerHTML=h||'<div class="item">Không có cue phù hợp.</div>';
  const viCount=project.blocks.filter(b=>hasRange('vi',b)).length, koCount=project.blocks.filter(b=>hasRange('ko',b)).length;
  $('stat').textContent=project.blocks.length+' blocks · VI '+viCount+' · KO '+koCount+' · current '+(idx+1);
}
function cur(){return project.blocks[idx]||{}}
function prev(){idx=Math.max(0,idx-1);render();scrollActive()}
function next(){idx=Math.min(project.blocks.length-1,idx+1);render();scrollActive()}
function scrollActive(){document.querySelector('.item.active')?.scrollIntoView({block:'center',behavior:'smooth'})}
function stopAll(){stop=true;token++;engine().pause();try{speechSynthesis.cancel()}catch(e){}}

function wait(ms){return new Promise(r=>setTimeout(r,ms))}
function waitMedia(a,timeout){timeout=timeout||6000;return new Promise(res=>{if(a.readyState>=1)return res(true);let done=false;function ok(){if(done)return;done=true;clean();res(true)}function bad(){if(done)return;done=true;clean();res(false)}function clean(){a.removeEventListener('loadedmetadata',ok);a.removeEventListener('canplay',ok);a.removeEventListener('error',bad);clearTimeout(to)}a.addEventListener('loadedmetadata',ok,{once:true});a.addEventListener('canplay',ok,{once:true});a.addEventListener('error',bad,{once:true});let to=setTimeout(bad,timeout)})}
async function unlockAudio(){try{let a=engine();let src=viUrl||koUrl||pathFor('vi')||pathFor('ko');if(!src){alert('Chưa có audio path.');return false}if(a.src!==new URL(src,location.href).href){a.src=src;a.load();await waitMedia(a,5000)}let vol=a.volume;a.volume=0.001;await a.play();a.pause();a.volume=vol||1;applyEngineVolume(engineKind||'vi');unlocked=true;$('audioInfo').textContent+=' | unlocked';return true}catch(e){alert('iPhone chưa cho unlock audio. Bấm lại Unlock iPhone Audio. '+(e.message||e));return false}}
function playRange(src,r,myToken,k){
  return new Promise(async res=>{
    if(!src||!r){res(false);return}
    const a=engine();stop=false;
    try{
      const abs=new URL(src,location.href).href;
      if(a.src!==abs){a.pause();a.src=src;a.load();await waitMedia(a,7000)}
      applyEngineVolume(k||'vi');
      a.currentTime=Math.max(0,Number(r.start)||0);
      const end=Math.max(Number(r.end)||0,(Number(r.start)||0)+.2);
      function finish(ok){a.removeEventListener('timeupdate',tick);a.removeEventListener('ended',ended);a.removeEventListener('error',err);res(ok)}
      function tick(){if(stop||myToken!==token){a.pause();finish(false);return}if(a.currentTime>=end-0.03){a.pause();finish(true)}}
      function ended(){finish(true)} function err(){finish(false)}
      a.addEventListener('timeupdate',tick);a.addEventListener('ended',ended,{once:true});a.addEventListener('error',err,{once:true});
      await a.play();
    }catch(e){$('audioInfo').textContent='Không phát được audio: '+(e.message||e)+' | '+src;res(false)}
  })
}
async function playAudioKind(k,myToken){
  const b=cur();const ranges=k==='vi'?b.viRanges:b.koRanges;const src=k==='vi'?viUrl:koUrl;
  if(!ranges||!ranges.length)return false;
  let any=false;
  for(const r of ranges){if(stop||myToken!==token)break;let ok=await playRange(src,r,myToken,k);any=any||ok}
  return any;
}
async function playCurrent(k){const my=++token;stop=false;const ok=await playAudioKind(k,my);if(!ok)await readKoCurrent()}

function getBestVoice(lang){
  try{
    const voices=speechSynthesis.getVoices()||[];
    const prefix=String(lang||'').slice(0,2).toLowerCase();
    const scored=voices.map(v=>{
      const hay=((v.lang||'')+' '+(v.name||'')).toLowerCase();
      let score=0;
      if((v.lang||'').toLowerCase().startsWith(prefix))score+=100;
      if(lang==='ko-KR' && /ko|korean|한국|yuna|siri|google|microsoft|samsung|premium|enhanced/.test(hay))score+=60;
      if(lang==='vi-VN' && /vi|vietnam|tiếng việt|vietnamese|google|microsoft|premium|enhanced/.test(hay))score+=60;
      if(v.localService)score+=5;
      return {v,score};
    }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
    return scored[0]?.v||null;
  }catch(e){return null}
}
function readTts(text,lang,myToken,rate){
  return new Promise(res=>{
    text=String(text||'').trim();
    if(!text){res(false);return}
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text.slice(0,1200));
      u.lang=lang;
      u.rate=rate||1;
      u.pitch=1;
      const v=getBestVoice(lang); if(v)u.voice=v;
      let done=false;
      function finish(ok){if(done)return;done=true;res(ok)}
      u.onend=()=>finish(true);u.onerror=()=>finish(false);
      speechSynthesis.speak(u);
      setTimeout(()=>{if(myToken!==token){speechSynthesis.cancel();finish(false)}},50);
    }catch(e){res(false)}
  })
}
function readKo(text,myToken){return readTts(text,'ko-KR',myToken,0.88)}
function readVi(text,myToken){return readTts(text,'vi-VN',myToken,0.95)}
function readKoCurrent(){const my=++token;stop=false;return readKo(cur().ko||cur().text||'',my)}
function readViCurrent(){const my=++token;stop=false;return readVi(cur().vi||'',my)}
if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=()=>{try{speechSynthesis.getVoices()}catch(e){}}}

async function playByModeForCurrent(mode,my){
  const b=cur();
  const hasVi=hasRange('vi',b), hasKo=hasRange('ko',b);
  if(mode==='vi-readvi-readko-ko'){
    if(hasVi) await playAudioKind('vi',my); else await readVi(b.vi||'',my);
    if(stop||my!==token)return;
    await readKo(b.ko||b.text||'',my);
    if(stop||my!==token)return;
    if(hasKo) await playAudioKind('ko',my);
  }else if(mode==='vi-readko-ko'){
    if(hasVi) await playAudioKind('vi',my);
    if(stop||my!==token)return;
    await readKo(b.ko||b.text||'',my);
    if(stop||my!==token)return;
    if(hasKo) await playAudioKind('ko',my);
  }else if(mode==='vi-ko'){
    if(hasVi)await playAudioKind('vi',my);
    if(stop||my!==token)return;
    if(hasKo)await playAudioKind('ko',my);
    else if(!hasVi)await readKo(b.ko||b.text||'',my);
  }else if(mode==='vi'){
    const ok=await playAudioKind('vi',my);
    if(!ok)await readVi(b.vi||'',my);
  }else if(mode==='ko'){
    const ok=await playAudioKind('ko',my);
    if(!ok)await readKo(b.ko||b.text||'',my);
  }else if(mode==='readko'){
    await readKo(b.ko||b.text||'',my);
  }
}
async function playCueMode(){
  const my=++token;stop=false;
  await playByModeForCurrent($('mode').value,my);
}
async function smart(){
  stop=false;const my=++token;
  const mode=$('mode').value;
  if((mode==='vi-readko-ko'||mode==='vi-readvi-readko-ko')&&!unlocked&&/iPad|iPhone|iPod/.test(navigator.userAgent)){await unlockAudio()}
  for(;idx<project.blocks.length&&my===token&&!stop;idx++){
    render();scrollActive();
    await playByModeForCurrent(mode,my);
    if(stop||my!==token)break;
  }
}
initReaderVolumeControls();loadPaths();render();
</script>
