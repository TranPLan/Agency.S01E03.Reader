ích\nvà sa thải các anh nhé?","ko":"얻어먹은 술값들 제작비에 녹여서 회사로 청구됐을 테니까\n배임으로 본사 감사 팀에 보내서\n여러분이 좋아하는 관례대로\n해고시켜 드릴까요?","en":"Surely the drinks were part of the production fee\nand billed to the company.\nI can report you to the audit team,\nand according to the common practice,\nI can have you fired.","text":"Tiền rượu của các anh được tính vào phí sản xuất và được công ty chi trả.\nNên tôi sẽ gửi cho phòng thanh tra\nđể được xét theo thường lệ mà các anh yêu thích\nvà sa thải các anh nhé?\n얻어먹은 술값들 제작비에 녹여서 회사로 청구됐을 테니까\n배임으로 본사 감사 팀에 보내서\n여러분이 좋아하는 관례대로\n해고시켜 드릴까요?\nSurely the drinks were part of the production fee\nand billed to the company.\nI can report you to the audit team,\nand according to the common practice,\nI can have you fired.","sourceUid":"merged-mr9as3vr-75","sourceNo":120,"viRanges":[{"start":505.15334,"end":517.86046}],"koRanges":[{"start":500.438781,"end":513.808265}]},{"id":113,"readerNo":114,"displayNo":107,"n":107,"kind":"sub","type":"merged","vi":"TRUYỀN THÔNG VC GIÁM ĐỐC CHOI CHANG SU","ko":"","en":"VC COMMUNICATIONS MANAGING DIRECTOR CHOI CHANG-SU","text":"TRUYỀN THÔNG VC GIÁM ĐỐC CHOI CHANG SU\nVC COMMUNICATIONS MANAGING DIRECTOR CHOI CHANG-SU","sourceUid":"merged-mr9at2ht-76","sourceNo":107,"viRanges":[],"koRanges":[]},{"id":114,"readerNo":115,"displayNo":"N49","n":"N49","kind":"narration","type":"narration","vi":"CD xấu hổ không nói được lời nào, đúng lúc đó khi Kwon-Woo-Cheol gọi, Choi-Chang-Soo. Đi đến góc và lặng lẽ nhận nó.","ko":"당황해서 아무 말 못하는 씨디들, 그때 권씨디에게 전화 오면 최상무. 구석으로 가서 조용히 받는다.","en":"CDs who are embarrassed and can't say anything, then when Kwon-Woo-Cheol calls, Choi-Chang-Soo. Go to the corner and quietly receive it.","text":"CD xấu hổ không nói được lời nào, đúng lúc đó khi Kwon-Woo-Cheol gọi, Choi-Chang-Soo. Đi đến góc và lặng lẽ nhận nó.\n당황해서 아무 말 못하는 씨디들, 그때 권씨디에게 전화 오면 최상무. 구석으로 가서 조용히 받는다.\nCDs who are embarrassed and can't say anything, then when Kwon-Woo-Cheol calls, Choi-Chang-Soo. Go to the corner and quietly receive oor, and leave. Call Jeong-Soo-Jeong (A-In's Secretary) to report trash dumped on the floor (related to picture frames).","sourceUid":"nar-mrbssh9i-69aw6v","sourceNo":"N52","viRanges":[],"koRanges":[]},{"id":125,"readerNo":126,"displayNo":142,"n":142,"kind":"sub","type":"merged","vi":"Vào dọn rác giúp tôi.","ko":"들어와서 쓰레기 좀 치우세요","en":"Come and clean up the trash.","text":"Vào dọn rác giúp tôi.\n들어와서 쓰레기 좀 치우세요\nCome and clean up the trash.","sourceUid":"merged-mr9b2ad3-85","sourceNo":142,"viRanges":[{"start":619,"end":621.518707}],"koRanges":[{"start":616,"end":618.136468}]},{"id":126,"readerNo":127,"displayNo":125,"n":125,"kind":"sub","type":"merged","vi":"THƯ KÝ\nTRUYỀN THÔNG VC","ko":"","en":"SECRETARY","text":"THƯ KÝ\nTRUYỀN THÔNG VC\nSECRETARY","sourceUid":"merged-mr9b364p-87","sourceNo":125,"viRanges":[],"koRanges":[]},{"id":127,"readerNo":128,"displayNo":"N53","n":"N53","kind":"narration","type":"narration","vi":"Jeong-Soo-Jeong Tôi bước vào và dọn rác rơi trên mặt đất, nhưng Go-A-In lại nhìn đi chỗ khác. Go-A-In, ngồi vào bàn làm việc như không có chuyện gì xảy ra.","ko":"수정 들어와서 땅에 떨어진 쓰레기 치우는데 아인을 흘끔흘 끔. 아인, 책상에 앉아서 아무 일 없었다는 듯 일을 하며.","en":"Jeong-Soo-Jeong (A-In's Secretary) I came in and cleaned up the trash that fell on the ground, but Go-A-In glanced away. Go-A-In, sitting at my desk and working as if nothing had happened.","text":"Jeong-Soo-Jeong Tôi bước vào và dọn rác rơi trên mặt đất, nhưng Go-A-In lại nhìn đi chỗ khác. Go-A-In, ngồi vào bàn làm việc như không có chuyện gì xảy ra.\n수정 들어와서 땅에 떨어진 쓰레기 치우는데 아인을 흘끔흘 끔. 아인, 책상에 앉아서 아무 일 없었다는 듯 일을 하며.\nJeong-Soo-Jeong (A-In's Secretary) I came in and cleaned up the trash that fell on the ground, but Go-A-In glanced away. Go-A-In, sitting at my desk and working as if nothing had happened.","sourceUid":"nar-mrbssoiv-2o0e9p","sourceNo":"N53","viRanges":[],"koRanges":[]},{"id":128,"readerNo":129,"displayNo":143,"n":143,"kind":"sub","type":"merged","vi":"[Âm thanh hoạt động]\n[Tiếng gõ cửa]\n[Âm thanh xào x n.\nTread carefully for now.","text":"Nếu phải gánh thêm mấy quả tạ này,\nthì cả mình cũng bị kéo xuống mất.\nTạm thời anh cứ hành động cẩn thận.\n[창수] 이것들 끌어안으면\n나까지 휩쓸려 갈 판인데\n떨어지는 가랑잎도 조심하고 있어\nIf I carry these pieces of baggage,\nthey'll end up bringing me down.\nTread carefully for now.","sourceUid":"merged-mr9bckzb-91","sourceNo":154,"viRanges":[{"start":664.376159,"end":675.931397}],"koRanges":[{"start":662.790612,"end":672.064466}]},{"id":137,"readerNo":138,"displayNo":"N57","n":"N57","kind":"narration","type":"narration","vi":"FLASHBACK Phần 1 S#55 Trụ sở chính/Phòng Thư ký trưởng (Buổi sáng).","ko":"FLASHBACK 1부 S#55 본사/비서실장 방(아침).","en":"FLASHBACK Part 1 S#55 Headquarters/Chief Secretary's Room (Morning).","text":"FLASHBACK Phần 1 S#55 Trụ sở chính/Phòng Thư ký trưởng (Buổi sáng).\nFLASHBACK 1부 S#55 본사/비서실장 방(아침).\nFLASHBACK Part 1 S#55 Headquarters/Chief Secretary's Room (Morning).","sourceUid":"nar-mrbsub7k-diyfj7","sourceNo":"N57","viRanges":[],"koRanges":[]},{"id":138,"readerNo":139,"displayNo":155,"n":155,"kind":"sub","type":"merged","vi":"Chuyện lọt ra ngoài là toi đấy.","ko":"괜히 큰 소리 나면 나가리니까","en":"If word gets out, you'll be finished.","text":"Chuyện lọt ra ngoài là toi đấy.\n괜히 큰 소리 나면 나가리니까\nIf word gets out, you'll be finished.","sourceUid":"merged-mr9bdn6j-92","sourceNo":155,"viRanges":[{"start":675.931397,"end":679.640785}],"koRanges":[{"start":672.064466,"end":674.203618}]},{"id":139,"readerNo":140,"displayNo":"N58","n":"N58","kind":"narration","type":"dialogue","vi":"Choi-Chang-Soo: Trước hết là Kim-Oh-Joong. Đây là ông Joo.","ko":"최상무:   일단, 김씨디. 주씨다.","en":"Choi-Chang-Soo: First of all, Kim-Oh-Joong. This is Mr. Joo.","text":"Choi-Chang-Soo: Trước hết là Kim-Oh-Joong. Đây là ông Joo.\n최상무:   일단, 김씨디. 주씨다.\nChoi-Chang-Soo: First of all, Kim-Oh-Joong. This is Mr. Joo.","sourceUid":"nar-mrbsup8x-2a6uxb","sourceNo":"N58","viRanges":[],"koRanges":[]},{"id":140,"readerNo":141,"displayNo":135,"n":135,"kind":"sub","type":"merged","vi":"Trước mắt,\nQuản lý Kim và Quản lý Joo.\n- Vâng. - Vâng.\nSang chi nhánh Trung Quốc đi.\nSao ạ?","ko":"일단\n[창수] 김 CD, 주 CD\n[함께] 네\n중국 지사 가 있어\n네?","en":"For now,\nDirector Kim and Joo.\n-Yes, sir. -Yes, sir.\nGo to the Chinese branch.\nWhat?","text":"Trước mắt,\nQuản lý Kim và Quản lý Joo.\n- Vâng. - Vâng.\nSang chi nhánh Trung Quốc đi.\nSao ạ?\n일단\n[창수] 김 CD, 주 CD\n[함께] 네\n중국 지사 가 있어\n네?\nFor now,\nDirector Kim and Joo.\n-Yes, sir. -Yes, sir.\nGo to the Chinese branch.\nWhat?","sourceUid":"merged-mr9bf7o9-93","sourceNo":135,"viRanges":[{"start":679.640785,"end":688.708032}],"koRanges":[{"start":674.203618,"end":685.311464}]},{"id":141,"readerNo":142,"displayNo":142,"n":142,"kind":"sub","type":"merged","vi":"Giám đốc Choi.\nCòn cách nào sao?\nCô ta đang thực thi quyền hạn theo quy định công ty.","ko":"아, 상무님\n방법 있어?\n회사 내규대로 권한 행사한 건데?","en":"Mr. Choi.\nAny other ideas?\nAll she did was exercise her power within the regulations.","text":"Giám đốc Choi.\nCòn cách nào sao?\nCô ta đang thực thi quyền hạn theo quy định công ty.\n아, 상무님\n방법 있어?\n회사 내규대로 권한 행사한 건데?\nMr. Choi.\nAny other ideas?\nAll she did was exercise her power within the regulations.","sourceUid":"merged-mr9bgq76-94","sourceNo":142,"viRanges":[{"start":688.708032,"end":696.566021}],"koRanges":[{"start":685.311464,"end":692.439546}]},{"id":142,"readerNo":143,"displayNo":165,"n":165,"kind":"sub","type":"merged","vi":"Nhưng mà, tiền bối…\nKhông thấy nhục nhã sao?","ko":"[우철] 아, 그래도 선배님\n[창수] 쪽팔리게, 씨, 쯧","en":"But still, Chang-su…\nIsn't it humiliating?","text":"Nhưng mà, tiền bối…\nKhông thấy nhục nhã sao?\n[우철] 아, 그래도 선배님\n[창수] 쪽팔리게, 씨, 쯧\nBut still, Chang-su…\nIsn't it humiliating?","sourceUid":"merged-mr9bhkei-95","sourceNo":165,"viRanges":[{"start":696.566021,"end":701.47669}],"koRanges":[{"start":692.439546,"end":697.590947}]},{"id":143,"readerNo":144,"displayNo":166,"n":166,"kind":"sub","type":"merged","vi":"Các cậu muốn làm việc dưới trướng cấp dưới à?","ko":"니들 팀원이었던 애들 밑에서 일할래?","en":"Working under your own team members?","text":"Các cậu muốn làm việc dưới trướng cấp dưới à?\n니들 팀원이었던 애들 밑에서 일할래?\nWorking under your own team members?","sourceUid":"merged-mr9bin7m-96","sourceNo":166,"viRanges":[{"start":701.47669,"end":704.10635}],"koRanges":[{"start":697.590947,"end":700.702389}]},{"id":144,"readerNo":145,"displayNo":168,"n":168,"kind":"sub","type":"merged","vi":"Lâu lắm là một năm. Các cậu biết mà.\nSắp xếp đồ đạc đi.","ko":"길어 봐야 1년이야, 알잖아\n바로 짐 싸","en":"She'll last a year at most. You know that.\nGo pack up.","text":"Lâu lắm là một năm. Các cậu biết mà.\nSắp xếp đồ đạc đi.\n길어 봐야 1년이야, 알잖아\n바로 짐 싸\nShe'll last a year at most. You know that.\nGo pack up.","sourceUid":"merged-mr9bj78j-97","sourceNo":168,"viRanges":[{"start":704.10635,"end":712.334921}],"koRanges":[{"start":700.702389,"end":708.270653}]},{"id":145,"readerNo":146,"displayNo":150,"n":150,"kind":"sub","type":"merged","vi":"Bây giờ ạ?\nCác cậu sẽ nghỉ phép nên đừng đến công ty.\nCơ hội…\nchỉ đến khi các cậu sống sót thôi.","ko":"지, 지금요?\n[창수] 휴가 내 줄 테니까 회사 나오지 말고\n기회는\n살아 있어야 오는 거야","en":"Right now? You guys will be on leave, so don't come to work. Opportunity only comes… when you survive.","text":"Bây giờ ạ?\nCác cậu sẽ nghỉ phép nên đừng đến công ty.\nCơ hội…\nchỉ đến khi các cậu sống sót thôi.\n지, 지금요?\n[창수] 휴가 내 줄 테니까 회사 나오지 말고\n기회는\n살아 있어야 오는 거야\nRight now? You guys will be on leave, so don't come to work. Opportunity only comes… when you survive.","sourceUid":"merged-mr9bkgui-98","sourceNo":150,"viRanges":[{"start":712.334921,"end":720.662932}],"koRanges":[{"start":708.270653,"end":718.020147}]},{"id":146,"readerNo":147,"displayNo":173,"n":173,"kind":"sub","type":"merged","vi":"[Kim CD thở dài]\n[CD chính thở dài]","ko":"[김 CD의 한숨]\n[주 CD의 한숨]","en":"[Kim CD sighs]\n[The main CD sighs]","text":"[Kim CD thở dài]\n[CD chính thở dài]\n[김 CD의 한숨]\n[주 CD의 한숨]\n[Kim CD sighs]\n[The main CD sighs]","sourceUid":"merged-mr9bkngo-99","sourceNo":173,"viRanges":[],"koRanges":[]},{"id":147,"readerNo":148,"displayNo":"N59","n":"N59","kind":"narration","type":"narration","vi":"S#11 Cơ quan/Đội sản xuất + Hành lang (Ban đêm)","ko":"S#11 대행사/제작팀 + 복도(밤]","en":"S#11 Agency/Production Team + Hallway (Night)","text":"S#11 Cơ quan/Đội sản xuất + Hành lang (Ban đêm)\nS#11 대행사/제작팀 + 복도(밤]\nS#11 Agency/Production Team + Hallway (Night)","sourceUid":"nar-mrbsvisw-p3bl6b","sourceNo":"N59","viRanges":[],"koRanges":[]},{"id":148,"readerNo":149,"displayNo":"N60","n":"N60","kind":"narration","type":"narration","vi":"Không khí của tổ sản xuất trở nên hoang tàn. Có thể thấy Kim/Joo-Ho-Young đang đóng gói,","ko":"삭막해진 제작팀 분위기. 김/주씨디 짐 싸는 모습이 보이고,","en":"The atmosphere of the production team became desolate. Kim/Joo-Ho-Young can be seen packing,","text":"Không khí của tổ sản xuất trở nên hoang tàn. Có thể thấy Kim/Joo-Ho-Young đang đóng gói,\n삭막해진 제작팀 분위기. 김/주씨디 짐 싸는 모습이 보이고,\nThe atmosphere of the production team became desolate. Kim/Joo-Ho-Young can be seen packing,","sourceUid":"nar-mrbsvl18-b9u2rd","sourceNo":"N60","viRanges":[],"koRanges":[]},{"id":149,"readerNo":150,"displayNo":"N61","n":"N61","kind":"narration","type":"narration","vi":"Các thành viên của tổ sản xuất số 2 không có tội nhưng lại bị chú ý vô cớ.","ko":"지은 죄는 없으나 괜히 눈치 보이는 제작2팀 팀원들.","en":"The members of the 2nd production team are not guilty, but they are being noticed for no reason.","text":"Các thành viên của tổ sản xuất số 2 không có tội nhưng lại bị chú ý vô cớ.\n지은 죄는 없으나 괜히 눈치 보이는 제작2팀 팀원들.\nThe members of the 2nd production team are not guilty, but they are being noticed for no reason.","sourceUid":"nar-mrbsvoh7-d2jsp5","sourceNo":"N61","viRanges":[],"koRanges":[]},{"id":150,"readerNo":151,"displayNo":176,"n":176,"kind":"sub","type":"merged","vi":"[Byungsu thở dài]\n- [Thở dài của Eunjeong] - [Âm thanh thao tác nút]","ko":"[병수의 한숨]\n- [은정의 한숨] - [버튼 조작음]","en":"[Byungsu’s sigh]\n- [Eunjeong's sigh] - [Button operation sound]","text":"[Byungsu thở dài]\n- [Thở dài của Eunjeong] - [Âm thanh thao tác nút]\n[병수의 한숨]\n- [은정의 한숨] - [버튼 조작음]\n[Byungsu’s sigh]\n- [Eunjeong's sigh] - [Button operation sound]","sourceUid":"merged-mr9bmojt-101","sourceNo":176,"viRanges":[],"koRanges":[]},{"id":151,"readerNo":152,"displayNo":177,"n":177,"kind":"sub","type":"merged","vi":"Đi thôi.\nÔi trời, giờ mới dám thở.","ko":"아, 이제야 한숨 돌리겠네","en":"Let's go.\nGosh, that was suffocating.","text":"Đi thôi.\nÔi trời, giờ mới dám thở.\n아, 이제야 한숨 돌리겠네\nLet's go.\nGosh, that was suffocating.","sourceUid":"merged-mr9bmj9t-100","sourceNo":177,"viRanges":[{"start":763,"end":767.892336}],"koRanges":[{"start":761,"end":764.739875}]},{"id":152,"readerNo":153,"displayNo":"N62","n":"N62","kind":"narration","type":"narration","vi":"Han-Byeong-Su, lặng lẽ bước ra cùng thành viên đội 2.","ko":"병수, 2팀 팀원들이랑 조용히 밖으로 나오고","en":"Manager Han (Han-Byeong-Su), quietly come out with team 2 members.","text":"Han-Byeong-Su, lặng lẽ bước ra cùng thành viên đội 2.\n병수, 2팀 팀원들이랑 조용히 밖으로 나오고\nManager Han (Han-Byeong-Su), quietly come out with team 2 members.","sourceUid":"nar-mrbsvzss-3a6e5m","sourceNo":"N62","viRanges":[],"koRanges":[]},{"id":153,"readerNo":154,"displayNo":178,"n":178,"kind":"sub","type":"ko","vi":"[Byungsu thở dài]","ko":"[병수의 한숨]","en":"[Byungsu’s sigh]","text":"[Byungsu thở dài]\n[병수의 한숨]\n[Byungsu’s sigh]","sourceUid":"ko-mr905eac-1049","sourceNo":178,"viRanges":[],"koRanges":[]},{"id":154,"readerNo":155,"displayNo":180,"n":180,"kind":"sub","type":"merged","vi":"Cậu cười cái gì vậy?\nĐây.","ko":"[은정] 야, 뭐가 그렇게 좋아?\n[장우] 이거","en":"What are you smiling about? This.","text":"Cậu cười cái gì vậy?\nĐây.\n[은정] 야, 뭐가 그렇게 좋아?\n[장우] 이거\nWhat are you smiling about? This.","sourceUid":"merged-mr9ckkog-102","sourceNo":180,"viRanges":[{"start":767.892336,"end":772.096475}],"koRanges":[{"start":764.739875,"end":769.540601}]},{"id":155,"readerNo":156,"displayNo":185,"n":185,"kind":"sub","type":"merged","vi":"Nhưng mà sảng khoái thật đấy.\nVui quá ấy chứ. Đúng là đã cái nư.\n- Nhờ Giám đốc Go mà ta được hưởng sái. - Họ nên bị thế này từ lâu rồi mới phải.\nCũng dễ hiểu.","ko":"[직원1] 그래도 속 시원하지 않아요?\n[직원2] 아, 너무 좋아요 속이 다 시원하네\n[직원3] 고 상무님 덕분에 우리한테도 이런 일이 생기네\n[직원2] 너무 좋다 진작에 이랬어야 되는데\n아, 하긴","en":"I'm glad that they are gone. It's great. Good riddance. -This is all thanks to Ms. Go. -This should've happened long ago. I get it.","text":"Nhưng mà sảng khoái thật đấy.\nVui quá ấy chứ. Đúng là đã cái nư.\n- Nhờ Giám đốc Go mà ta được hưởng sái. - Họ nên bị thế này từ lâu rồi mới phải.\nCũng dễ hiểu.\n[직원1] 그래도 속 시원하지 않아요?\n[직원2] 아, 너무 좋아요 속이 다 시원하네\n[직원3] 고 상무님 덕분에 우리한테도 이런 일이 생기네\n[직원2] 너무 좋다 진작에 이랬어야 되는데\n아, 하긴\nI'm glad that they are gone. It's great. Good riddance. -This is all thanks to Ms. Go. -This should've happened long ago. I get it.","sourceUid":"merged-mr9cozk7-105","sourceNo":185,"viRanges":[{"start":772.096475,"end":783.257661}],"koRanges":[{"start":769.540601,"end":779.949909}]},{"id":156,"readerNo":157,"displayNo":189,"n":189,"kind":"sub","type":"merged","vi":"Copywriter dốc sức viết để rồi bị phá hỏng vì quản lý chỉ chọn ra mắt sản phẩm cùng nhà sản xuất nào biết nịnh bợ. Nghĩ mà nản. Vậy giờ tính sao?","ko":"이야, 영혼을 갈아 넣어서 카피 썼는데\nCD가 접대하는 업체랑만 일해서 제작물 퀄리티 개판 나면\n으, 생각만 해도\n[병수] 그럼 어떻게","en":"It'd really suck for the copywriter to have their work ruined\nbecause their creative director only works with productions that kiss up to them.\nSo what should we do?","text":"Copywriter dốc sức viết để rồi bị phá hỏng vì quản lý chỉ chọn ra mắt sản phẩm cùng nhà sản xuất nào biết nịnh bợ. Nghĩ mà nản. Vậy giờ tính sao?\n이야, 영혼을 갈아 넣어서 카피 썼는데\nCD가 접대하는 업체랑만 일해서 제작물 퀄리티 개판 나면\n으, 생각만 해도\n[병수] 그럼 어떻게\nIt'd really suck for the copywriter to have their work ruined\nbecause their creative director only works with productions that kiss up to them.\nSo what should we do?","sourceUid":"merged-mr9cv8xe-109","sourceNo":189,"viRanges":[{"start":783.258,"end":792.426814}],"koRanges":[{"start":779.95,"end":788.07981}]},{"id":157,"readerNo":158,"displayNo":190,"n":190,"kind":"sub","type":"merged","vi":"Làm vài chén với thịt bò Hàn xinh đẹp để kỷ niệm nhé?","ko":"또 기념으로 예쁘게 생긴 투 플에 어떻게, 한잔해야 되나?","en":"How about going out for a drink with some beautiful Korean beef?","text":"Làm vài chén với thịt bò Hàn xinh đẹp để kỷ niệm nhé?\n또 기념으로 예쁘게 생긴 투 플에 어떻게, 한잔해야 되나?\nHow about going out for a drink with some beautiful Korean beef?","sourceUid":"merged-mr9cvh12-110","sourceNo":190,"viRanges":[{"start":792.426814,"end":795.259007}],"koRanges":[{"start":788.07981,"end":791.969152}]},{"id":158,"readerNo":159,"displayNo":191,"n":191,"kind":"sub","type":"merged","vi":"Không được, tôi phải về chơi với con.","ko":"안 돼요, 아들이랑 놀아 줘야 돼요","en":"No, I have a date with my son.","text":"Không được, tôi phải về chơi với con.\n안 돼요, 아들이랑 놀아 줘야 돼요\nNo, I have a date with my son.","sourceUid":"merged-mr9cw285-111","sourceNo":191,"viRanges":[{"start":795.259007,"end":797.85}],"koRanges":[{"start":791.969152,"end":794.037738}]},{"id":159,"readerNo":160,"displayNo":194,"n":194,"kind":"sub","type":"merged","vi":"Vậy bụng cá ngừ và rượu soju cao cấp thì sao? Loại đắt tiền ấy.","ko":"그럼\n참치 대뱃살에 고급 소주\n각진 걸로 한잔?","en":"Then how about some tuna belly and luxurious soju?\nThe really pricey ones.","text":"Vậy bụng cá ngừ và rượu soju cao cấp thì sao? Loại đắt tiền ấy.\n그럼\n참치 대뱃살에 고급 소주\n각진 걸로 한잔?\nThen how about some tuna belly and luxurious soju?\nThe really pricey ones.","sourceUid":"merged-mr9cwpgi-112","sourceNo":194,"viRanges":[{"start":797.85,"end":803.155592}],"koRanges":[{"start":794.037738,"end":799.83106}]},{"id":160,"readerNo":161,"displayNo":196,"n":196,"kind":"sub","type":"merged","vi":"Suýt thì bị dụ dỗ. Thôi ngay nhé.\nTệ quá nhỉ?","ko":"[은정] 어허! 큰일 날 소리, 못 써\n아, 큰일이네, 어?","en":"Stop tempting me.\nThis is bad.","text":"Suýt thì bị dụ dỗ. Thôi ngay nhé.\nTệ quá nhỉ?\n[은정] 어허! 큰일 날 소리, 못 써\n아, 큰일이네, 어?\nStop tempting me.\nThis is bad.","sourceUid":"merged-mr9d2sds-113","sourceNo":196,"viRanges":[{"start":803.155592,"end":809.284897}],"koRanges":[{"start":799.83106,"end":806.033254}]},{"id":161,"readerNo":162,"displayNo":200,"n":200,"kind":"sub","type":"merged","vi":"Ngân sách của Giám đốc Go tháng này vẫn thuộc quỹ đội,\nnên còn nhiều lắm đấy.\n- Được tiêu đến khi nào? - Hôm nay thôi.","ko":"상무님 판공비 이번 달엔 우리 팀비로 들어와서\n- 엄청 남았는데 - [병수] 어\n언제까진데?\n- 오늘까지 써야 돼 - [은정] 아…","en":"Ms. Go's budget came into our team's account,\nso we have so much left over.\n-Until when do we have to use it? -Today.","text":"Ngân sách của Giám đốc Go tháng này vẫn thuộc quỹ đội,\nnên còn nhiều lắm đấy.\n- Được tiêu đến khi nào? - Hôm nay thôi.\n상무님 판공비 이번 달엔 우리 팀비로 들어와서\n- 엄청 남았는데 - [병수] 어\n언제까진데?\n- 오늘까지 써야 돼 - [은정] 아…\nMs. Go's budget came into our team's account,\nso we have so much left over.\n-Until when do we have to use it? -Today.","sourceUid":"merged-mr9d5pmv-116","sourceNo":200,"viRanges":[{"start":809.284897,"end":817.444595}],"koRanges":[{"start":806.033254,"end":813.951259}]},{"id":162,"readerNo":163,"displayNo":202,"n":202,"kind":"sub","type":"merged","vi":"Để lãng phí ngân sách đội thì thật không đáng mặt nhân viên.\nThế nên tôi đã mời cả phòng dự án.","ko":"팀비를 남기는 거는 회사원의 자세가 아니긴 한데\n[장우] 그래서 기획 팀들이랑 같이 먹기로 했어요","en":"A true team player should always use up the team budget.\nThat's why the project team is joining us.","text":"Để lãng phí ngân sách đội thì thật không đáng mặt nhân viên.\nThế nên tôi đã mời cả phòng dự án.\n팀비를 남기는 거는 회사원의 자세가 아니긴 한데\n[장우] 그래서 기획 팀들이랑 같이 먹기로 했어요\nA true team player should always use up the team budget.\nThat's why the project team is joining us.","sourceUid":"merged-mr9d6j8o-117","sourceNo":202,"viRanges":[{"start":817.444595,"end":824.953366}],"koRanges":[{"start":813.951259,"end":821.030445}]},{"id":163,"readerNo":164,"displayNo":204,"n":204,"kind":"sub","type":"merged","vi":"- Cô chưa chào hỏi bên đó mà. - Đúng đấy.\nĐúng không?","ko":"아직 인사도 못 했잖아\n- [장우] 그러니까 - [병수] 응","en":"-You haven't even met them yet. -Exactly.\nRight?","text":"- Cô chưa chào hỏi bên đó mà. - Đúng đấy.\nĐúng không?\n아직 인사도 못 했잖아\n- [장우] 그러 n't have one.\nYes, I do!\nStop lying!","text":"Này.\nMẹ cháu đâu? Hả?\nChừng nào mẹ mới đến?\nCậu ta không có mẹ.\nKhông phải, tớ có mẹ!\nCó đâu mà có!\n[여자] 얘\n너네 엄마 어디 있어? 응?\n엄마 언제 오냐고\n얘 엄마 없어\n아니야! 엄마 있어!\n[아이] 있긴 뭐가 있어\nHey.\nWhere's your mom?\nWhen is your mom coming?\nHe doesn't have one.\nYes, I do!\nStop lying!","sourceUid":"merged-mr9deti0-125","sourceNo":222,"viRanges":[{"start":856.070411,"end":869.475141}],"koRanges":[{"start":852.691248,"end":866.116463}]},{"id":175,"readerNo":176,"displayNo":225,"n":225,"kind":"sub","type":"merged","vi":"Tớ có bao giờ thấy mẹ cậu đến hội thi tài năng hay hội thao đâu!\nCậu làm gì có mẹ!\nCó đây!\nMẹ xem nào.","ko":"재롱 잔치 때도 체육 대회 때도 한 번도 안 왔잖아\n엄마가 있긴 어디 있어!\n[은정] 여기 있어!","en":"She didn't come to the talent show or to Sports Day!\nYou don't have a mom!\nYes, he does!\nLet me see.","text":"Tớ có bao giờ thấy mẹ cậu đến hội thi tài năng hay hội thao đâu!\nCậu làm gì có mẹ!\nCó đây!\nMẹ xem nào.\n재롱 잔치 때도 체육 대회 때도 한 번도 안 왔잖아\n엄마가 있긴 어디 있어!\n[은정] 여기 있어!\nShe didn't come to the talent show or to Sports Day!\nYou don't have a mom!\nYes, he does!\nLet me see.","sourceUid":"merged-mr9dghwj-126","sourceNo":225,"viRanges":[{"start":869.475141,"end":878.295801}],"koRanges":[{"start":866.116463,"end":873.164631}]},{"id":176,"readerNo":177,"displayNo":"N68","n":"N68","kind":"narration","type":"narration","vi":"Jo-Eun-Jeong Mọi người giật mình vì tiếng hét. Jo-Eun-Jeong thậm chí còn chưa cởi giày bước vào và la hét.","ko":"은정의 고함에 다들 화들짝 놀라고. 신발도 벗지 않은 채 쿵쿵거리며 들어와서 버럭버럭하는 은정.","en":"Deputy Manager (Jo Eun-jeong) Everyone was startled by the shouting. Deputy Manager (Jo Eun-jeong) came stomping in without even taking off his shoes and was yelling.","text":"Jo-Eun-Jeong Mọi người giật mình vì tiếng hét. Jo-Eun-Jeong thậm chí còn chưa cởi giày bước vào và la hét.\n은정의 고함에 다들 화들짝 놀라고. 신발도 벗지 않은 채 쿵쿵거리며 들어와서 버럭버럭하는 은정.\nDeputy Manager (Jo Eun-jeong) Everyone was startled by the shouting. Deputy Manager (Jo Eun-jeong) came stomping in without even taking off his shoes and was yelling.","sourceUid":"nar-mrbt11qw-r0lbl1","sourceNo":"N68","viRanges":[],"koRanges":[]},{"id":177,"readerNo":178,"displayNo":233,"n":233,"kind":"sub","type":"merged","vi":"Chết tiệt.\nCô là mẹ đây.\nSao A Ji lại không có mẹ?\nMẹ A Ji. Tôi xin lỗi, nhưng chị…\nCô giáo, trông tôi có bình tĩnh nổi không?\nKhông phải vậy.\nCô có thể cởi giày ra không?","ko":"봐 봐\n아이씨, 씨\n내가 엄마인데?\n우리 아지가 왜 엄마가 없어\n[교사] 아지 어머님 죄송한데 일단은…\n선생님, 제가 지금 진정하게 생겼어요?\n[교사] 아니, 그게 아니라\n저, 신발 좀…","en":"Darn it.\nI'm his mom.\nWhat do you mean he doesn't have a mom?\nMs. Cho. I'm sorry, but could you--\nDo you think I can calm down right now?\nThat's not what I meant.\nCould you take your shoes off?","text":"Chết tiệt.\nCô là mẹ đây.\nSao A Ji lại không có mẹ?\nMẹ A Ji. Tôi xin lỗi, nhưng chị…\nCô giáo, trông tôi có bình tĩnh nổi không?\nKhông phải vậy.\nCô có thể cởi giày ra không?\n봐 봐\n아이씨, 씨\n내가 엄마인데?\n우리 아지가 왜 엄마가 없어\n[교사] 아지 어머님 죄송한데 일단은…\n선생님, 제가 지금 진정하게 생겼어요?\n[교사] 아니, 그게 아니라\n저, 신발 좀…\nDarn it.\nI'm his mom.\nWhat do you mean he doesn't have a mom?\nMs. Cho. I'm sorry, but could you--\nDo you think I can calm down right now?\nThat's not what I meant.\nCould you take your shoes off?","sourceUid":"merged-mr9djn2k-129","sourceNo":233,"viRanges":[{"start":878.295801,"end":893.058603}],"koRanges":[{"start":873.164631,"end":889.694346}]},{"id":178,"readerNo":179,"displayNo":236,"n":236,"kind":"sub","type":"merged","vi":"[nhạc hài hước]\n[Người phụ nữ hết ho]","ko":"[익살스러운 음악]\n[여자의 헛기침]","en":"[humorous music]\n[Woman clears cough]","text":"[nhạc hài hước]\n[Người phụ nữ hết ho]\n[익살스러운 음악]\n[여자의 헛기침]\n[humorous music]\n[Woman clears cough]","sourceUid":"merged-mr9dkivb-130","sourceNo":236,"viRanges":[],"koRanges":[]},{"id":179,"readerNo":180,"displayNo":"N69","n":"N69","kind":"narration","type":"narration","vi":"Tôi xấu hổ nhưng giả vờ như không có và tự nhiên đá hai chân trái phải về phía giá để giày, đôi giày bay ra và đáp xuống giá giày.","ko":"당황했  He is fidgeting and following along with his bag.","text":"Song-A-Ji đang tức giận và đang đi loanh quanh với hai tay đút túi quần. Jo-Eun-Jeong Song-A-Ji Anh ấy đang bồn chồn và xách túi đi theo.\n화가 난 아지가 주머니에 손 넣고 씩씩거리며 걷고 있고. 은정이 아지 가방을 들고 안절부절 뒤따르고 있다.\nSong-A-Ji (Eun-jeong’s son) is angry and is walking around with his hands in his pockets. Deputy Manager (Jo Eun-jeong) Song-A-Ji (Eun-jeong’s son) He is fidgeting and following along with his bag.","sourceUid":"nar-mrbt1zm9-cpywlt","sourceNo":"N71","viRanges":[],"koRanges":[]},{"id":183,"readerNo":184,"displayNo":241,"n":241,"kind":"sub","type":"merged","vi":"Này, sao trẻ mẫu giáo mà lại đi cái dáng như thiếu niên tuổi dậy thì thế kia hả?\nCon muốn nổi loạn thì chọn phong cách trẻ mẫu giáo đi.","ko":"야, 왜 유치원생이 사춘기 중딩처럼 걸어\n[은정] 아니, 반항을 해도 유치원생처럼 하자","en":"Hey, why are you walking like a rebellious teenager?\nCan't you be a rebellious kindergartener instead?","text":"Này, sao trẻ mẫu giáo mà lại đi cái dáng như thiếu niên tuổi dậy thì thế kia hả?\nCon muốn nổi loạn thì chọn phong cách trẻ mẫu giáo đi.\n야, 왜 유치원생이 사춘기 중딩처럼 걸어\n[은정] 아니, 반항을 해도 유치원생처럼 하자\nHey, why are you walking like a rebellious teenager?\nCan't you be a rebellious kindergartener instead?","sourceUid":"merged-mr9dx5vy-133","sourceNo":241,"viRanges":[{"start":934,"end":942.820681},{"start":934,"end":939.818978}],"koRanges":[{"start":932,"end":938.356944}]},{"id":184,"readerNo":185,"displayNo":244,"n":244,"kind":"sub","type":"merged","vi":"Đèn xanh đã bật.\nXin mời qua đường.","ko":"[안내 음성] 파란불이 켜졌습니다\n건너가도 좋습니다","en":"The green light is on. You may cross the street.","text":"Đèn xanh đã bật.\nXin mời qua đường.\n[안내 음성] 파란불이 켜졌습니다\n건너가도 좋습니다\nThe green light is on. You may cross the street.","sourceUid":"merged-mr9dxuad-134","sourceNo":244,"viRanges":[{"start":942.820681,"end":963.768}],"koRanges":[{"start":938.356944,"end":963.392971}]},{"id":185,"readerNo":186,"displayNo":246,"n":246,"kind":"sub","type":"merged","vi":"- [Âm thanh đèn giao thôn k! - Có.\n- Chạy đi! - Kang Han Na!\nTrợ lý Park nữa!\n[용호] 야! 너 아빠를 국가적인 웃음거리로 만들고\n쟤 핸드폰 저거 뺏어\n- [한나] 어, 박 차장! - [영우] 네\n튀어, 튀어, 튀어\n야, 강한나!\n[용호] 박 차장 너…\nHey! You just made me a fool in front of the public. Confiscate her phone. -Mr. Park! -Yes. -Run! -Kang Han-na! And you!","sourceUid":"merged-mra44gis-28","sourceNo":377,"viRanges":[{"start":1468.863017,"end":1484.275075}],"koRanges":[{"start":1460.221042,"end":1479.622324}]},{"id":266,"readerNo":267,"displayNo":380,"n":380,"kind":"sub","type":"merged","vi":"Xin lỗi Chủ tịch.\nSao cậu lại để nó…\nThôi, bỏ đi.","ko":"[당황한 소리] 죄송합니다, 회장님 쟤 저대로 정말… [용호] 아휴, 아니다","en":"My apologies, sir.\nHow could you let her…\nNever mind.","text":"Xin lỗi Chủ tịch.\nSao cậu lại để nó…\nThôi, bỏ đi.\n[당황한 소리] 죄송합니다, 회장님 쟤 저대로 정말… [용호] 아휴, 아니다\nMy apologies, sir.\nHow could you let her…\nNever mind.","sourceUid":"merged-mra468z7-29","sourceNo":380,"viRanges":[{"start":1484.275075,"end":1491.473427}],"koRanges":[{"start":1479.622324,"end":1486.443084}]},{"id":267,"readerNo":268,"displayNo":382,"n":382,"kind":"sub","type":"ko","vi":"[Tiếng thở dài của Rồng Hổ]","ko":"[용호의 한숨]","en":"[Dragon Tiger's Sigh]","text":"[Tiếng thở dài của Rồng Hổ]\n[용호의 한숨]\n[Dragon Tiger's Sigh]","sourceUid":"ko-mr905ead-1253","sourceNo":382,"viRanges":[],"koRanges":[]},{"id":268,"readerNo":269,"displayNo":384,"n":384,"kind":"sub","type":"merged","vi":"Đến tôi còn chẳng cản được nó nữa là. Vậy tôi xin phép. - Này. - Vâng.","ko":"나도 못 말리는데 네가 무슨 힘으로\n저, 그럼 가 보겠습니다\n- 야 - [영우] 네?","en":"Even I can't keep her under control.\nI'll get going, sir.\n-Hey. -Yes, sir.","text":"Đến tôi còn chẳng cản được nó nữa là. Vậy tôi xin phép. - Này. - Vâng.\n나도 못 말리는데 네가 무슨 힘으로\n저, 그럼 가 보겠습니다\n- 야 - [영우] 네?\nEven I can't keep her under control.\nI'll get going, sir.\n-Hey. -Yes, sir.","sourceUid":"merged-mra47gy9-30","sourceNo":384,"viRanges":[{"start":1491.473427,"end":1499.141832}],"koRanges":[{"start":1486.443084,"end":1494.961922}]},{"id":269,"readerNo":270,"displayNo":387,"n":387,"kind":"sub","type":"merged","vi":"Cậu chịu nổi không? Tôi thăng chức cho cậu nhé?\nMau lên đi!\nBố bắt được là bị chửi điếc luôn đó!","ko":"버틸 만해? 승진시켜 줄까?\n아, 빨리 와!\n[한나] 아빠한테 잡히면 귀에서 피 난다니까?","en":"How are you holding up? Do you want a promotion?\nMr. Park, come here!\nDad will nag you until your ears bleed out.","text":"Cậu chịu nổi không? Tôi thăng chức cho cậu nhé?\nMau lên đi!\nBố bắt được là bị chửi điếc luôn đó!\n버틸 만해? 승진시켜 줄까?\n아, 빨리 와!\n[한나] 아빠한테 잡히면 귀에서 피 난다니까?\nHow are you holding up? Do you want a promotion?\nMr. Park, come here!\nDad will nag you until your ears bleed out.","sourceUid":"merged-mra4vfbb-32","sourceNo":387,"viRanges":[{"start":1499.141832,"end":1505.85945}],"koRanges":[{"start":1494.961922,"end":1500.592761}]},{"id":270,"readerNo":271,"displayNo":388,"n":388,"kind":"sub","type":"ko","vi":"[Âm thanh ngạc nhiên]","ko":"[놀란 소리]","en":"[Sound of surprise]","text":"[Âm thanh ngạc nhiên]\n[놀란 소리]\n[Sound of surprise]","sourceUid":"ko-mr905ead-1259","sourceNo":388,"viRanges":[],"koRanges":[]},{"id":271,"readerNo":272,"displayNo":390,"n":390,"kind":"sub","type":"merged","vi":"- Này. - Vâng, Chủ tịch. Tôi dám đảm bảo với cậu là con bé đó kiểu gì cũng gây chuyện. - Thế nên là… - Vâng.\nChỉ cần làm sao để thân thể nó không bị thương thôi.","ko":"- [용호] 야 - [영우] 네, 회장님\n[용호] 내가 장담하는데 저거 사고 친다, 반드시\n- 그니까 - [영우] 네\n몸만 성하게 안 다치게 하라고","en":"-Hey. -Yes, sir.\nI'm certain that she'll cause more trouble.\n-So just… -Yes, sir.\nKeep her from hurting herself.","text":"- Này. - Vâng, Chủ tịch. Tôi dám đảm bảo với cậu là con bé đó kiểu gì cũng gây chuyện. - Thế nên là… - Vâng.\nChỉ cần làm sao để thân thể nó không bị thương thôi.\n- [용호] 야 - [영우] 네, 회장님\n[용호] 내가 장담하는데 저거 사고 친다, 반드시\n- 그니까 - [영우] 네\n몸만 성하게 안 다치게 하라고\n-Hey. -Yes, sir.\nI'm certain that she'll cause more trouble.\n-So just… -Yes, sir.\nKeep her from hurting herself.","sourceUid":"merged-mra4ytdc-34","sourceNo":390,"viRanges":[{"start":1505.85945,"end":1519.413491}],"koRanges":[{"start":1500.592761,"end":1513.981967}]},{"id":272,"readerNo":273,"displayNo":397,"n":397,"kind":"sub","type":"merged","vi":"Còn đầu nó hết thuốc chữa rồi.\nCon bé điên. Nó giống ai không biết?\nCòn ai vào đây nữa?\nGiống bố chứ ai.","ko":"이건 어쩔 수 없고 아유, 저 미친 아, 저게 누굴 닮아서, 참 [근철] 닮긴 누굴 닮니? 나 닮았디","en":"Her mind is beyond help.\nThat lunatic. Who does she take after?\nWho do you think?\nShe takes after me.","text":"Còn đầu nó hết thuốc chữa rồi.\nCon bé điên. Nó giống ai không biết?\nCòn ai vào đây nữa?\nGiống bố chứ ai.\n이건 어쩔 수 없고 아유, 저 미친 아, 저게 누굴 닮아서, 참 [근철] 닮긴 누굴 닮니? 나 닮았디\nHer mind is beyond help.\nThat lunatic. Who does she take after?\nWho do you think?\nShe takes after me.","sourceUid":"merged-mra5062w-35","sourceNo":397,"viRanges":[{"start":1519.413491,"end":1535.042567}],"koRanges":[{"start":1513.981967,"end":1530.059898}]},{"id":273,"readerNo":274,"displayNo":399,"n":399,"kind":"sub","type":"merged","vi":"[Âm nhạc thú vị]\n[Hannah cười]","ko":"[흥미로운 음악]\n[한나의 웃음]","en":"[Interesting music]\n[Hannah laughs]","text":"[Âm nhạc thú vị]\n[Hannah cười]\n[흥미로운 음악]\n[한나의 웃음]\n[Interesting music]\n[Hannah laughs]","sourceUid":"merged-mra50cet-36","sourceNo":399,"viRanges":[],"koRanges":[]},{"id":274,"readerNo":275,"displayNo":"N102","n":"N102","kind":"narration","type":"narration","vi":"(Gật đầu tạm biệt rồi rời đi)","ko":"(꾸벅 인사하고 나간다)","en":"(Nodding goodbye and leaving)","text":"(Gật đầu tạm biệt rồi rời đi)\n(꾸벅 인사하고 나간다)\n(Nodding goodbye and leaving)","sourceUid":"nar-mrbysmmv-v31qh6","sourceNo":"N102","viRanges":[],"koRanges":[]},{"id":275,"readerNo":276,"displayNo":"N103","n":"N103","kind":"narration","type":"narration","vi":"Kang-Geun-Cheol (Kang Geun-cheol/Nam/Cuối thập niên 80) Xuất hiện trên xe lăn","ko":"왕회장(강근철/남/80대 후반) 휠체어를 타고 나타나서","en":"Chairman Kang (Kang-Geun-Cheol) (Kang Geun-cheol/Male/Late 80s) Appears in a wheelchair","text":"Kang-Geun-Cheol (Kang Geun-cheol/Nam/Cuối thập niên 80) Xuất hiện trên xe lăn\n왕회장(강근철/남/80대 후반) 휠체어를 타고 나타나서\nChairman n-Cheol) and Chairman Kang (Kang-Yong-Ho).","sourceUid":"nar-mrbytxbu-hod6ax","sourceNo":"N107","viRanges":[],"koRanges":[]},{"id":283,"readerNo":284,"displayNo":412,"n":412,"kind":"sub","type":"merged","vi":"Khi bố nói tôi sẽ làm ăn với đám lính Mỹ, ai cũng bảo bố là thằng điên. \"Kang Điên\". Biệt danh của bố đấy.\nBố ăn đi.","ko":"[근철] 내래 미군 놈들 상대로 사업한다 했을 때 [웃음]\n다들 나보고 미친놈이라고 했디\n'크레이지'가 내 별명이야\n식사하셔야죠","en":"When I said I was going to do business with the American soldiers,\neveryone called me a lunatic.\n\"Crazy Kang.\" That was my nickname.\nYou should eat.","text":"Khi bố nói tôi sẽ làm ăn với đám lính Mỹ, ai cũng bảo bố là thằng điên. \"Kang Điên\". Biệt danh của bố đấy.\nBố ăn đi.\n[근철] 내래 미군 놈들 상대로 사업한다 했을 때 [웃음]\n다들 나보고 미친놈이라고 했디\n'크레이지'가 내 별명이야\n식사하셔야죠\nWhen I said I was going to do business with the American soldiers,\neveryone called me a lunatic.\n\"Crazy Kang.\" That was my nickname.\nYou should eat.","sourceUid":"merged-mra5816g-42","sourceNo":412,"viRanges":[{"start":1574.069299,"end":1589.351304}],"koRanges":[{"start":1569.490299,"end":1584.13048}]},{"id":284,"readerNo":285,"displayNo":"N108","n":"N108","kind":"narration","type":"narration","vi":"Đường S#23/Han-Na Trên xe [Buổi sáng]","ko":"S#23 도로/한나 차 안[아침]","en":"S#23 Road/Han-Na In the car [Morning]","text":"Đường S#23/Han-Na Trên xe [Buổi sáng]\nS#23 도로/한나 차 안[아침]\nS#23 Road/Han-Na In the car [Morning]","sourceUid":"nar-mrbyupk6-dqnnzt","sourceNo":"N108","viRanges":[],"koRanges":[]},{"id":285,"readerNo":286,"displayNo":"N109","n":"N109","kind":"narration","type":"narration","vi":"Han-Na đang nhìn ra ngoài cửa sổ một chiếc ô tô đang di chuyển và cười như điên.","ko":"달리는 차 안 창밖을 보며 비식비식 웃고 있는 한나.","en":"Han-Na is looking out the window of a moving car and laughing like crazy.","text":"Han-Na đang nhìn ra ngoài cửa sổ một chiếc ô tô đang di chuyển và cười như điên.\n달리는 차 안 창밖을 보며 비식비식 웃고 있는 한나.\nHan-Na is looking out the window of a moving car and laughing like crazy.","sourceUid":"nar-mrbyurcn-f45u01","sourceNo":"N109","viRanges":[],"koRanges":[]},{"id":286,"readerNo":287,"displayNo":414,"n":414,"kind":"sub","type":"merged","vi":"Trong thế giới khốc liệt này, sao có thể thành công với một cái đầu tỉnh táo được?\nYong Ho à, con vẫn chưa hiểu ra à?\nHiểu gì ạ?\nKinh doanh ấy.","ko":"[근철] 이야, 이 험난한 세상에서\n제정신으로 성공할 수 있갔어, 어?\n용호야, 넌 왜 아직도 모르니?","en":"You think you can succeed in this cruel world with a sane mind?\nYong-ho, how come you still don't understand?\nUnderstand what?\nRunning a business.","text":"Trong thế giới khốc liệt này, sao có thể thành công với một cái đầu tỉnh táo được?\nYong Ho à, con vẫn chưa hiểu ra à?\nHiểu gì ạ?\nKinh doanh ấy.\n[근철] 이야, 이 험난한 세상에서\n제정신으로 성공할 수 있갔어, 어?\n용호야, 넌 왜 아직도 모르니?\nYou think you can succeed in this cruel world with a sane mind?\nYong-ho, how come you still don't understand?\nUnderstand what?\nRunning a business.","sourceUid":"merged-mra5acoq-45","sourceNo":414,"viRanges":[{"start":1589.351304,"end":1598.160374}],"koRanges":[{"start":1584.13048,"end":1593.365756}]},{"id":287,"readerNo":288,"displayNo":361,"n":361,"kind":"sub","type":"merged","vi":"Con vẫn kinh doanh bằng đầu đấy à?\nVậy phải kinh doanh bằng gì ạ?\nPhải dùng bản năng. Trực giác.\nVậy mới là thương nhân đích thực.","ko":"뭐가요?\n[근철] 아, 사업\n넌 사업을 여직 머리로 하니?\n그럼 뭘로 해요?\n- [흥미로운 음악] - 본능으로 해야디, 직감\n[근철] 그게 진짜 장사꾼이야","en":"Do you use your head to do business?\nWhat else should I use?\nUse your intuition. Your instincts.\nNow that's a true businessman.","text":"Con vẫn kinh doanh bằng đầu đấy à?\nVậy phải kinh doanh bằng gì ạ?\nPhải dùng bản năng. Trực giác.\nVậy mới là thương nhân đích thực.\n뭐가요?\n[근철] 아, 사업\n넌 사업을 여직 머리로 하니?\n그럼 뭘로 해요?\n- [흥미로운 음악] - 본능으로 해야디, 직감\n[근철] 그게 진짜 장사꾼이야\nDo you use your head to do business?\nWhat else should I use?\nUse your intuition. Your instincts.\nNow that's a true businessman.","sourceUid":"merged-mra5badk-46","sourceNo":361,"viRanges":[{"start":1598.160374,"end":1612.481066}],"koRanges":[{"start":1593.365756,"end":1608.49499}]},{"id":288,"readerNo":289,"displayNo":"N110","n":"N110","kind":"narration","type":"narration","vi":"S#24 Han-Na Trang chủ/Học tập (Buổi sáng]","ko":"S#24 한나 집/서재(아침]","en":"S#24 Han-Na Home/Study (Morning]","text":"S#24 Han-Na Trang chủ/Học tập (Buổi sáng]\nS#24 한나 집/서재(아침]\nS#24 Han-Na Home/Study (Morning]","sourceUid":"nar-mrbyvtst-es77i6","sourceNo":"N110","viRanges":[],"koRanges":[]},{"id":289,"readerNo":290,"displayNo":"N111","n":"N111","kind":"narration","type":"narration","vi":"Kang-Yong-Ho ngồi trong phòng làm việc và uống trà. Tôi cảm thấy không thoải mái nhưng cô thư ký ngồi phía trước cho tôi xem iPad.","ko":"서재에 앉아서 차 마시고 있는 강회장. 영 심기가 불편한데, 앞자리에 앉은 비서실장이 아이패드를 보여준다.","en":"Chairman Kang (Kang-Yong-Ho) sitting in the study and drinking tea. I feel uncomfortable, but the secretary sitting in front shows me the iPad.","text":"Kang-Yong-Ho ngồi trong phòng làm việc và uống trà. Tôi cảm thấy không thoải mái nhưng cô thư ký ngồi phía trước cho tôi xem iPad.\n서재에 앉아서 차 마시고 있는 강회장. 영 심기가 불편한데, 앞자리에 앉은 비서실장이 아이패드를 보여준다.\nChairman Kang (Kang-Yong-Ho) sitting in the study and drinking tea. I feel uncomfortable, but the secretary sitting in front shows me the iPad.","sourceUid":"nar-mrbyvv1r-qsnpca","sourceNo":"N111","viRanges":[],"koRanges":[]},{"id":290,"readerNo":291,"displayNo":427,"n":427,"kind":"sub","type":"merged","vi":"Chủ tịch, ngài xem đi ạ.\nGì thế?\nCHỦ TỊCH KANG TẬP ĐOÀN VC TẠO THIỆN CẢM VỚI HÌNH ẢNH GẦN GŨI\nPhản ứng tích cực thật đấy. Nhưng cũng chỉ toàn đám nhóc thôi.\nLần này cũng nhờ cô Han Na mà doanh số bán tủ lạnh mới\nđã tăng ba phần trăm.","ko":"[태완] 회장님, 이거 좀 보시죠\n뭔데?\n[용호] 뭐, 좋은 말들이긴 한데\n애들 떠드는 거야, 뭐\n이번에 한나 씨 덕분에 저희 냉장고 신제품\n매출 3% 올랐습니다","en":"Sir, please take a look.\nWhat is it?\nCHAIRMAN KANG OF VC GROUP ATTRACTS PUBLIC ATTENTION WITH HIS MODEST IMAGE\nThese are all flattering, but they're just kids talking.\nThe new refrigerator we launched had an increase in sales\nby three percent thanks to Ms. Kang.","text":"Chủ tịch, 안 됩니다\n왜?\n이건 아니죠","en":"Tell them what?\nThe reality so they won't have false hopes.\nYou can't do this, Ms. Go.\nWhy not?\nThis is wrong.","text":"Nói gì cơ?\nNói cho họ biết sự thật để họ khỏi ôm mộng.\nThật sự không nên đâu.\nTại sao?\nVì thế là sai.\n[병수] 뭐를요?\n헛꿈 꾸고 있을 애들한테 현실을 알려 줘야지\n상무님, 이거 안 됩니다\n왜?\n이건 아니죠\nTell them what?\nThe reality so they won't have false hopes.\nYou can't do this, Ms. Go.\nWhy not?\nThis is wrong.","sourceUid":"merged-mra62p0i-66","sourceNo":465,"viRanges":[{"start":1742.802837,"end":1755.685596}],"koRanges":[{"start":1737.602902,"end":1750.578054}]},{"id":317,"readerNo":318,"displayNo":466,"n":466,"kind":"sub","type":"merged","vi":"Ai cũng biết họ sẽ kế nhiệm, giờ cũng đang ồn ào lắm rồi.","ko":"[병수] 누가 봐도 차기 CD들인데 안 그래도 시끄러운 상황에서","en":"They're the future creative directors and things are already chaotic.","text":"Ai cũng biết họ sẽ kế nhiệm, giờ cũng đang ồn ào lắm rồi.\n[병수] 누가 봐도 차기 CD들인데 안 그래도 시끄러운 상황에서\nThey're the future creative directors and things are already chaotic.","sourceUid":"merged-mra63krd-67","sourceNo":466,"viRanges":[{"start":1755.685596,"end":1760.436994}],"koRanges":[{"start":1750.578054,"end":1754.784035}]},{"id":318,"readerNo":319,"displayNo":470,"n":470,"kind":"sub","type":"merged","vi":"Sẽ náo động một phen nhỉ?\nGiờ cô mà làm vậy thì sẽ không gánh nổi đâu.\nPhòng sáng tạo sẽ chia làm hai phe ngay.\nĐó là mục đích của tôi.","ko":"웅성웅성들 하지?\n지금 이러시면 이거\n감당 못 합니다 이러다 제작 팀 둘로 쪼개지죠\n[아인] 그러라고 하는 거야","en":"It's chaotic out there, right?\nIf you do this right now, things may get out of control.\nThe creative team will divide into two.\nThat's the goal.","text":"Sẽ náo động một phen nhỉ?\nGiờ cô mà làm vậy thì sẽ không gánh nổi đâu.\nPhòng sáng tạo sẽ chia làm hai phe ngay.\nĐó là mục đích của tôi.\n웅성웅성들 하지?\n지금 이러시면 이거\n감당 못 합니다 이러다 제작 팀 둘로 쪼개지죠\n[아인] 그러라고 하는 거야\nIt's chaotic out there, right?\nIf you do this right now, things may get out of control.\nThe creative team will divide into two.\nThat's the goal.","sourceUid":"merged-mra669uh-70","sourceNo":470,"viRanges":[{"start":1760.436994,"end":1769.06611}],"koRanges":[{"start":1754.784035,"end":1763.744035}]},{"id":319,"readerNo":320,"displayNo":473,"n":473,"kind":"sub","type":"merged","vi":"Sao cơ?\nTôi định chia làm hai phe.\nGiờ tất cả đều về phe của Giám đốc Choi.","ko":"네? 둘로 쪼개 놓으려고 [아인] 지금은 전부 최 상무 거니까","en":"Sorry?\nI'll split the team into two.\nEveryone is on Director Choi's side right now.","text":"Sao cơ?\nTôi định chia làm hai phe.\nGiờ tất cả đều về phe của Giám đốc Choi.\n네? 둘로 쪼개 놓으려고 [아인] 지금은 전부 최 상무 거니까\nSorry?\nI'll split the team into two.\nEveryone is on Director Choi's side right now.","sourceUid":"merged-mra67ht6-71","sourceNo":473,"viRanges":[{"start":1769.06611,"end":1776.856405}],"koRanges":[{"start":1763.744035,"end":1771.995746}]},{"id":320,"readerNo":321,"displayNo":474,"n":474,"kind":"sub","type":"merged","vi":"Nên nếu tôi không có được tất, thì cũng phải có được nửa chứ.","ko":"다 가지지 못할 거면 절반이라도 가져야겠지?","en":"So if I can't have everyone, the least I can do is take half.","text":"Nên nếu tôi không có được tất, thì cũng phải có được nửa chứ.\n다 가지지 못할 거면 절반이라도 가져야겠지?\nSo if I can't have everyone, the least I can do is take half.","sourceUid":"merged-mra687d6-72","sourceNo":474,"viRanges":[{"start":1776.856405,"end":1780.82992}],"koRanges":[{"start":1771.995746,"end":1775.734231}]},{"id":321,"readerNo":322,"displayNo":"N121","n":"N121","kind":"narration","type":"narration","vi":"Ngõ S#27 (Ban đêm)","ko":"S#27 골목길(밤]","en":"S#27 Alley (Night)","text":"Ngõ S#27 (Ban đêm)\nS#27 골목길(밤]\nS#27 Alley (Night)","sourceUid":"nar-mrbz9pkl-lrld77","sourceNo":"N121","viRanges":[],"koRanges":[]},{"id":322,"readerNo":323,"displayNo":"N122","n":"N122","kind":"narration","type":"narration","vi":"Một con hẻm tồi tàn ở ngoại ô Seoul, nơi tập trung những ngôi nhà nhiều thế hệ.","ko":"다세대 주택이 밀집한 서울 어느 외각의 허름한 골목길.","en":"A shabby alley on the outskirts of Seoul, where multi-generational houses are concentrated.","text":"Một con hẻm tồi tàn ở ngoại ô Seoul, nơi tập trung những ngôi nhà nhiều thế hệ.\n다세대 주택이 밀집한 서울 어느 외각의 허름한 골목길.\nA shabby alley on the outskirts of Seoul, where multi-generational houses are concentrated.","sourceUid":"nar-mrbz9qmy-5rnd70","sourceNo":"N122","viRanges":[],"koRanges":[]},{"id":323,"readerNo":324,"displayNo":"N123","n":"N123","kind":"narration","type":"narration","vi":"Sau khi kết thúc công việc, Go-A-In Mo đang leo đồi, trông có vẻ mệt mỏi.","ko":"일을 마친 아인 모가 지친 듯 언덕길을 오르고 있고.","en":"After finishing work, Go-A-In Mo is climbing the hill, looking tired.","text":"Sau khi kết thúc công việc, Go-A-In Mo đang leo đồi, trông có vẻ mệt mỏi.\n일을 마친 아인 모가 지친 듯 언덕길을 오르고 있고.\nAfter finishing work, Go-A-In Mo is climbing the hill, looking tired.","sourceUid":"nar-mrbz9t75-8qh5xm","sourceNo":"N123","viRanges":[],"koRanges":[]},{"id":324,"readerNo":325,"displayNo":"N124","n":"N124","kind":"narration","type":"narration","vi":"Khi tôi cảm thấy có ai đó đến từ phía sau, tôi giật mình và dừng lại tại chỗ.","ko":"뒤에서 인기척이 느껴지자 화들짝 놀라서 제자리에 멈춰 선다.","en":"When I feel someone coming from behind, I startle and stop in place.","text":"Khi tôi cảm thấy có ai đó đến từ phía sau, tôi giật mình và dừng lại tại chỗ.\n뒤에서 인기척이 느껴지자 화들짝 놀라서 제자리에 멈춰 선다.\nWhen I feel someone coming from behind, I startle and stop in place.","sourceUid":"nar-mrbz9uzr-u5wzsx","sourceNo":"N124","viRanges":[],"koRanges":[]},{"id":325,"readerNo":326,"displayNo":"N125","n":"N125","kind":"narration","type":"narration","vi":"Một người đi ngang qua nói, 'Cái gì vậy?' Chúng ta hãy đi ngang qua và nhìn vào Go-A-In với biểu cảm như thế này","ko":"지나가던 남자가 '뭐지?' 하는 표정으로 아인 모를 보고 지나가자","en":"A man passing by said, 'What is it?' Let's pass by and look at Go-A-In with an expression like this","text":"Một người đi ngang qua nói, 'Cái gì vậy?' Chúng ta hãy đi ngang qua và nhìn vào Go-A-In với biểu cảm như thế này\n지나가던 남자가 '뭐지?' 하는 표정으로 아인 모를 보고 지나가자\nA man passing by said, 'What is it?' Let's pass by and look at Go-A-In with an expression like this","sourceUid":"nar-mrbz9xg8-5sealy","sourceNo":"N125","viRanges":[],"koRanges":[]},{"id":326,"readerNo":327,"displayNo":"N126","n":"N126","kind":"narration","type":"narration","vi":"Chỉ khi đó tôi mới trấn tĩnh được trái tim đang hoảng hốt của mình và tăng tốc bước đi.","ko":"그제야 놀란 가슴을 달래며 걸음을 재촉한다.","en":"Only then do I calm my startled heart and accelerate my steps.","text":"Chỉ khi đó tôi mới trấn tĩnh được trái tim đang hoảng hốt của mình và tăng tốc bước đi.\n그제야 놀란 가슴을 달래며 걸음을 재촉한다.\nOnly then do I calm my startled heart and accelerate my steps.","sourceUid":"nar-mrbz9yod-ap4t00","sourceNo":"N126","viRanges":[],"koRanges":[]},{"id":327,"readerNo":328,"displayNo":416,"n":416,"kind":"sub","type":"merged","vi":"THUỐC TRÁNH THAI KHẨN CẤP\nNEMO TÌM KIẾM\n- [Tiếng côn trùng] - [Tiếng chó sủa]\n[âm nhạc đen tối]\n[Tiếng chìa khóa leng keng]\n[Âm nhạc êm dịu]\n[Thở nặng nhọc]\n[Ho]\n[thở dài]","ko":"- [풀벌레 소리] - [개 짖는 소리]\n[어두운 음악]\n[열쇠가 잘그랑거린다]\n[차분한 음악]\n[힘겨운 숨소리]\n[콜록거린다]\n[한숨]","en":"MORNING PILLS SEARCH - [Sound of insects] - [Sound of dog barking] [dark music] [Keys jingle] [Calm music] [Heavy breathing] [Coughing] [sigh]","text":"THUỐC TRÁNH THAI KHẨN CẤP\nNEMO TÌM KIẾM\n- [Tiếng côn trùng] - [Tiếng chó sủa]\n[âm nhạc đen tối]\n[Tiếng chìa khóa leng keng]\n[Âm nhạc êm dịu]\n[Thở nặng nhọc]\n[Ho]\n[thở dài]\n- [풀벌레 소리] - [개 짖는 소리]\n[어두운 음악]\n[열쇠가 잘그랑거린다]\n[차분한 음악]\n[힘겨운 숨소리]\n[콜록거린다]\n[한숨]\nMORNING PILLS SEARCH - [Sound of insects] - [Sound of dog barking] [dark music] [Keys jingle] [Calm music] [Heavy breathing] [Coughing] [sigh]","sourceUid":"merged-mra693l5-73","sourceNo":416,"viRanges":[],"koRanges":[]},{"id":328,"readerNo":329,"displayNo":"N127","n":"N127","kind":"narration","type":"narration","vi":"S#28 Go-A-In Tuyển dụng Bên ngoài + Bên trong [Đêm]","ko":"S#28 아인 모집밖 + 안[밤]","en":"S#28 Go-A-In Recruitment Outside + Inside [Night]","text":"S#28 Go-A-In Tuyển dụng Bên ngoài + Bên trong [Đêm]\nS#28 아인 모집밖 + 안[밤]\nS#28 Go-A-In Recruitment Outside + Inside [Night]","sourceUid":"nar-mrbza8dq-fsk51d","sourceNo":"N127","viRanges":[],"koRanges":[]},{"id":329,"readerNo":330,"displayNo":"N128","n":"N128","kind":"narration","type":"narration","vi":"Trước cửa tầng hầm của một ngôi nhà dành cho nhiều gia đình (trông mỏng manh và thơ mộng).","ko":"다세대 주택 지하 현관문(시로 만든 약해 보이는) 앞.","en":"In front of the basement front door of a multi-family home (which looks flimsy and made of poetry).","text":"Trước cửa tầng hầm của một ngôi nhà dành cho nhiều gia đình (trông mỏng manh và thơ mộng).\n다세대 주택 지하 현관문(시로 만든 약해 보이는) 앞.\nIn front of the basement front door of a multi-family home (which looks flimsy and made of poetry).","sourceUid":"nar-mrbza96w-6l81f9","sourceNo":"N128","viRanges":[],"koRanges":[]},{"id":330,"readerNo":331,"displayNo":"N129","n":"N129","kind":"narration","type":"narration","vi":"Go-A-In Mo lấy chìa khóa trong túi ra, trên đó có gắn ba chiếc chìa khóa (phím lục giác). Nếu nhìn vào cửa trước, bạn sẽ thấy có khoảng ba ổ khóa được lắp đặt bằng chi phí của mình.","ko":"아인 모가 가방에서 열쇠를 꺼내는데 세 개의 열쇠가(육각 열 쇠) 달려있다. 현관문을 보면 사비로 단 잠금장치가 세 개 개 쯤 있고.","en":"Go-A-In Mo takes out the key from the bag, and there are three keys (hexagon keys) attached. If you look at the front door, there are about three locks installed at your own expense.","text":"Go-A-In Mo lấy chìa khóa trong túi ra, trên đó có gắn ba chiếc chìa khóa (phím lục giác). Nếu nhìn vào cửa trước, bạn sẽ thấy có khoảng ba ổ khóa được lắp đặt bằng chi phí của mình.\n아인 모가 가방에서 열쇠를 꺼내는데 세 개의 열쇠가(육각 열 쇠) 달려있다. 현관문을 보면 사비로 단 잠금장치가 세 개 개 쯤 있고.\nGo-A-In Mo takes out the key from the bag, and there are three keys (hexagon keys) attached. If you look at the front door, there are about three locks installed at your own expense.","sourceUid":"nar-mrbzaatz-p2s2lk","sourceNo":"N129","viRanges":[],"koRanges":[]},{"id":331,"readerNo":332,"displayNo":"N130","n":"N130","kind":"narration","type":"narration","vi":"CẮT ĐẾN","ko":"CUT TO","en":"CUT TO","text":"CẮT ĐẾN\nCUT TO\nCUT TO","sourceUid":"nar-mrbzadrd-ue01lp","sourceNo":"N130","viRanges":[],"koRanges":[]},{"id":332,"readerNo":333,"displayNo":"N131","n":"N131","kind":"narration","type":"narration","vi":"Go-A-In Mo mở cửa trước và khóa lại nhiều ổ khóa.","ko":"현관문을 열고 들어온 아인 모가 다시 여러 개의 잠금장치를 잠그고.","en":"Go-A-In Mo opened the front door and locked several locks again.","text":"Go-A-In Mo mở cửa trước và khóa lại nhiều ổ khóa.\n현관문을 열고 들어온 아인 모가 다시 여러 개의 잠금장치를 잠그고.\nGo-A-In Mo opened the front door and locked several locks again.","sourceUid":"nar-mrbzaeis-zihq6k","sourceNo":"N131","viRanges":[],"koRanges":[]},{"id":333,"readerNo":334,"displayNo":"N132","n":"N132","kind":"narration","type":"narration","vi":"Tôi nghĩ có thể nó chưa được khóa đúng cách nên tôi đã khóa và mở khóa nhiều lần.","ko":"혹시나 잘 안 잠겼나 싶어서 여러 번 잠갔다가 풀었다가 반 복하곤.","en":"I thought it might not be locked properly, so I locked and unlocked it several times.","text":"Tôi nghĩ có thể nó chưa được khóa đúng cách nên tôi đã khóa và mở khóa nhiều lần.\n혹시나 잘 안 잠겼나 싶어서 여러 번 잠갔다가 풀었다가 반 복하곤.\nI thought it might not be locked properly, so I locked and unlocked it several times.","sourceUid":"nar-mrbzafh4-me1p0s","sourceNo":"N132","viRanges":[],"koRanges":[]},{"id":334,"readerNo":335,"displayNo":"N133","n":"N133","kind":"narration","type":"narration","vi":"Tôi lắc cửa để xem nó có mở hay không.","ko":"열리나 열리지 않나 문을 흔들어 본다.","en":"I shake the door to see if it opens or not.","text":"Tôi lắc cửa để xem nó có mở hay không.\n열리나 열리지 않나 문을 흔들어 본다.\nI shake the door to see if it opens or not.","sourceUid":"nar-mrbzagnn-wm43lr","sourceNo":"N133","viRanges":[],"koRanges":[]},{"id":335,"readerNo":336,"displayNo":"N134","n":"N134","kind":"narration","type":"narration","vi":"CẮT ĐẾN","ko":"CUT TO","en":"CUT TO","text":"CẮT ĐẾN\nCUT TO\nCUT TO","sourceUid":"nar-mrbzaibl-pbb5fs","sourceNo":"N134","viRanges":[],"koRanges":[]},{"id":336,"readerNo":337,"displayNo":"N135","n":"N135","kind":"narration","type":"narration","vi":"Sau khi tắm rửa xong, Go-A-In, cơ thể tôi dính đầy bột nhão. Tôi ấn một chút lên những miếng vá đã bong ra do nước và ấn chúng lại với nhau.","ko":"씻고 나온 아인 모 몸엔 파스투성이. 물 때문에 조금 떨어진 파스들을 다시 힘을 줘서 꾹꾹 눌러 붙이곤.","en":"After washing up, Go-A-In, my body was covered in paste. I put some pressure on the patches that had fallen off due to the water and pressed them back together.","text":"Sau khi tắm rửa xong, Go-A-In, cơ thể tôi dính đầy bột nhão. Tôi ấn một chút lên những miếng vá đã bong ra do nước và ấn chúng lại với nhau.\n씻고 나온 아인 모 몸엔 파스투성이. 물 때문에 조금 떨어진 파스들을 다시 힘을 줘서 꾹꾹 눌러 붙이곤.\nAfter washing up, Go-A-In, my body was covered in paste. I put some pressure on the patches that had fallen off due to the water and pressed them back together.","sourceUid":"nar-mrbzaq21-7gho2r","sourceNo":"N135","viRanges":[],"koRanges":[]},{"id":337,"readerNo":338,"displayNo":"N136","n":"N136","kind":"narration","type":"narration","vi":"Tôi lấy thuốc từ túi thuốc ra và ăn một nắm. Tôi cảm thấy buồn nôn, cúi xuống một lúc rồi chui vào chăn nằm xuống xem mình đã bình tĩnh lại chưa.","ko":"약봉투에서 약을 꺼내 한 움큼 먹는데. 속이 메슥거리는지 한동안 몸을 구부리고 있다가 진정이 되는지 이불 속에 들어가서 눕는다.","en":"I take out the medicine from the medicine bag and eat a handful. I feel nauseous and bend over for a while, then go under the blanket and lie down to see if I have calmed down.","text":"Tôi lấy thuốc từ túi thuốc ra và ăn một nắm. Tôi cảm thấy buồn nôn, cúi xuống một lúc rồi chui vào chăn nằm xuống xem mình đã bình tĩnh lại chưa.\n약봉투에서 약을 꺼내 한 움큼 먹는데. 속이 메슥거리는지 한동안 몸을 구부리고 있다가 진정이 되는지 이불 속에 들어가서 눕는다.\nI take out the medicine from the medicine bag and eat a handful. I feel nauseous and bend over for a while, then go under the blanket and lie down to see if I have calmed down.","sourceUid":"nar-mrbzav3e-ffvy6v","sourceNo":"N136","viRanges":[],"koRanges":[]},{"id":338,"readerNo":339,"displayNo":"N137","n":"N137","kind":"narration","type":"narration","vi":"Lấy điện thoại di động cũ bị hỏng màn hình của bạn ra và tìm kiếm n","type":"narration","vi":"Jo-Eun-Jeong, sau khi đi giày và mở cửa trước, tôi lén nhìn qua khe hở mà không đóng cửa lại. Cánh cửa vẫn chưa mở. Tôi thở dài và bước xuống hành lang căn hộ mà không còn chút sức lực nào.","ko":"은정, 신발 신고 현관문 열고 나간 후 문 닫지 않고 문틈으로 몰래 보고 있는데. 여전히 방문이 열리지 않는다. 한숨 쉬고는 기운 없이 터덕터덕 아파트 복도를 걸어간다.","en":"Deputy Manager (Jo Eun-jeong), after putting on my shoes and opening the front door, I was secretly looking through the gap without closing the door. The door is still not open. I sigh and walk down the apartment hallway without any energy.","text":"Jo-Eun-Jeong, sau khi đi giày và mở cửa trước, tôi lén nhìn qua khe hở mà không đóng cửa lại. Cánh cửa vẫn chưa mở. Tôi thở dài và bước xuống hành lang căn hộ mà không còn chút sức lực nào.\n은정, 신발 신고 현관문 열고 나간 후 문 닫지 않고 문틈으로 몰래 보고 있는데. 여전히 방문이 열리지 않는다. 한숨 쉬고는 기운 없이 터덕터덕 아파트 복도를 걸어간다.\nDeputy Manager (Jo Eun-jeong), after putting on my shoes and opening the front door, I was secretly looking through the gap without closing the door. The door is still not open. I sigh and walk down the apartment hallway without any energy.","sourceUid":"nar-mrbzdbek-tcotu7","sourceNo":"N151","viRanges":[],"koRanges":[]},{"id":362,"readerNo":363,"displayNo":508,"n":508,"kind":"sub","type":"merged","vi":"A Ji à, mẹ đi làm đây.\nCon đi đi.\nGì vậy?\nKhoan đã.\nNhưng nếu thất bại,\nMẹ đi nhé.\nMẹ đi thật đây.\nCon không ra thơm mẹ sao?\nVậy gặp lại con sau giờ làm nhé.","ko":"[은정] 아지야, 엄마 출근한다\n뭐야\n잠시만요\n간다\n진짜 가?\n뽀뽀 안 해 줄 거야?\n그럼 퇴근하고 봐","en":"A-ji, I'm off to work. What? Hold on. If this fails, I'm off. I'm really going. No kisses? I'll see you after work then.","text":"A Ji à, mẹ đi làm đây.\nCon đi đi.\nGì vậy?\nKhoan đã.\nNhưng nếu thất bại,\nMẹ đi nhé.\nMẹ đi thật đây.\nCon không ra thơm mẹ sao?\nVậy gặp lại con sau giờ làm nhé.\n[은정] 아지야, 엄마 출근한다\n뭐야\n잠시만요\n간다\n진짜 가?\n뽀뽀 안 해 줄 거야?\n그럼 퇴근하고 봐\nA-ji, I'm off to work. What? Hold on. If this fails, I'm off. I'm really going. No kisses? I'll see you after work then."," S#36 Agency/Production Team (Morning]","text":"Cơ quan/Đội sản xuất S#36 (Buổi sáng]\nS#36 대행사/제작팀(아침]\nS#36 Agency/Production Team (Morning]","sourceUid":"nar-mrc0ghjy-z8tio5","sourceNo":"N159","viRanges":[],"koRanges":[]},{"id":388,"readerNo":389,"displayNo":"N160","n":"N160","kind":"narration","type":"narration","vi":"Jo-Eun-Jeong chỉ đang nhìn vào máy tính với vẻ mặt trống rỗng...","ko":"멍한 표정으로 컴퓨터만 바라보고 있는 은정..","en":"Deputy Manager (Jo Eun-jeong) is just looking at the computer with a blank expression...","text":"Jo-Eun-Jeong chỉ đang nhìn vào máy tính với vẻ mặt trống rỗng...\n멍한 표정으로 컴퓨터만 바라보고 있는 은정..\nDeputy Manager (Jo Eun-jeong) is just looking at the computer with a blank expression...","sourceUid":"nar-mrc0gj41-91lm63","sourceNo":"N160","viRanges":[],"koRanges":[]},{"id":389,"readerNo":390,"displayNo":"N161","n":"N161","kind":"narration","type":"narration","vi":"Khi tôi nhìn vào máy tính, quảng cáo trên TV đang phát.","ko":"컴퓨터를 보면 TV 광고들이 플레이되고 있다.","en":"When I look at my computer, TV commercials are playing.","text":"Khi tôi nhìn vào máy tính, quảng cáo trên TV đang phát.\n컴퓨터를 보면 TV 광고들이 플레이되고 있다.\nWhen I look at my computer, TV commercials are playing.","sourceUid":"nar-mrc0gn4z-6dd45g","sourceNo":"N161","viRanges":[],"koRanges":[]},{"id":390,"readerNo":391,"displayNo":"N162","n":"N162","kind":"narration","type":"dialogue","vi":"Jo-Eun-Jeong: Những người rời bỏ ngành CD nhìn lại những quảng cáo họ đã làm. Tôi thực sự không hiểu… (Tôi đang nhìn chằm chằm vào màn hình máy tính và nhận ra rằng đó là lý do tại sao mọi chuyện lại như thế này…","ko":"은정:   업계 떠나는 씨디분들이 자기가 했던 광고들 다시 보는 거. 잘 이해 안 됐는데・・・ (멍하니 컴퓨터 모니터 보다가 이래서 그 랬구나...","en":"Deputy Manager (Jo Eun-jeong): CD people leaving the industry look back at the advertisements they did. I didn’t really understand... (I was staring blankly at the computer monitor and realized that’s why it was like this...","text":"Jo-Eun-Jeong: Những người rời bỏ ngành CD nhìn lại những quảng cáo họ đã làm. Tôi thực sự không hiểu… (Tôi đang nhìn chằm chằm vào màn hình máy tính và nhận ra rằng đó là lý do tại sao mọi chuyện lại như thế này…\n은정:   업계 떠나는 씨디분들이 자기가 했던 광고들 다시 보는 거. 잘 이해 안 됐는데・・・ (멍하니 컴퓨터 모니터 보다가 이래서 그 랬구나...\nDeputy Manager (Jo Eun-jeong): CD people leaving the industry look back at the advertisements they did. I didn’t really understand... (I was staring blankly at the computer monitor and realized that’s why it was like this...","sourceUid":"nar-mrc0grej-3jafni","sourceNo":"N162","viRanges":[],"koRanges":[]},{"id":391,"readerNo":392,"displayNo":"N163","n":"N163","kind":"narration","type":"narration","vi":"Jo-Eun-Jeong đang kiệt sức và đang xem những đoạn quảng cáo mà anh ấy đã phát sóng.","ko":"기운이 다 빠져서 자신이 온에어시켰던 광고들을 보고 있는 은정.","en":"Deputy Manager (Jo Eun-jeong) is exhausted and watching the commercials he had aired.","text":"Jo-Eun-Jeong đang kiệt sức và đang xem những đoạn quảng cáo mà anh ấy đã phát sóng.\n기운이 다 빠져서 자신이 온에어시켰던 광고들을 보고 있는 은정.\nDeputy Manager (Jo Eun-jeong) is exhausted and watching the commercials he had aired.","sourceUid":"nar-mrc0gwib-iti88v","sourceNo":"N163","viRanges":[],"koRanges":[]},{"id":392,"readerNo":393,"displayNo":"N164","n":"N164","kind":"narration","type":"dialogue","vi":"Jo-Eun-Jeong: Khi nhân viên viết sáng tạo của tôi lần đầu tiên được phát sóng, tôi có cảm giác như cả thế giới là của mình... tôi có nên thực sự bỏ cuộc không?","ko":"은정:   내 카피 처음 온에어됐을 땐 세상 다 내꺼 같았는데.. 진짜 그만둬야 하나..","en":"Deputy Manager (Jo Eun-jeong): When my copy first went on air, it felt like the world was mine... should I really quit?","text":"Jo-Eun-Jeong: Khi nhân viên viết sáng tạo của tôi lần đầu tiên được phát sóng, tôi có cảm giác như cả thế giới là của mình... tôi có nên thực sự bỏ cuộc không?\n은정:   내 카피 처음 온에어됐을 땐 세상 다 내꺼 같았는데.. 진짜 그만둬야 하나..\nDeputy Manager (Jo Eun-jeong): When my copy first went on air, it felt like the world was mine... should I really quit?","sourceUid":"nar-mrc0gypa-pj5f9m","sourceNo":"N164","viRanges":[],"koRanges":[] 5","n":"N165","kind":"narration","type":"narration","vi":"Jo-Eun-Jeong Khi tôi nhìn xung quanh để xem chuyện gì đang xảy ra, tôi thấy sáu người quản lý đã nhận được đánh giá nhân sự đang bùng nổ giận dữ.","ko":"은정이 뭔 일인가 싶어서 주의를 휙휙 둘러보면 인사평가 받은 여섯 부장이 분노를 폭발하고 있다.","en":"Deputy Manager (Jo Eun-jeong) When I looked around to see what was going on, I saw the six managers who had received personnel evaluations exploding with anger.","text":"Jo-Eun-Jeong Khi tôi nhìn xung quanh để xem chuyện gì đang xảy ra, tôi thấy sáu người quản lý đã nhận được đánh giá nhân sự đang bùng nổ giận dữ.\n은정이 뭔 일인가 싶어서 주의를 휙휙 둘러보면 인사평가 받은 여섯 부장이 분노를 폭발하고 있다.\nDeputy Manager (Jo Eun-jeong) When I looked around to see what was going on, I saw the six managers who had received personnel evaluations exploding with anger.","sourceUid":"nar-mrc0hfud-belgl5","sourceNo":"N165","viRanges":[],"koRanges":[]},{"id":397,"readerNo":398,"displayNo":"N166","n":"N166","kind":"narration","type":"narration","vi":"Phòng Quản lý Cơ quan/Nhân sự S#37 (ban ngày)","ko":"S#37 대행사/인사상무 방(낮)","en":"S#37 Agency/Human Resources Management Room (daytime)","text":"Phòng Quản lý Cơ quan/Nhân sự S#37 (ban ngày)\nS#37 대행사/인사상무 방(낮)\nS#37 Agency/Human Resources Management Room (daytime)","sourceUid":"nar-mrc0hijq-9m8al4","sourceNo":"N166","viRanges":[],"koRanges":[]},{"id":398,"readerNo":399,"displayNo":"N167","n":"N167","kind":"narration","type":"narration","vi":"Giám đốc điều hành của Insa đang nhàn nhã uống trà. Tôi rất ngạc nhiên sau khi nghe những lời của người quản lý.","ko":"여유롭게 차를 마시던 인사상무. 부장의 말을 듣고 화들짝 놀라며.","en":"The managing director of Insa was leisurely drinking tea. I was very surprised after hearing the manager’s words.","text":"Giám đốc điều hành của Insa đang nhàn nhã uống trà. Tôi rất ngạc nhiên sau khi nghe những lời của người quản lý.\n여유롭게 차를 마시던 인사상무. 부장의 말을 듣고 화들짝 놀라며.\nThe managing director of Insa was leisurely drinking tea. I was very surprised after hearing the manager’s words.","sourceUid":"nar-mrc0hln6-68da5q","sourceNo":"N167","viRanges":[],"koRanges":[]},{"id":399,"readerNo":400,"displayNo":498,"n":498,"kind":"sub","type":"vi","vi":"VĂN PHÒNG GIÁM ĐỐC SÁNG TẠO","ko":"","en":"","text":"VĂN PHÒNG GIÁM ĐỐC SÁNG TẠO","sourceUid":"vi-mr905aaf-498","sourceNo":498,"viRanges":[{"start":2262.619879,"end":2267.324851}],"koRanges":[]},{"id":400,"readerNo":401,"displayNo":567,"n":567,"kind":"sub","type":"ko","vi":"[Âm thanh của cú đập]","ko":"[쾅 내려치는 소리]","en":"[Sound of slam]","text":"[Âm thanh của cú đập]\n[쾅 내려치는 소리]\n[Sound of slam]","sourceUid":"ko-mr905eae-1438","sourceNo":567,"viRanges":[],"koRanges":[]},{"id":401,"readerNo":402,"displayNo":571,"n":571,"kind":"sub","type":"merged","vi":"Tưởng tôi sẽ ngồi im chịu trận à? Tôi sẽ không để cô ta yên.\nCô ấy đánh giá nhân sự sao? Đã đến kỳ đánh giá đâu.","ko":"절대 그냥 못 넘어가 [기호] 인사 평가를 했다고? 평가 시즌도 아닌데? [차 부장] 네, 그것도 [차 부장] 누가 뭐 그냥 가만있을 줄 아나, 씨","en":"I won't let her do this to us. I can't let this slide.\nShe evaluated your performance? It's not even the evaluation period.","text":"Tưởng tôi sẽ ngồi im chịu trận à? Tôi sẽ không để cô ta yên.\nCô ấy đánh giá nhân sự sao? Đã đến kỳ đánh giá đâu.\n절대 그냥 못 넘어가 [기호] 인사 평가를 했다고? 평가 시즌도 아닌데? [차 부장] 네, 그것도 [차 부장] 누가 뭐 그냥 가만있을 줄 아나, 씨\nI won't let her do this to us. I can't let this slide.\nShe evaluated your performance? It's not even the evaluation period.","sourceUid":"merged-mrae8m9g-22","sourceNo":571,"viRanges":[{"start":2267.324851,"end":2285.068528}],"koRanges":[{"start":2315.95484,"end":2343.410462}]},{"id":402,"readerNo":403,"displayNo":496,"n":496,"kind":"sub","type":"merged","vi":"Đúng, chưa kể chỉ có đội phó được tuyển dụng công khai. Giám đốc, cô ta điên rồi phải không? Chờ tôi kiểm tra đã.","ko":"공채 출신 부장들만요\n[헛웃음 치며] 상무님\n고 상무 완전 미친 거 아니에요?\n잠깐만, 확인 좀 해 보고","en":"Yes, and only the managers who got in with open recruitment.\nSir, has she lost her mind?\nWait, let me check.","text":"Đúng, chưa kể chỉ có đội phó được tuyển dụng công khai. Giám đốc, cô ta điên ","en":"Were you about to call me?","text":"Anh đang định gọi cho tôi sao?\n저한테 전화하려고 하셨죠?\nWere you about to call me?","sourceUid":"merged-mrafwuay-27","sourceNo":581,"viRanges":[{"start":2313,"end":2316.204421}],"koRanges":[{"start":2367,"end":2370.051156}]},{"id":407,"readerNo":408,"displayNo":582,"n":582,"kind":"sub","type":"ko","vi":"[Tiếng đặt xuống]","ko":"[달각 내려놓는 소리]","en":"[Sound of putting down]","text":"[Tiếng đặt xuống]\n[달각 내려놓는 소리]\n[Sound of putting down]","sourceUid":"ko-mr905eae-1453","sourceNo":582,"viRanges":[],"koRanges":[]},{"id":408,"readerNo":409,"displayNo":511,"n":511,"kind":"sub","type":"merged","vi":"Tôi là giám đốc phòng sáng tạo. Dĩ nhiên là tôi được tự đánh giá họ rồi.","ko":"그럼 제작 팀 인사 평가를 제작 본부장이 독단적으로 하지","en":"I'm the head of the team. Of course I'll evaluate them by myself.","text":"Tôi là giám đốc phòng sáng tạo. Dĩ nhiên là tôi được tự đánh giá họ rồi.\n그럼 제작 팀 인사 평가를 제작 본부장이 독단적으로 하지\nI'm the head of the team. Of course I'll evaluate them by myself.","sourceUid":"merged-mragbnin-29","sourceNo":511,"viRanges":[{"start":2333.427852,"end":2337.308504}],"koRanges":[{"start":2386.438762,"end":2390.340773}]},{"id":409,"readerNo":410,"displayNo":586,"n":586,"kind":"sub","type":"merged","vi":"Tuyệt đối không được.\nGiám đốc, sao đột nhiên anh lại làm việc sáng tạo vậy?\nGiờ vẫn còn quá sớm để cô tự đánh giá năng lực của họ.","ko":"절대 안 됩니다 [아인] 상무님 갑자기 일을 크리에이티브하게 하시네요? [기호] 며칠이나 됐다고 독단적으로 인사 평가를 합니까?","en":"I disapprove.\nWhy are you being creative all of a sudden?\nIt's too soon for you to evaluate their performance by yourself.","text":"Tuyệt đối không được.\nGiám đốc, sao đột nhiên anh lại làm việc sáng tạo vậy?\nGiờ vẫn còn quá sớm để cô tự đánh giá năng lực của họ.\n절대 안 됩니다 [아인] 상무님 갑자기 일을 크리에이티브하게 하시네요? [기호] 며칠이나 됐다고 독단적으로 인사 평가를 합니까?\nI disapprove.\nWhy are you being creative all of a sudden?\nIt's too soon for you to evaluate their performance by yourself.","sourceUid":"merged-mrafymlr-28","sourceNo":586,"viRanges":[{"start":2322,"end":2333.427852}],"koRanges":[{"start":2375,"end":2386.438762}]},{"id":410,"readerNo":411,"displayNo":588,"n":588,"kind":"sub","type":"merged","vi":"Chả lẽ tôi lại phải báo cáo với giám đốc dự án?","ko":"기획 본부장에게 보고하고 할까요?","en":"Am I to report to the chief project officer beforehand?","text":"Chả lẽ tôi lại phải báo cáo với giám đốc dự án?\n기획 본부장에게 보고하고 할까요?\nAm I to report to the chief project officer beforehand?","sourceUid":"merged-mragc92m-30","sourceNo":588,"viRanges":[{"start":2337.308504,"end":2340.176168}],"koRanges":[{"start":2390.340773,"end":2393.559909}]},{"id":411,"readerNo":412,"displayNo":592,"n":592,"kind":"sub","type":"merged","vi":"Anh hãy phê duyệt cuộc đánh giá đó đi.\nCô hãy nói lý do đột nhiên cô làm vậy trước đã.","ko":"인사 평가 승인해 주세요\n일단 좀 들어나 봅시다\n갑자기","en":"Please approve the evaluation.\nLet's hear your reasoning behind this sudden decision.","text":"Anh hãy phê duyệt cuộc đánh giá đó đi.\nCô hãy nói lý do đột nhiên cô làm vậy trước đã.\n인사 평가 승인해 주세요\n일단 좀 들어나 봅시다\n갑자기\nPlease approve the evaluation.\nLet's hear your reasoning behind this sudden decision.","sourceUid":"merged-mragd6vh-31","sourceNo":592,"viRanges":[{"start":2343,"end":2349.034581}],"koRanges":[{"start":2397,"end":2403.35768}]},{"id":412,"readerNo":413,"displayNo":593,"n":593,"kind":"sub","type":"merged","vi":"Sao cô chỉ đánh giá những người được tuyển dụng công khai? Anh biết mà.","ko":"그것도 공채 출신 부장들만 골라서 이러는 그 이유","en":"Specifically why you chose only those who got in with open recruitment.\nYou already know.","text":"Sao cô chỉ đánh giá những người được tuyển dụng công khai? Anh biết mà.\n그것도 공채 출신 부장들만 골라서 이러는 그 이유\nSpecifically why you chose only those who got in with open recruitment.\nYou already know.","sourceUid":"merged-mraggrhr-32","sourceNo":593,"viRanges":[{"start":2349.034581,"end":2354.474008}],"koRanges":[{"start":2403.358,"end":2407.119301}]},{"id":413,"readerNo":414,"displayNo":599,"n":599,"kind":"sub","type":"merged","vi":"Vì họ vô dụng.\nĐâu thể chỉ vì lý do đó mà cô làm vậy!\nCông ty không cần người tài sao?\nTôi không thể chấp thuận việc này được.\n- Vậy sao? - Phải.","ko":"아시잖아요\n쓸모없으니까\n겨우 그런 이유로 이러는 게 말이 됩니까?\n회사가 그런 곳 아닌가요?\n이번 건은 절대 통과 못 시켜 드립니다\n- [아인] 그래요? - 예","en":"Because they're useless.\nThat's not a good enough reason!\nDon't companies want useful employees?\nI can't approve of this.\n-Really? -No, I can't.","text":"Vì họ vô dụng.\nĐâu thể chỉ vì lý do đó mà cô làm vậy!\nCông ty không cần người tài sao?\nTôi không thể chấp thuận việc này được.\n- Vậy sao? - Phải.\n아시잖아요\n쓸모없으니까\n겨우 그런 이유로 이러는 게 말이 됩니까?\n회사가 그런 곳 아닌가요?\n이번 건은 절대 통과 못 시켜 드립니다\n- [아인] 그래요? - 예\nBecause they're useless.\nThat's not a good enough reason!\nDon't companies want useful employees?\nI can't approve of this.\n-Really? -No, I can't.","sourceUid":"merged-mragjqzx-35","sourceNo":599,"viRanges":[{"start":2354.474008,"end":2364.131849}],"koRanges":[{"start":2407.119301,"end":2417.974654}]},{"id":414,"readerNo":415,"displayNo":602,"n":602,"kind":"sub","type":"ko","vi":"[Âm nhạc ý nghĩa]","ko":"[의미심장한 음악]","en":"[Meaningful music]","text":"[Âm nhạc ý nghĩa]\n[의미심장한 음악]\n[Meaningful music]","sourceUid":"ko-mr905eae-1473","sourceNo":602,"viRanges":[],"koRanges":[]},{"id":415,"readerNo":416,"displayNo":604,"n":604,"kind":"sub","type":"merged","vi":"Vậy thì…\nAnh triệu tập họp ban giám đốc đi.\nHọp ban giám đốc sao?\nCô nghĩ họ sẽ chấp thuận à?","ko":"[아인] 그럼 임원 회의 소집해 주세요 임원 회의요? 이게 통과될 거 같으세요?","en":"Then… Please arrange a board meeting. A board meeting? You think they'll approve?","text":"Vậy thì…\nAnh triệu tập họp ban giám đốc đi.\nHọp ban giám đốc sao?\nCô nghĩ họ sẽ chấp thuận à?\n[아인] 그럼 임원 회의 소집해 주세요 임원 회의요? 이게 통과될 거 같으세요?\nThen… Please arrange a board meeting. A board meeting? You think they'll approve?","sourceUid":"merged-mragl9pk-36","sourceNo":604,"viRanges":[{"start":2365,"end":2379.033272}],"koRanges":[{"start":2417.974654,"end":2432.211138}]},{"id":416,"readerNo":417,"displayNo":608,"n":608,"kind":"sub","type":"m  open recruitment…\nWhat is it?\nOh, well.\nYou'll find out soon.\nWhat's this?","sourceUid":"merged-mrakigt7-52","sourceNo":646,"viRanges":[{"start":2542.730143,"end":2557.568938}],"koRanges":[{"start":2593.532312,"end":2611.364535}]},{"id":439,"readerNo":440,"displayNo":"N178","n":"N178","kind":"narration","type":"narration","vi":"S#42 Cơ quan/Phòng hội nghị (Ngày)","ko":"S#42 대행사/대회의실(낮)","en":"S#42 Agency/Conference Room (Day)","text":"S#42 Cơ quan/Phòng hội nghị (Ngày)\nS#42 대행사/대회의실(낮)\nS#42 Agency/Conference Room (Day)","sourceUid":"nar-mrc3jt9t-d5soyd","sourceNo":"N178","viRanges":[],"koRanges":[]},{"id":440,"readerNo":441,"displayNo":"N179","n":"N179","kind":"narration","type":"narration","vi":"Lãnh đạo hào hứng. Go-A-In cô đơn, im lặng và vô cảm.","ko":"웅성웅성한 임원들. 아인 혼자 말없이 무표정이다.","en":"Excited executives. Go-A-In is alone, silent and expressionless.","text":"Lãnh đạo hào hứng. Go-A-In cô đơn, im lặng và vô cảm.\n웅성웅성한 임원들. 아인 혼자 말없이 무표정이다.\nExcited executives. Go-A-In is alone, silent and expressionless.","sourceUid":"nar-mrc3jvj0-ti5aiz","sourceNo":"N179","viRanges":[],"koRanges":[]},{"id":441,"readerNo":442,"displayNo":555,"n":555,"kind":"sub","type":"merged","vi":"Về việc cách chức các quản lý sáng tạo,\ntôi có thể hiểu được.\nTôi nói thẳng luôn nhé.\nChúng ta đều biết việc họ ăn hối lộ nhưng vẫn bỏ qua mà.\nĐúng là vậy thật.","ko":"[기호] 예, 저번 CD들 인사는\n이해합니다, 솔직히 말씀드릴게요\n뭐, 다들 알지만 쉬쉬한 문제였죠 안 그렇습니까?\n[임원1] 뭐, 그러려니 했지만","en":"Regarding the demotion of creative directors,\nI completely understand.\nI'll be frank.\nWe knew about their misconduct but swept it under the rug.\nYes, we let them slide.","text":"Về việc cách chức các quản lý sáng tạo,\ntôi có thể hiểu được.\nTôi nói thẳng luôn nhé.\nChúng ta đều biết việc họ ăn hối lộ nhưng vẫn bỏ qua mà.\nĐúng là vậy thật.\n[기호] 예, 저번 CD들 인사는\n이해합니다, 솔직히 말씀드릴게요\n뭐, 다들 알지만 쉬쉬한 문제였죠 안 그렇습니까?\n[임원1] 뭐, 그러려니 했지만\nRegarding the demotion of creative directors,\nI completely understand.\nI'll be frank.\nWe knew about u nuts? Why would you quit? Come on, answer me. Why quit so suddenly?","sourceUid":"merged-mranijir-82","sourceNo":720,"viRanges":[{"start":2805,"end":2812.773061}],"koRanges":[{"start":2915.3,"end":2925.299592}]},{"id":476,"readerNo":477,"displayNo":724,"n":724,"kind":"sub","type":"merged","vi":"Chị bị bệnh à? Hay là… Thôi nào, chị nói gì đi. Trời ạ, người ta đang ăn mà cứ bắt nói. Chờ chút.","ko":"어디 아파요? 아님\n아, 뭐라고 말 좀…\n아, 왜 자꾸 먹고 있는데 말을 시켜\n[은정] 잠깐만","en":"Are you sick? Or…\nCome on, say something.\nDon't make me talk when I'm eating.\nWait.","text":"Chị bị bệnh à? Hay là… Thôi nào, chị nói gì đi. Trời ạ, người ta đang ăn mà cứ bắt nói. Chờ chút.\n어디 아파요? 아님\n아, 뭐라고 말 좀…\n아, 왜 자꾸 먹고 있는데 말을 시켜\n[은정] 잠깐만\nAre you sick? Or…\nCome on, say something.\nDon't make me talk when I'm eating.\nWait.","sourceUid":"merged-mranqu38-83","sourceNo":724,"viRanges":[{"start":2812.773061,"end":2822.739286}],"koRanges":[{"start":2916,"end":2925.272653},{"start":2925.299592,"end":2931.677871}]},{"id":477,"readerNo":478,"displayNo":726,"n":726,"kind":"sub","type":"merged","vi":"Tôi đã đắn đo về việc này từ lâu rồi.\nTôi nghĩ đã đến lúc rồi.","ko":"아니, 하루 이틀 한 고민도 아니고 이젠 때가 된 거 같아","en":"I've thought about this for a long time.\nI think it's time now.","text":"Tôi đã đắn đo về việc này từ lâu rồi.\nTôi nghĩ đã đến lúc rồi.\n아니, 하루 이틀 한 고민도 아니고 이젠 때가 된 거 같아\nI've thought about this for a long time.\nI think it's time now.","sourceUid":"merged-mraoi3nd-84","sourceNo":726,"viRanges":[{"start":2822.739286,"end":2827.4}],"koRanges":[{"start":2931.677871,"end":2939.875905}]},{"id":478,"readerNo":479,"displayNo":728,"n":728,"kind":"sub","type":"merged","vi":"Sao vậy? Vì con trai chị sao?\nTôi đâu thể bắt thằng bé sống như thể không có mẹ mãi được.","ko":"왜요, 아들 때문에요?\n엄마 없는 자식으로 언제까지 살게 하겠어","en":"Why? Because of your son?\nI can't let him stay as a motherless child.","text":"Sao vậy? Vì con trai chị sao?\nTôi đâu thể bắt thằng bé sống như thể không có mẹ mãi được.\n왜요, 아들 때문에요?\n엄마 없는 자식으로 nt to hold me back,\nthen you should at least\nput your position on the line like me.\nYou don't have anything to lose.","sourceUid":"merged-mrape7b6-97","sourceNo":756,"viRanges":[{"start":2907.098629,"end":2926.230535}],"koRanges":[{"start":3018.666064,"end":3037.344049}]},{"id":495,"readerNo":496,"displayNo":760,"n":760,"kind":"sub","type":"ko","vi":"[Hiệu ứng âm thanh tối]","ko":"[어두운 효과음]","en":"[Dark sound effect]","text":"[Hiệu ứng âm thanh tối]\n[어두운 효과음]\n[Dark sound effect]","sourceUid":"ko-mr905eaf-1631","sourceNo":760,"viRanges":[],"koRanges":[]},{"id":496,"readerNo":497,"displayNo":763,"n":763,"kind":"sub","type":"merged","vi":"Nhưng nếu tôi thành công,\nai trong số các vị muốn rời công ty đây?\nGiám đốc Choi có dám đánh cược\nchức vị của mình không?","ko":"대신 제가 성공하면 누가 회사 나가실래요? 우리 최 상무님께서 자리를 거시겠어요? 어떠세요, 최 상무님?","en":"But if I succeed,\nwho will leave the company?\nDo you want to put your position on the line,\nMr. Choi?","text":"Nhưng nếu tôi thành công,\nai trong số các vị muốn rời công ty đây?\nGiám đốc Choi có dám đánh cược\nchức vị của mình không?\n대신 제가 성공하면 누가 회사 나가실래요? 우리 최 상무님께서 자리를 거시겠어요? 어떠세요, 최 상무님?\nBut if I succeed,\nwho will leave the company?\nDo you want to put your position on the line,\nMr. Choi?","sourceUid":"merged-mraplhm8-98","sourceNo":763,"viRanges":[{"start":2926.230535,"end":2956.00858}],"koRanges":[{"start":3037.344049,"end":3067.996858}]},{"id":497,"readerNo":498,"displayNo":671,"n":671,"kind":"sub","type":"merged","vi":"Anh thấy thế nào?\nSao anh không đánh cược\nrằng tôi sẽ thất bại?\nKhông có ai à?","ko":"제가 실패한다에\n자리를 한번 걸어 보시죠\n없으신가요?","en":"What do you say? Why don't you bet against me that I'll fail? No one?","text":"Anh thấy thế nào?\nSao anh không đánh cược\nrằng tôi sẽ thất bại?\nKhông có ai à?\n제가 실패한다에\n자리를 한번 걸어 보시죠\n없으신가요?\nWhat do you say? Why don't you bet against me that I'll fail? No one?","sourceUid":"merged-mrapoygo-100","sourceNo":671,"viRanges":[{"start":2956.00858,"end":2981.901732}],"koRanges":[{" 8 tuổi) ngồi phía trước cũng đang bắn súng. Một bàn ăn với một bữa tiệc thịnh soạn. Bữa ăn dành cho gia đình Han-Na và gia đình Kim Seo-Jeong.\n한나 쏘아보고 있고, 정면에 앉은 서정(여/28세)도 쏘아본다. 진수성찬이 차려진 식탁. 한나네 가족과 서정네 가족의 식사 자리.\nHan-Na is shooting, and Kim Seo-Jeong (Daughter of Woowon Group) (female/28 years old) sitting in front is also shooting. A table set with a sumptuous feast. A meal for the Han-Na family and the Kim Seo-Jeong (Daughter of Woowon Group) family.","sourceUid":"nar-mrc4vuam-kjxjyw","sourceNo":"N197","viRanges":[],"koRanges":[]},{"id":517,"readerNo":518,"displayNo":"N198","n":"N198","kind":"narration","type":"dialogue","vi":"Kang-Yong-Ho: (E) Bị bỏng mặt. Cố lên. Tia laser đang phát ra từ mắt.","ko":"강회장:   (E) 얼굴 탄다. 타. 눈에서 레이저 나오겠어.","en":"Chairman Kang (Kang-Yong-Ho): (E) Face burns. Get on. Lasers are coming out of the eyes.","text":"Kang-Yong-Ho: (E) Bị bỏng mặt. Cố lên. Tia laser đang phát ra từ mắt.\n강회장:   (E) 얼굴 탄다. 타. 눈에서 레이저 나오겠어.\nChairman Kang (Kang-Yong-Ho): (E) Face burns. Get on. Lasers are coming out of the eyes.","sourceUid":"nar-mrc4weev-i433rt","sourceNo":"N198","viRanges":[],"koRanges":[]},{"id":518,"readerNo":519,"displayNo":"N199","n":"N199","kind":"narration","type":"narration","vi":"Lúc này hai người phụ nữ mới nhìn đi chỗ khác.","ko":"그제야 눈빛들을 거두는 두 여자.","en":"Only then did the two women look away.","text":"Lúc này hai người phụ nữ mới nhìn đi chỗ khác.\n그제야 눈빛들을 거두는 두 여자.\nOnly then did the two women look away.","sourceUid":"nar-mrc4wf3i-oj6p1n","sourceNo":"N199","viRanges":[],"koRanges":[]},{"id":519,"readerNo":520,"displayNo":819,"n":819,"kind":"sub","type":"merged","vi":"Trời ạ, thịt vẫn chưa chín hẳn này. Để con nướng thêm chút nữa nhé?","ko":"하, 참\n[근철] 이야, 야, 야, 야 이 고기래 덜 익었어, 야\n아버님, 좀 더 익혀서 드릴까요?","en":"Gosh, this meat is undercooked. Should I grill it more?","text":"Trời ạ, thịt vẫn chưa chín hẳn này. Để con nướng thêm chút nữa nhé?\n하, 참\n[근철] 이야, 야, 야, 야 이 고기래 덜 익었어, 야\n아버님, 좀 더 익혀서 드릴까요?\nGosh, this meat is undercooked. Should I grill it more?","sourceUid":"merged-mraqnbu0-124","sourceNo":819,"viRanges":[{"start":3182.427773,"end":3190.6}],"koRanges":[{"start":3298,"end":3303.000272}]},{"id":520,"readerNo":521,"displayNo":821,"n":821,"kind":"sub","type":"merged","vi":"Thế thì lại dai quá. Răng bố yếu lắm không nhai được nữa.\nÔng ơi, hay để cháu nhai hộ ông nhé?","ko":"[근철] 아, 그럼 질겨서 못 먹디 이도 성치 않은데, 응? [한나] 할아버지 그럼 내가 씹어서 줄까?","en":"Then it'll be too tough to chew. My teeth aren't healthy anymore.\nGrandpa, you want me to chew it for you?","text":"Thế thì lại dai quá. Răng bố yếu lắm không nhai được nữa.\nÔng ơi, hay để cháu nhai hộ ông nhé?\n[근철] 아, 그럼 질겨서 못 먹디 이도 성치 않은데, 응? [한나] 할아버지 그럼 내가 씹어서 줄까?\nThen it'll be too tough to chew. My teeth aren't healthy anymore.\nGrandpa, you want me to chew it for you?","sourceUid":"merged-mraqwecm-126","sourceNo":821,"viRanges":[{"start":3190.6,"end":3197.065052}],"koRanges":[{"start":3303.000272,"end":3308.618273}]},{"id":521,"readerNo":522,"displayNo":823,"n":823,"kind":"sub","type":"merged","vi":"Thay vì vậy, cháu nên bỏ cái thói đay nghiến người khác trên mạng đi.","ko":"씁, 너래 그 전화기로 SNS, 어?\n그걸로 사람들이나 씹지 말라우","en":"Before that, you should stop chewing people out on social media.","text":"Thay vì vậy, cháu nên bỏ cái thói đay nghiến người khác trên mạng đi.\n씁, 너래 그 전화기로 SNS, 어?\n그걸로 사람들이나 씹지 말라우\nBefore that, you should stop chewing people out on social media.","sourceUid":"merged-mraqwnqh-127","sourceNo":823,"viRanges":[{"start":3197.065052,"end":3201.840975}],"koRanges":[{"start":3308.618273,"end":3313.88884}]},{"id":522,"readerNo":523,"displayNo":824,"n":824,"kind":"sub","type":"ko","vi":"- [Seojeong cười] - [Hannah]...","ko":"- [서정이 풉 웃는다] - [한나] 씨…","en":"- [Seojeong laughs] - [Hannah]...","text":"- [Seojeong cười] - [Hannah]...\n- [서정이 풉 웃는다] - [한나] 씨…\n- [Seojeong laughs] - [Hannah]...","sourceUid":"ko-mr905eaf-1695","sourceNo":824,"viRanges":[],"koRanges":[]},{"id":523,"readerNo":524,"displayNo":826,"n":826,"kind":"sub","type":"
