">Live KO only</option><option value="vi-ko-vi">Dub VI → Live KO → Dub VI</option></select><input id="q" placeholder="Search..." oninput="render()"><button onclick="$('q').value='';render()">Clear/Refresh</button><button onclick="unlockAudio()">Unlock iPhone Audio</button><button onclick="showAudioPaths()">Audio paths</button></div><div class="settingsGrid"><div class="panel"><b>VI Dub</b><input id="viaf" type="file" accept="audio/*"><audio id="via" controls></audio><div class="volBox"><label>VI Volume</label><input id="viVol" type="range" min="0" max="200" step="1" value="100"><span id="viVolLabel">100%</span></div><div id="vip" style="white-space:pre-wrap;margin-top:8px"></div></div><div class="panel"><b>KO Live</b><input id="koaf" type="file" accept="audio/*"><audio id="koa" controls></audio><div class="volBox"><label>KO Volume</label><input id="koVol" type="range" min="0" max="200" step="1" value="100"><span id="koVolLabel">100%</span></div><div id="kop" style="white-space:pre-wrap;margin-top:8px;font-family:Malgun Gothic,Arial"></div></div></div></div></div><div class="wrap"><div id="list"></div></div><div class="float"><div class="row"><button class="good" onclick="playCurrent('vi')">VI Dub</button><button class="violet" onclick="playCurrent('ko')">KO Live</button><button class="warn" onclick="smart()">Smart</button><button class="stop" onclick="stopAll()">Stop</button></div></div><script>const project={"version":"READER_V6_DUB_VI_KO_LIVE_PROJECT","title":"Agency S01E03","movieTitle":"Agency","episodeTitle":"S01E03","githubSlug":"agency_s01e03","audioFolder":"../audio","viAudioFile":"agency_s01e03_VI_Dub.mp3","koAudioFile":"agency_s01e03_KO_Live.mp3","source":"Subtitle Dub VI + KO Live Cut Studio","blocks":[{"id":0,"readerNo":1,"displayNo":2,"n":2,"type":"narration","text":"CÔNG TY QUẢNG CÁO S01E03\n[Bài hát chủ đề]\n[Âm nhạc thần kinh]\n대행사 S01E03 [주제곡] [긴장되는 음악]\nAGENCY S01E03\n[Theme song]\n[Nervous music]","sourceUid":"merged-mr90aoy4-2715","sourceNo":2},{"id":1,"readerNo":2,"displayNo":3,"n":3,"type":"narration","text":"Chúng ta hãy quên hết những chuyện không hay trước đây.\n[아인] 그동안 있었던 앙금들 다 넘겨 버리시죠\nLet bygones be bygones.","sourceUid":"merged-mr90n48q-2","sourceNo":3},{"id":2,"readerNo":3,"displayNo":4,"n":4,"type":"narration","text":"Vậy tôi hy vọng từ ngày mai các anh sẽ có một khởi đầu mới ở công ty.\n내일부터 회사에서 새롭게 시작하기를 바라겠습니다\nThen I expect you to start anew at the company tomorrow.","sourceUid":"merged-mr90ohwj-3","sourceNo":4},{"id":3,"readerNo":4,"displayNo":6,"n":6,"type":"narration","text":"Nói chuyện với cô ta không thông. Phải hành động cho cô ta thấy.\n말로는 안 돼\n행동으로 보여 줘야지\nWe can't get through to her with words. We must take action.","sourceUid":"merged-mr90peln-4","sourceNo":6},{"id":4,"readerNo":5,"displayNo":8,"n":8,"type":"narration","text":"Giám đốc Choi biết không?\nCứ đi trước đã.\n[주 CD] 최 상무님은 아세요?\n[우철] 일단 가자\nDoes Mr. Choi know?\nLet's go first.","sourceUid":"merged-mr90vj5i-5","sourceNo":8},{"id":5,"readerNo":6,"displayNo":9,"n":9,"type":"narration","text":"Giờ này chắc cũng tới nơi rồi đây.\n슬슬 쳐들어올 때가 됐는데\nIt's about time they came.","sourceUid":"merged-mr90wbaz-6","sourceNo":9},{"id":6,"readerNo":7,"displayNo":12,"n":12,"type":"narration","text":"Này, Go A In.\nCô đang làm trò gì vậy?\nCô điên rồi à?\n야, 고아인\n지금 뭐 하는 겁니까?\n제정신이에요?\nHey, Go A-in.\nWhat do you think you're doing?\nAre you mad?","sourceUid":"merged-mr90ytvy-7","sourceNo":12},{"id":7,"readerNo":8,"displayNo":14,"n":14,"type":"narration","text":"Trời, ồn ào quá. Cũng đến lúc tôi hành động rồi nhỉ?\n[아인] 아, 시끄러워\n이제 나도 슬슬 움직여야겠네\nGosh, so noisy.\nI guess it's time for me to make a move.","sourceUid":"merged-mr910bij-8","sourceNo":14},{"id":8,"readerNo":9,"displayNo":15,"n":15,"type":"narration","text":"[Âm nhạc thú vị]\n[흥미로운 음악]\n[Interesting music]","sourceUid":"ko-mr905eab-886","sourceNo":15},{"id":9,"readerNo":10,"displayNo":12,"n":12,"type":"narration","text":"KHI SƯ TỬ BẮT ĐẦU SĂN MỒI CẢ KHU RỪNG CHÌM TRONG SỢ HÃI\nWHEN A LION BEGINS THE HUNT, THE JUNGLE TREMBLES IN FEAR","sourceUid":"merged-mr910nxy-9","sourceNo":12},{"id":10,"readerNo":11,"displayNo":17,"n":17,"type":"narration","text":"Anh làm cái gì vậy?\nGiám đốc Choi, anh bình tĩnh lại trước đi.\n뭐 하시는 겁니까? 최 상무님, 일단 진정하시죠\nWhat are you doing?\nMr. Choi. Please calm down.","sourceUid":"merged-mr911jd1-10","sourceNo":17},{"id":11,"readerNo":12,"displayNo":18,"n":18,"type":"narration","text":"Sao anh có thể phê duyệt khi chưa bàn bạc gì với tôi?\n[창수] 나한테 한마디 상의도 없이\n일을 이렇게 처리하면 어떻게 합니까?\nHow could you approve this without speaking a word to me?","sourceUid":"merged-mr91fz8j-13","sourceNo":18},{"id":12,"readerNo":13,"displayNo":20,"n":20,"type":"narration","text":"Anh nghĩ tôi làm việc cần đến sự cho phép của anh sao?\n제가 최 상무님한테 결재받고 일하는 사람입니까?\nI don't think I'm in a position where I need your approval.","sourceUid":"merged-mr91g861-14","sourceNo":20},{"id":13,"readerNo":14,"displayNo":22,"n":22,"type":"narration","text":"Không phải…\nTôi đâu có ý đó. Tôi chỉ thắc mắc tại sao…\n아니 [헛기침]\n그런 말이 아니잖습니까 왜 일을…\nI mean…\nThat's not what I meant. I was only asking why--","sourceUid":"merged-mr91h041-15","sourceNo":22},{"id":14,"readerNo":15,"displayNo":24,"n":24,"type":"narration","text":"Làm việc ở một công ty quảng cáo\nđâu có nghĩa phải sáng tạo trong mọi việc.\n[기호] 광고 대행사에 소속돼 있다고 모두가 일을 창의적으로 하는 건 아니지 않습니까?\nJust because you work for an ad agency\ndoesn't mean you have to be creative.","sourceUid":"merged-mr91iewo-16","sourceNo":24},{"id":15,"readerNo":16,"displayNo":25,"n":25,"type":"narration","text":"Phòng nhân sự chỉ cần làm việc theo quy định.\n인사 팀은 매뉴얼대로 할 수밖에 없습니다\nThe HR team has to play by the book.","sourceUid":"merged-mr91jxc5-17","sourceNo":25},{"id":16,"readerNo":17,"displayNo":26,"n":26,"type":"narration","text":"[âm nhạc đen tối]\n[어두운 음악]\n[dark music]","sourceUid":"ko-mr905eab-897","sourceNo":26},{"id":17,"readerNo":18,"displayNo":27,"n":27,"type":"narration","text":"\"Khoản 8, Quản lý nhân sự.\n[아인] '인사 관리 8항'\n\"Article 8 of Personnel.\"","sourceUid":"merged-mr91lfr8-18","sourceNo":27},{"id":18,"readerNo":19,"displayNo":28,"n":28,"type":"narration","text":"Giám đốc sáng tạo nắm toàn quyền nhân sự của các nhân viên phòng sáng tạo.\"\n'제작 본부장은 제작 팀 일원의 인사 권한을 총괄한다'\n\"The chief creative officer has the power to assign and reassign team members.\"","sourceUid":"merged-mr91neob-19","sourceNo":28},{"id":19,"readerNo":20,"displayNo":30,"n":30,"type":"narration","text":"Tôi hiểu ý của cô.\nNhưng giáng chức một loạt như vậy là quá nhiều.\n뭐, 상무님 뜻은 알겠습니다\n하나 한 번에 인원이 너무 많습니다\nI understand your intention.\nBut we're demoting too many at once.","sourceUid":"merged-mr91p32c-20","sourceNo":30},{"id":20,"readerNo":21,"displayNo":31,"n":31,"type":"narration","text":"Đối với một công ty, thường lệ cũng quan trọng như quyền hạn.\n권한만큼 관례도 중요한 게 회사 아닙니까?\nAuthority is crucial for a business, but so are its common practices.","sourceUid":"merged-mr91sja4-22","sourceNo":31},{"id":21,"readerNo":22,"displayNo":32,"n":32,"type":"narration","text":"\"Giám đốc sáng tạo nắm toàn quyền quản lý nhân sự phòng sáng tạo.\"\nTôi nói đúng chứ?\n'제작 팀 인사권은 제작 본부장에게 있다'\n맞습니까?\n\"The chief creative officer has the power to assign and reassign team members.\" Is that right?","sourceUid":"merged-mr91vh7m-25","sourceNo":32},{"id":22,"readerNo":23,"displayNo":35,"n":35,"type":"narration","text":"Không sai.\nĐúng là vậy nhưng như việc này quá khác thường.\n맞습니다 맞지만 아무도 그래도 이건 너무 상식 밖입니다\nYou're right.\nYou may be right, but this is too out of the ordinary.","sourceUid":"merged-mr91w02t-26","sourceNo":35},{"id":23,"readerNo":24,"displayNo":36,"n":36,"type":"narration","text":"Công việc của tôi chính là đấu tranh với thứ được gọi là lẽ thường.\n제 일이 상식이라는 고정 관념과의 싸움이라서요\nMy job is to think out of the ordinary.","sourceUid":"merged-mr91ywfh-27","sourceNo":36},{"id":24,"readerNo":25,"displayNo":37,"n":37,"type":"narration","text":"Còn công việc của tôi là duy trì và bảo vệ lẽ thường.\n제 일은 상식을 유지하고 지키는 겁니다\nAnd my job is to prevent things from getting out of hand.","sourceUid":"merged-mr91zhn1-28","sourceNo":37},{"id":25,"readerNo":26,"displayNo":38,"n":38,"type":"narration","text":"[âm nhạc đen tối]\n[어두운 음악]\n[dark music]","sourceUid":"ko-mr905eab-909","sourceNo":38},{"id":26,"readerNo":27,"displayNo":40,"n":40,"type":"narration","text":"Vừa được thăng chức mà cô đã làm thế này thì sẽ…\nvấp phải phản đối đấy.\n[기호] 임원 승진하시자마자 일 이렇게 하시면\n반발 나옵니다\nIf you do this right after your promotion,\nit might backfire.","sourceUid":"merged-mr92081h-29","sourceNo":40},{"id":27,"readerNo":28,"displayNo":43,"n":43,"type":"narration","text":"Phản đối ư?\nVì sợ vấp phải phản đối\nnên dù biết họ thiếu năng lực mà anh vẫn mặc kệ sao?\n반발이라…\n그게 무서워서\n여지껏 알면서도 방치하신 겁니까?\nBackfire?\nSo you neglected their incompetence for this long\nbecause you feared that it might backfire?","sourceUid":"merged-mr921vpo-30","sourceNo":43},{"id":28,"readerNo":29,"displayNo":40,"n":40,"type":"narration","text":"GO A IN GIÁM ĐỐC SÁNG TẠO\nGO A-IN","sourceUid":"merged-mr925fo5-32","sourceNo":40},{"id":29,"readerNo":30,"displayNo":45,"n":45,"type":"narration","text":"Chức danh của tôi là…\n\"giám đốc sáng tạo\".\n제 영어 직함이\n'치프 크리에이티브 오피서'\nMy position reads,\n\"chief creative officer.\"","sourceUid":"merged-mr923e06-31","sourceNo":45},{"id":30,"readerNo":31,"displayNo":48,"n":48,"type":"narration","text":"Tôi sẽ bố trí nhân sự một cách sáng tạo,\ncòn anh cứ việc tuân theo quy định.\nNhư thường lệ.\n[아인] 저는 인사부터 크리에이티브하게 갈 테니까\n상무님은 매뉴얼하게 진행해 주세요\n관례대로\nI will set up my team creatively\nand you can stick to the manual.\nJust like common practice.","sourceUid":"merged-mr9260no-33","sourceNo":48},{"id":31,"readerNo":32,"displayNo":50,"n":50,"type":"narration","text":"Đúng là vậy, nhưng chuyện này…\n하, 아무리 그래도 이걸…\n아휴\nBut still, this is…","sourceUid":"merged-mr9272uv-34","sourceNo":50},{"id":32,"readerNo":33,"displayNo":51,"n":51,"type":"narration","text":"[Thở dài của Changsu]\n[창수의 한숨]\n[Changsu’s sigh]","sourceUid":"ko-mr905eab-922","sourceNo":51},{"id":33,"readerNo":34,"displayNo":53,"n":53,"type":"narration","text":"Tôi xin lỗi vì đã lên giọng.\nLần sau, mong anh hãy bàn bạc trước với tôi.\n[창수] 언성이 좀 높았습니다\n다음번엔 상의를 좀 해 주세요\nI apologize for raising my voice.\nNext time, please discuss it with me.","sourceUid":"merged-mr928i5t-35","sourceNo":53},{"id":34,"readerNo":35,"displayNo":55,"n":55,"type":"narration","text":"Được, Giám đốc Choi.\nNếu nằm trong quyền hạn của tôi.\n네, 상무님\n제 권한 내에 있는 일이면\nSure, Mr. Choi.\nIf it's within my powers.","sourceUid":"merged-mr929nd3-36","sourceNo":55},{"id":35,"readerNo":36,"displayNo":58,"n":58,"type":"narration","text":"Giám đốc, cũng chính là giám đốc sáng tạo tôi đây,\nchỉ đang thực thi quyền hạn mà mình có thôi.\nCó vấn đề gì sao?\n상무\n즉, 제작 본부장인 제가 주어진 권한을 행사했는데\n무슨 문제라도 있습니까?\nI, the managing director and the chief creative officer,\nonly exercised the power that's been given to me.\nIs there a problem?","sourceUid":"merged-mr92bhyl-38","sourceNo":58},{"id":36,"readerNo":37,"displayNo":61,"n":61,"type":"narration","text":"Này, Go A In.\nTưởng mình nắm đằng chuôi thì được tùy tiện vung dao à?\n[우철] 야, 고아인\n칼자루 쥐여 줬다고 막 휘두르면 돼?\nGo A-in.\nYou think you can stab people around just because you got the blade?","sourceUid":"merged-mr92dfoe-39","sourceNo":61},{"id":37,"readerNo":38,"displayNo":62,"n":62,"type":"narration","text":"- [Nhạc thần kinh] - [Gầm gừ]\n- [긴장되는 음악] - [드르륵거린다]\n- [Nervous music] - [Roaring]","sourceUid":"ko-mr905eab-933","sourceNo":62},{"id":38,"readerNo":39,"displayNo":63,"n":63,"type":"narration","text":"[Thở hài lòng]\n[만족스러운 숨소리]\n[Satisfied breathing]","sourceUid":"ko-mr905eab-934","sourceNo":63},{"id":39,"readerNo":40,"displayNo":57,"n":57,"type":"narration","text":"DẪN DẮT TÔI, THEO SAU TÔI, KHÔNG THÌ TRÁNH RA, GEORGE S.PATTON\nLEAD ME, FOLLOW ME, OR GET OUT OF MY WAY","sourceUid":"merged-mr92ev2k-41","sourceNo":57},{"id":40,"readerNo":41,"displayNo":66,"n":66,"type":"narration","text":"Quả là một nội dung tuyệt vời, nhỉ?\n\"Dẫn dắt tôi,\ntheo sau tôi…\n…không thì tránh ra.\"\n참 좋은 카피예요, 그렇죠? [아인] '이끌든가' '따르든가'\n- '비키든가' - [긴장되는 효과음]\nWhat a great copy, don't you think?\n\"Lead me,\nfollow me…\n…or get out of my way.\"","sourceUid":"merged-mr92hzyx-43","sourceNo":66},{"id":41,"readerNo":42,"displayNo":68,"n":68,"type":"narration","text":"Các anh chọn một trong ba đi.\n셋 중 하나\n선택들 하세요\nChoose one of those three.","sourceUid":"merged-mr95yd2f-45","sourceNo":68},{"id":42,"readerNo":43,"displayNo":71,"n":71,"type":"narration","text":"Này, Go A In!\nCông ty mất hết kỷ cương rồi à?\n[우철] 야, 고아인!\n[아인] 회사 규율이 무너졌네요\nHey, Go A-in!\nIs company hierarchy a joke to you?","sourceUid":"merged-mr95ysrr-46","sourceNo":71},{"id":43,"readerNo":44,"displayNo":72,"n":72,"type":"narration","text":"Từ khi nào mà đội trưởng được quát vào mặt giám đốc vậy?\n팀장이 본부장한테 반말을 하질 않나\nHow can you talk disrespectfully to your superior?","sourceUid":"merged-mr95zj0o-47","sourceNo":72},{"id":44,"readerNo":45,"displayNo":74,"n":74,"type":"narration","text":"Anh lấy cớ giao việc cho công ty sản xuất\nđể ép họ chi tiền đi bar.\n일 준다는 핑계로 업체 팔목 비틀어서\n룸살롱 접대를 받질 않나\nYou forced the production company to serve you at bars\nby leading them on with job offers.","sourceUid":"merged-mr960465-48","sourceNo":74},{"id":45,"readerNo":46,"displayNo":76,"n":76,"type":"narration","text":"Thì ra là vụ đó.\nCô có chứng cứ không?\n[Woocheol cười] [Nhạc đen tối]\n아…\n그거였어?\n- 그, 증거 있습니까? \n[우철이 헛웃음 치며][어두운 음악]\nSo that's what this is about.\nDo you have proof?\n[Woocheol laughs] [Dark music]","sourceUid":"merged-mr962c4w-50","sourceNo":76},{"id":46,"readerNo":47,"displayNo":79,"n":79,"type":"narration","text":"Phải đấy. Cô có chứng cứ không?\nAi bắt ai chi tiền chứ?\n[김 CD] 그래요, 증거 있냐고요\n누가 술을 얻어먹습니까?\nThat's right. Do you have proof?\nWe didn't receive any favors.","sourceUid":"merged-mr963vqv-51","sourceNo":79},{"id":47,"readerNo":48,"displayNo":81,"n":81,"type":"narration","text":"Đạo diễn Jang, tôi nói không đúng sao?\nĐúng chứ.\nTôi hiểu ý anh là gì.\nNhưng anh sợ bị trả đũa chứ gì?\n[병수] 아니, 감독님 제 말이 맞지 않아요?\n[장 감독] 알죠, 예 한 부장님 말씀 잘 아는데\n- [문 탁 열리는 소리] - [아인] 보복이 두렵겠지\nDirector Jang, am I wrong?\nNo, you're not wrong.\nAnd I understand what you're saying.\nBut you're afraid of it backfiring.","sourceUid":"merged-mr99y40y-54","sourceNo":81},{"id":48,"readerNo":49,"displayNo":83,"n":83,"type":"narration","text":"Quản lý… À không, Giám đốc Go.\nDù muộn rồi nhưng mừng cô thăng chức.\nTôi là giám đốc sáng tạo kia mà.\n[장 감독] 저, CD… 아니, 상무님 [어색한 웃음]\n늦었지만 승진 축하드립니다\n내가 제작 본부장인데\nCreative Director… I mean, Managing Director Go.\nIt's late, but congratulations.\nI'm the chief creative officer.","sourceUid":"merged-mr9a1bu8-56","sourceNo":83},{"id":49,"readerNo":50,"displayNo":78,"n":78,"type":"narration","text":"Sao anh phải dè chừng quản lý sáng tạo?\nChuyện đó…\nVì tôi chỉ làm một năm?\n왜 CD들 눈치를 보지?\n아, 그게…\n1년짜리니까?\nWhy do you tiptoe around the creative directors?\nThat's because…\nBecause I'll only last a year?","sourceUid":"merged-mr9a2yv0-57","sourceNo":78},{"id":50,"readerNo":51,"displayNo":79,"n":79,"type":"narration","text":"Vì sau một năm, tôi sẽ trở thành\nĐạo diễn Jang thấy tôi hợp làm giáo sư hơn\ngiáo sư hoặc giám đốc công ty quảng cáo nhỏ?\nhay hợp làm giám đốc một công ty nhỏ hơn?\n[아인] 1년 있다가 교수나 작은 대행사 대표로 갈 거니까?\n교수가 어울릴 거 같아? 아님\n- [한숨] - 장 감독은 내가\n작은 대행사 대표가 어울릴 거 같아?\nBecause I'll become a professor\nIn your opinion, am I more suited to be a professor\nor a CEO of a small agency in a year?\nor a CEO of a small agency?","sourceUid":"merged-mr9a7zz7-61","sourceNo":79},{"id":51,"readerNo":52,"displayNo":94,"n":94,"type":"narration","text":"Giám đốc Go, tôi không có ý đó.\nCái tính khí này mà dạy nổi sinh viên chắc?\n상무님, 그런 뜻이 아니고요\n내 승질머리에 학교에서 애들 가르칠 수 있겠어?\nMs. Go, that's not what I meant.\nDo you think I can teach kids with my temper?","sourceUid":"merged-mr9afxyx-62","sourceNo":94},{"id":52,"readerNo":53,"displayNo":96,"n":96,"type":"narration","text":"Cứ cho tin đồn là đúng đi.\nCứ cho là sau một năm, tôi sẽ thành giám đốc một công ty quảng cáo nhỏ đi.\n소문이 맞다고 쳐\n[아인] 1년 있다가 작은 대행사 대표로 간다고 치자고\nLet's say the rumors are true.\nLet's assume I become a CEO of a small agency in a year.","sourceUid":"merged-mr9agqrc-63","sourceNo":96},{"id":53,"readerNo":54,"displayNo":98,"n":98,"type":"narration","text":"Nếu được thầu hết dự án của công ty nhỏ đó\nthì chẳng phải mua một tòa nhà ở Gangnam sẽ dễ như trở bàn tay sao?\n그 작은 대행사 대표가 일 몰아주면\nCF 감독 강남에 건물 하나 사는 거 쉬운 일 아니야?\nWouldn't it be a walk in the park\nto purchase a building in Gangnam with all the work I'll be giving you?","sourceUid":"merged-mr9ahm4z-64","sourceNo":98},{"id":54,"readerNo":55,"displayNo":99,"n":99,"type":"narration","text":"[Âm nhạc ý nghĩa]\n[의미심장한 음악]\n[Meaningful music]","sourceUid":"ko-mr905eac-970","sourceNo":99},{"id":55,"readerNo":56,"displayNo":101,"n":101,"type":"narration","text":"Nên tiếp tục đãi rượu họ để kiếm dự án\nhay đường hoàng làm việc với tôi?\n쟤네들한테 술 사 먹이면서 지저분하게 일할지\n나랑 깔끔하게 일할지\nDo you want to continue to serve them drinks\nor work with me the right way?","sourceUid":"merged-mr9aiplp-65","sourceNo":101},{"id":56,"readerNo":57,"displayNo":103,"n":103,"type":"narration","text":"Anh hãy tính toán rồi quyết định đi.\nAnh suy nghĩ đi nhé.\n장 감독이 계산기 돌려 보고 결정해\n[병수] 생각, 생각…\nIt's your decision.\nThink about it.","sourceUid":"merged-mr9ajz61-66","sourceNo":103},{"id":57,"readerNo":58,"displayNo":105,"n":105,"type":"narration","text":"[Giám đốc Jang thở dài]\n[Âm thanh thao tác của điện thoại di động]\n[장 감독의 한숨]\n[휴대전화 조작음]\n[Director Jang’s sigh]\n[Mobile phone operation sound]","sourceUid":"merged-mr9akn7r-67","sourceNo":105},{"id":58,"readerNo":59,"displayNo":108,"n":108,"type":"narration","text":"Hóa đơn mỗi lần tiếp rượu để đâu nhỉ?\nHÓA ĐƠN DỊCH VỤ\n우리, 그… 접대비 영수증 모아 놓은 거 어디 있지?\nWhere are the receipts for the drink services?\nSALES STATEMENT","sourceUid":"merged-mr9al3ai-68","sourceNo":108},{"id":59,"readerNo":60,"displayNo":109,"n":109,"type":"narration","text":"[Âm báo kết nối cuộc gọi]\n[Âm nhạc thú vị]\n[통화 연결음]\n[흥미로운 음악]\n[Call connection tone]\n[Interesting music]","sourceUid":"merged-mr9alibk-69","sourceNo":109},{"id":60,"readerNo":61,"displayNo":110,"n":110,"type":"narration","text":"Chà, hút máu người ta\nmà siêng năng và đều đặn quá.\n[아인] 참 성실하고 규칙적으로 빨아 드셨던데?\nYou leeched off of him\nso diligently and regularly.","sourceUid":"merged-mr9ankca-70","sourceNo":110},{"id":61,"readerNo":62,"displayNo":112,"n":112,"type":"narration","text":"Đó là thường lệ mà! Là lẽ thường tình trong ngành.\nThường lệ à?\n관례잖습니까, 관례!\n관례라…\nIt's a common practice!\nCommon practice?","sourceUid":"merged-mr9aomuo-71","sourceNo":112},{"id":62,"readerNo":63,"displayNo":114,"n":114,"type":"narration","text":"Sao tôi phải chạy theo thường lệ của các anh?\nVới cả,\n[아인] 여러분의 관례를 내가 왜 따라야 합니까?\n그리고\nWhy should I follow your common practice?\nAlso,","sourceUid":"merged-mr9apkxh-72","sourceNo":114},{"id":63,"readerNo":64,"displayNo":115,"n":115,"type":"narration","text":"nếu không thích vị trí mới thì tôi tìm cho vị trí khác nhé?\n이 인사 발령이 마음에 안 들면 다른 걸로 해 드릴까요?\nif you don't like your new position, shall I get you another one?","sourceUid":"merged-mr9aq8gx-73","sourceNo":115},{"id":64,"readerNo":65,"displayNo":120,"n":120,"type":"narration","text":"Tiền rượu của các anh được tính vào phí sản xuất và được công ty chi trả.\nNên tôi sẽ gửi cho phòng thanh tra\nđể được xét theo thường lệ mà các anh yêu thích\nvà sa thải các anh nhé?\n얻어먹은 술값들 제작비에 녹여서 회사로 청구됐을 테니까\n배임으로 본사 감사 팀에 보내서\n여러분이 좋아하는 관례대로\n해고시켜 드릴까요?\nSurely the drinks were part of the production fee\nand billed to the company.\nI can report you to the audit team,\nand according to the common practice,\nI can have you fired.","sourceUid":"merged-mr9as3vr-75","sourceNo":120},{"id":65,"readerNo":66,"displayNo":107,"n":107,"type":"narration","text":"TRUYỀN THÔNG VC GIÁM ĐỐC CHOI CHANG SU\nVC COMMUNICATIONS MANAGING DIRECTOR CHOI CHANG-SU","sourceUid":"merged-mr9at2ht-76","sourceNo":107},{"id":66,"readerNo":67,"displayNo":121,"n":121,"type":"narration","text":"[Âm nhạc ý nghĩa]\n[âm thanh rung của điện thoại di động]\n[의미심장한 음악]\n[휴대전화 진동음]\n[Meaningful music]\n[cell phone vibrating sound]","sourceUid":"merged-mr9at5qr-77","sourceNo":121},{"id":67,"readerNo":68,"displayNo":126,"n":126,"type":"narration","text":"Vâng, Giám đốc.\nCậu đang ở đâu?\nỞ đó đó ạ.\nĐó là đâu mới được?\n예, 상무님\n[창수] 어디야\n거기요\n[작게] 거기가 어디냐고!\nYes, sir.\nWhere are you?\nHere.\nBe more specific!","sourceUid":"merged-mr9atye3-78","sourceNo":126},{"id":68,"readerNo":69,"displayNo":131,"n":131,"type":"narration","text":"[âm nhạc đen tối]\nChỗ của Go A In.\nSao cậu lại đến đó?\nMau ra ngoài ngay!\nNhưng chúng tôi…\nĐừng có đổ thêm dầu vào lửa, ra ngoài đi.\n[어두운 음악]\n고아인…\n거길 왜 가!\n당장 나와!\n아니, 저희는…\n아, 밑장 더 드러내지 말고 나오라고!\n[dark music]\nGo A-in's office.\nWhy would you go there?\nGet out of there now!\nBut we…\nStop making the situation worse and get out of there.","sourceUid":"merged-mr9awftd-79","sourceNo":131},{"id":69,"readerNo":70,"displayNo":132,"n":132,"type":"narration","text":"- [Âm thanh thao tác của điện thoại di động] - [Cười]\n- [휴대전화 조작음] - [헛웃음]\n- [Mobile phone operation sound] - [Laughter]","sourceUid":"ko-mr905eac-1003","sourceNo":132},{"id":70,"readerNo":71,"displayNo":134,"n":134,"type":"narration","text":"Thú vị thật đấy.\nQuả nhiên là con giun xéo lắm cũng quằn.\n아, 재밌네\n꼴에 밟았다고 꿈틀하고\nThis is interesting. I guess even a worm does turn after all.","sourceUid":"merged-mr9axs9d-80","sourceNo":134},{"id":71,"readerNo":72,"displayNo":138,"n":138,"type":"narration","text":"Chết tiệt.\nCác anh.\nỞ đời không có rượu nào là miễn phí đâu.\nDư vị của rượu này kéo dài lâu hơn các anh tưởng, nhỉ?\n[우철] 아휴, 씨\n[아인] 여러분\n세상에 공짜 술은 없는 법이에요\n숙취가 생각보다\n길게 남네요, 그렇죠?\nDarn it.\nEveryone.\nThere is no such thing as free drinks in this world.\nWhat a bad hangover for you guys.","sourceUid":"merged-mr9b19do-83","sourceNo":138},{"id":72,"readerNo":73,"displayNo":140,"n":140,"type":"narration","text":"[Âm nhạc sôi động]\n[흥미진진한 음악]\n[Exciting music]","sourceUid":"ko-mr905eac-1011","sourceNo":140},{"id":73,"readerNo":74,"displayNo":142,"n":142,"type":"narration","text":"Vào dọn rác giúp tôi.\n들어와서 쓰레기 좀 치우세요\nCome and clean up the trash.","sourceUid":"merged-mr9b2ad3-85","sourceNo":142},{"id":74,"readerNo":75,"displayNo":125,"n":125,"type":"narration","text":"THƯ KÝ\nTRUYỀN THÔNG VC\nSECRETARY","sourceUid":"merged-mr9b364p-87","sourceNo":125},{"id":75,"readerNo":76,"displayNo":143,"n":143,"type":"narration","text":"[Âm thanh hoạt động]\n[Tiếng gõ cửa]\n[Âm thanh xào xạc]\n[조작음]\n[노크 소리]\n[부스럭 정리하는 소리]\n[Operation sound]\n[Knocking sound]\n[Sound of rustling]","sourceUid":"merged-mr9b2ow7-86","sourceNo":143},{"id":76,"readerNo":77,"displayNo":146,"n":146,"type":"narration","text":"Nhiều rác phải dọn thật đấy. Đúng không?\n[Âm nhạc ý nghĩa]\n정리해야 될 쓰레기들이 참 많아\n그렇죠?\n[의미심장한 음악]\nThere are so many pieces of trash to clean.\nWouldn't you agree?\n[Meaningful music]","sourceUid":"merged-mr9b3eoi-88","sourceNo":146},{"id":77,"readerNo":78,"displayNo":148,"n":148,"type":"narration","text":"Dạ?\nTiền bối, anh cứ mặc kệ vậy sao?\n네?\n선배님, 저거 그냥 두실 거예요?\nSorry?\nChang-su, will you just let this be?","sourceUid":"merged-mr9b8hdd-89","sourceNo":148},{"id":78,"readerNo":79,"displayNo":150,"n":150,"type":"narration","text":"Nhưng chúng tôi chỉ bảo cậu ta đãi rượu vài lần thôi chứ mấy.\n[주 CD] 아니 술 좀 얻어먹은 거 가지고\n[웃으며] 참 나\nI mean, being served a few drinks is no big deal.","sourceUid":"merged-mr9ba9fa-90","sourceNo":150},{"id":79,"readerNo":80,"displayNo":151,"n":151,"type":"narration","text":"[âm nhạc đen tối]\n[어두운 음악]\n[dark music]","sourceUid":"ko-mr905eac-1022","sourceNo":151},{"id":80,"readerNo":81,"displayNo":154,"n":154,"type":"narration","text":"Nếu phải gánh thêm mấy quả tạ này,\nthì cả mình cũng bị kéo xuống mất.\nTạm thời anh cứ hành động cẩn thận.\n[창수] 이것들 끌어안으면\n나까지 휩쓸려 갈 판인데\n떨어지는 가랑잎도 조심하고 있어\nIf I carry these pieces of baggage,\nthey'll end up bringing me down.\nTread carefully for now.","sourceUid":"merged-mr9bckzb-91","sourceNo":154},{"id":81,"readerNo":82,"displayNo":155,"n":155,"type":"narration","text":"Chuyện lọt ra ngoài là toi đấy.\n괜히 큰 소리 나면 나가리니까\nIf word gets out, you'll be finished.","sourceUid":"merged-mr9bdn6j-92","sourceNo":155},{"id":82,"readerNo":83,"displayNo":135,"n":135,"type":"narration","text":"Trước mắt,\nQuản lý Kim và Quản lý Joo.\n- Vâng. - Vâng.\nSang chi nhánh Trung Quốc đi.\nSao ạ?\n일단\n[창수] 김 CD, 주 CD\n[함께] 네\n중국 지사 가 있어\n네?\nFor now,\nDirector Kim and Joo.\n-Yes, sir. -Yes, sir.\nGo to the Chinese branch.\nWhat?","sourceUid":"merged-mr9bf7o9-93","sourceNo":135},{"id":83,"readerNo":84,"displayNo":142,"n":142,"type":"narration","text":"Giám đốc Choi.\nCòn cách nào sao?\nCô ta đang thực thi quyền hạn theo quy định công ty.\n아, 상무님\n방법 있어?\n회사 내규대로 권한 행사한 건데?\nMr. Choi.\nAny other ideas?\nAll she did was exercise her power within the regulations.","sourceUid":"merged-mr9bgq76-94","sourceNo":142},{"id":84,"readerNo":85,"displayNo":165,"n":165,"type":"narration","text":"Nhưng mà, tiền bối…\nKhông thấy nhục nhã sao?\n[우철] 아, 그래도 선배님\n[창수] 쪽팔리게, 씨, 쯧\nBut still, Chang-su…\nIsn't it humiliating?","sourceUid":"merged-mr9bhkei-95","sourceNo":165},{"id":85,"readerNo":86,"displayNo":166,"n":166,"type":"narration","text":"Các cậu muốn làm việc dưới trướng cấp dưới à?\n니들 팀원이었던 애들 밑에서 일할래?\nWorking under your own team members?","sourceUid":"merged-mr9bin7m-96","sourceNo":166},{"id":86,"readerNo":87,"displayNo":168,"n":168,"type":"narration","text":"Lâu lắm là một năm. Các cậu biết mà.\nSắp xếp đồ đạc đi.\n길어 봐야 1년이야, 알잖아\n바로 짐 싸\nShe'll last a year at most. You know that.\nGo pack up.","sourceUid":"merged-mr9bj78j-97","sourceNo":168},{"id":87,"readerNo":88,"displayNo":150,"n":150,"type":"narration","text":"Bây giờ ạ?\nCác cậu sẽ nghỉ phép nên đừng đến công ty.\nCơ hội…\nchỉ đến khi các cậu sống sót thôi.\n지, 지금요?\n[창수] 휴가 내 줄 테니까 회사 나오지 말고\n기회는\n살아 있어야 오는 거야\nRight now? You guys will be on leave, so don't come to work. Opportunity only comes… when you survive.","sourceUid":"merged-mr9bkgui-98","sourceNo":150},{"id":88,"readerNo":89,"displayNo":173,"n":173,"type":"narration","text":"[Kim CD thở dài]\n[CD chính thở dài]\n[김 CD의 한숨]\n[주 CD의 한숨]\n[Kim CD sighs]\n[The main CD sighs]","sourceUid":"merged-mr9bkngo-99","sourceNo":173},{"id":89,"readerNo":90,"displayNo":176,"n":176,"type":"narration","text":"[Byungsu thở dài]\n- [Thở dài của Eunjeong] - [Âm thanh thao tác nút]\n[병수의 한숨]\n- [은정의 한숨] - [버튼 조작음]\n[Byungsu’s sigh]\n- [Eunjeong's sigh] - [Button operation sound]","sourceUid":"merged-mr9bmojt-101","sourceNo":176},{"id":90,"readerNo":91,"displayNo":177,"n":177,"type":"narration","text":"Đi thôi.\nÔi trời, giờ mới dám thở.\n아, 이제야 한숨 돌리겠네\nLet's go.\nGosh, that was suffocating.","sourceUid":"merged-mr9bmj9t-100","sourceNo":177},{"id":91,"readerNo":92,"displayNo":178,"n":178,"type":"narration","text":"[Byungsu thở dài]\n[병수의 한숨]\n[Byungsu’s sigh]","sourceUid":"ko-mr905eac-1049","sourceNo":178},{"id":92,"readerNo":93,"displayNo":180,"n":180,"type":"narration","text":"Cậu cười cái gì vậy?\nĐây.\n[은정] 야, 뭐가 그렇게 좋아?\n[장우] 이거\nWhat are you smiling about? This.","sourceUid":"merged-mr9ckkog-102","sourceNo":180},{"id":93,"readerNo":94,"displayNo":185,"n":185,"type":"narration","text":"Nhưng mà sảng khoái thật đấy.\nVui quá ấy chứ. Đúng là đã cái nư.\n- Nhờ Giám đốc Go mà ta được hưởng sái. - Họ nên bị thế này từ lâu rồi mới phải.\nCũng dễ hiểu.\n[직원1] 그래도 속 시원하지 않아요?\n[직원2] 아, 너무 좋아요 속이 다 시원하네\n[직원3] 고 상무님 덕분에 우리한테도 이런 일이 생기네\n[직원2] 너무 좋다 진작에 이랬어야 되는데\n아, 하긴\nI'm glad that they are gone. It's great. Good riddance. -This is all thanks to Ms. Go. -This should've happened long ago. I get it.","sourceUid":"merged-mr9cozk7-105","sourceNo":185},{"id":94,"readerNo":95,"displayNo":189,"n":189,"type":"narration","text":"Copywriter dốc sức viết để rồi bị phá hỏng vì quản lý chỉ chọn ra mắt sản phẩm cùng nhà sản xuất nào biết nịnh bợ. Nghĩ mà nản. Vậy giờ tính sao?\n이야, 영혼을 갈아 넣어서 카피 썼는데\nCD가 접대하는 업체랑만 일해서 제작물 퀄리티 개판 나면\n으, 생각만 해도\n[병수] 그럼 어떻게\nIt'd really suck for the copywriter to have their work ruined\nbecause their creative director only works with productions that kiss up to them.\nSo what should we do?","sourceUid":"merged-mr9cv8xe-109","sourceNo":189},{"id":95,"readerNo":96,"displayNo":190,"n":190,"type":"narration","text":"Làm vài chén với thịt bò Hàn xinh đẹp để kỷ niệm nhé?\n또 기념으로 예쁘게 생긴 투 플에 어떻게, 한잔해야 되나?\nHow about going out for a drink with some beautiful Korean beef?","sourceUid":"merged-mr9cvh12-110","sourceNo":190},{"id":96,"readerNo":97,"displayNo":191,"n":191,"type":"narration","text":"Không được, tôi phải về chơi với con.\n안 돼요, 아들이랑 놀아 줘야 돼요\nNo, I have a date with my son.","sourceUid":"merged-mr9cw285-111","sourceNo":191},{"id":97,"readerNo":98,"displayNo":194,"n":194,"type":"narration","text":"Vậy bụng cá ngừ và rượu soju cao cấp thì sao? Loại đắt tiền ấy.\n그럼\n참치 대뱃살에 고급 소주\n각진 걸로 한잔?\nThen how about some tuna belly and luxurious soju?\nThe really pricey ones.","sourceUid":"merged-mr9cwpgi-112","sourceNo":194},{"id":98,"readerNo":99,"displayNo":196,"n":196,"type":"narration","text":"Suýt thì bị dụ dỗ. Thôi ngay nhé.\nTệ quá nhỉ?\n[은정] 어허! 큰일 날 소리, 못 써\n아, 큰일이네, 어?\nStop tempting me.\nThis is bad.","sourceUid":"merged-mr9d2sds-113","sourceNo":196},{"id":99,"readerNo":100,"displayNo":200,"n":200,"type":"narration","text":"Ngân sách của Giám đốc Go tháng này vẫn thuộc quỹ đội,\nnên còn nhiều lắm đấy.\n- Được tiêu đến khi nào? - Hôm nay thôi.\n상무님 판공비 이번 달엔 우리 팀비로 들어와서\n- 엄청 남았는데 - [병수] 어\n언제까진데?\n- 오늘까지 써야 돼 - [은정] 아…\nMs. Go's budget came into our team's account,\nso we have so much left over.\n-Until when do we have to use it? -Today.","sourceUid":"merged-mr9d5pmv-116","sourceNo":200},{"id":100,"readerNo":101,"displayNo":202,"n":202,"type":"narration","text":"Để lãng phí ngân sách đội thì thật không đáng mặt nhân viên.\nThế nên tôi đã mời cả phòng dự án.\n팀비를 남기는 거는 회사원의 자세가 아니긴 한데\n[장우] 그래서 기획 팀들이랑 같이 먹기로 했어요\nA true team player should always use up the team budget.\nThat's why the project team is joining us.","sourceUid":"merged-mr9d6j8o-117","sourceNo":202},{"id":101,"readerNo":102,"displayNo":204,"n":204,"type":"narration","text":"- Cô chưa chào hỏi bên đó mà. - Đúng đấy.\nĐúng không?\n아직 인사도 못 했잖아\n- [장우] 그러니까 - [병수] 응\n-You haven't even met them yet. -Exactly.\nRight?","sourceUid":"merged-mr9d7e75-118","sourceNo":204},{"id":102,"readerNo":103,"displayNo":209,"n":209,"type":"narration","text":"Đã vậy thì chốt.\nNhưng tôi sẽ ăn như vũ bão ở tăng một thôi\nrồi phải về nhà chịu trận.\nĐừng giữ tôi lại đấy?\n- Được rồi. - Đi thôi.\n- 그렇다면 콜 - [병수, 장우의 웃음]\n[은정] 단, 1차에서 전투적으로 때려 먹고\n난 집에 가서 장렬히 전사할 거니까\n- [엘리베이터 도착음] - 잡지 마세요, 오케이?\n- [병수, 장우] 오케이 - [은정] 갑시다\nAll right. Fine.\nBut I'm going to eat like a warrior\nand go home early.\nSo don't stop me, okay?\n-Okay. -Let's go.","sourceUid":"merged-mr9d9r04-121","sourceNo":209},{"id":103,"readerNo":104,"displayNo":210,"n":210,"type":"narration","text":"[âm thanh rung của điện thoại di động]\n[휴대전화 진동음]\n[cell phone vibrating sound]","sourceUid":"ko-mr905eac-1081","sourceNo":210},{"id":104,"readerNo":105,"displayNo":213,"n":213,"type":"narration","text":"Khoan đã. Vâng, mẹ ạ. Dạ?\n어, 잠깐만요\n네, 어머니\n네?\nHold on. Yes, Mother. What?","sourceUid":"merged-mr9datay-122","sourceNo":213},{"id":105,"readerNo":106,"displayNo":215,"n":215,"type":"narration","text":"A Ji đánh nhau ở trường mẫu giáo. Họ bảo con phải đến đấy.\n[정숙] 아지가 유치원에서 싸웠다는데 꼭 너보고 오란다\nA-ji had a fight at kindergarten.\nAnd they asked for you.","sourceUid":"merged-mr9dbuqy-123","sourceNo":215},{"id":106,"readerNo":107,"displayNo":216,"n":216,"type":"narration","text":"- [Âm nhạc thú vị] - [Cằn nhằn]\n- [흥미로운 음악] - [씩씩거린다]\n- [Interesting music] - [Grunting]","sourceUid":"ko-mr905eac-1087","sourceNo":216},{"id":107,"readerNo":108,"displayNo":222,"n":222,"type":"narration","text":"Này.\nMẹ cháu đâu? Hả?\nChừng nào mẹ mới đến?\nCậu ta không có mẹ.\nKhông phải, tớ có mẹ!\nCó đâu mà có!\n[여자] 얘\n너네 엄마 어디 있어? 응?\n엄마 언제 오냐고\n얘 엄마 없어\n아니야! 엄마 있어!\n[아이] 있긴 뭐가 있어\nHey.\nWhere's your mom?\nWhen is your mom coming?\nHe doesn't have one.\nYes, I do!\nStop lying!","sourceUid":"merged-mr9deti0-125","sourceNo":222},{"id":108,"readerNo":109,"displayNo":225,"n":225,"type":"narration","text":"Tớ có bao giờ thấy mẹ cậu đến hội thi tài năng hay hội thao đâu!\nCậu làm gì có mẹ!\nCó đây!\nMẹ xem nào.\n재롱 잔치 때도 체육 대회 때도 한 번도 안 왔잖아\n엄마가 있긴 어디 있어!\n[은정] 여기 있어!\nShe didn't come to the talent show or to Sports Day!\nYou don't have a mom!\nYes, he does!\nLet me see.","sourceUid":"merged-mr9dghwj-126","sourceNo":225},{"id":109,"readerNo":110,"displayNo":233,"n":233,"type":"narration","text":"Chết tiệt.\nCô là mẹ đây.\nSao A Ji lại không có mẹ?\nMẹ A Ji. Tôi xin lỗi, nhưng chị…\nCô giáo, trông tôi có bình tĩnh nổi không?\nKhông phải vậy.\nCô có thể cởi giày ra không?\n봐 봐\n아이씨, 씨\n내가 엄마인데?\n우리 아지가 왜 엄마가 없어\n[교사] 아지 어머님 죄송한데 일단은…\n선생님, 제가 지금 진정하게 생겼어요?\n[교사] 아니, 그게 아니라\n저, 신발 좀…\nDarn it.\nI'm his mom.\nWhat do you mean he doesn't have a mom?\nMs. Cho. I'm sorry, but could you--\nDo you think I can calm down right now?\nThat's not what I meant.\nCould you take your shoes off?","sourceUid":"merged-mr9djn2k-129","sourceNo":233},{"id":110,"readerNo":111,"displayNo":236,"n":236,"type":"narration","text":"[nhạc hài hước]\n[Người phụ nữ hết ho]\n[익살스러운 음악]\n[여자의 헛기침]\n[humorous music]\n[Woman clears cough]","sourceUid":"merged-mr9dkivb-130","sourceNo":236},{"id":111,"readerNo":112,"displayNo":239,"n":239,"type":"narration","text":"Ôi trời.\nTrời ạ, thật tình.\n[여자] 어머, 어머, 어머 아이, 진짜 [아지] 씨…\nOh, my.\nGosh, seriously.","sourceUid":"merged-mr9dkzrj-131","sourceNo":239},{"id":112,"readerNo":113,"displayNo":241,"n":241,"type":"narration","text":"Này, sao trẻ mẫu giáo mà lại đi cái dáng như thiếu niên tuổi dậy thì thế kia hả?\nCon muốn nổi loạn thì chọn phong cách trẻ mẫu giáo đi.\n야, 왜 유치원생이 사춘기 중딩처럼 걸어\n[은정] 아니, 반항을 해도 유치원생처럼 하자\nHey, why are you walking like a rebellious teenager?\nCan't you be a rebellious kindergartener instead?","sourceUid":"merged-mr9dx5vy-133","sourceNo":241},{"id":113,"readerNo":114,"displayNo":244,"n":244,"type":"narration","text":"Đèn xanh đã bật.\nXin mời qua đường.\n[안내 음성] 파란불이 켜졌습니다\n건너가도 좋습니다\nThe green light is on. You may cross the street.","sourceUid":"merged-mr9dxuad-134","sourceNo":244},{"id":114,"readerNo":115,"displayNo":246,"n":246,"type":"narration","text":"- [Âm thanh đèn giao thông] - [Thở dài của Aji]\n[Âm thanh vận hành khóa cửa]\n- [신호등 알림음] - [아지의 한숨]\n[도어 록 작동음]\n- [Traffic light sound] - [Aji's sigh] [Door lock operating sound]","sourceUid":"merged-mr9dy4nr-135","sourceNo":246},{"id":115,"readerNo":116,"displayNo":247,"n":247,"type":"narration","text":"[Giọng ngạc nhiên của Jungsook]\n[정숙의 놀란 소리]\n[Jungsook’s surprised voice]","sourceUid":"ko-mr905eac-1118","sourceNo":247},{"id":116,"readerNo":117,"displayNo":250,"n":250,"type":"narration","text":"Ôi trời ơi. Ai đánh lên mặt cún con của bà thế này? Con đánh nhau à?\n[정숙] 아휴\n- 어머나, 웬일이야 - [문 닫히는 소리]\n아유!\n아니, 우리 강아지 얼굴을 누가 이렇게 만들어 놨어\n[정호] 싸웠어?\nGoodness.\nWho did this to your face?\nDid you fight?","sourceUid":"merged-mr9e4vmn-137","sourceNo":250},{"id":117,"readerNo":118,"displayNo":254,"n":254,"type":"narration","text":"Thắng hay thua?\n- Cái thằng… - A Ji, nói chuyện với mẹ đi.\nA Ji, nói chuyện với mẹ đi.\nNói chuyện với mẹ đi mà.\n- 이겼어, 졌어? - [도어 록 작동음]\n[은정] 아지야, 엄마랑 얘기 좀 해\n- 아지야, 엄마랑 얘기 좀 해 - [문 닫히는 소리]\n엄마랑 얘기 좀 해\nDid you win or lose? -Why you… -A-ji, let's talk. A-ji, talk to me. Talk to me, please.","sourceUid":"merged-mr9e6pyu-140","sourceNo":254},{"id":118,"readerNo":119,"displayNo":259,"n":259,"type":"narration","text":"Không thích. Mẹ ra đi.\nCon không có mẹ. Mẹ không phải mẹ con.\nMẹ là mẹ quảng cáo.\nRa đi. Mẹ đi đi.\n[아지가 울며] 싫어, 나가!\n나 엄마 없어!\n우리 엄마 아니야, 광고 엄마야\n나가, 나가! [울음]\nI don't want to. Go away.\nI don't have a mom. You're not my mom.\nYou're an advertisement mom.\nGo away. Get out.","sourceUid":"merged-mr9e7bdb-141","sourceNo":259},{"id":119,"readerNo":120,"displayNo":260,"n":260,"type":"narration","text":"[Tiếng khóa cửa]\n[문 잠그는 소리]\n[Sound of door locking]","sourceUid":"ko-mr905eac-1131","sourceNo":260},{"id":120,"readerNo":121,"displayNo":261,"n":261,"type":"narration","text":"- [Nhạc nặng] - [Thở dài]\n- [무거운 음악] - [한숨]\n- [Heavy music] - [Sigh]","sourceUid":"ko-mr905eac-1132","sourceNo":261},{"id":121,"readerNo":122,"displayNo":265,"n":265,"type":"narration","text":"A Ji ơi.\nA Ji.\nMở cửa ra đi con.\nNày, để mẹ.\n[은정이 노크하며] 아지야 아지야, 문 좀 열어 봐 아지야 - [노크 소리] - 얘, 잠깐만\nA-ji.\nCan you open up?\nHey, let me.","sourceUid":"merged-mr9e97ti-142","sourceNo":265},{"id":122,"readerNo":123,"displayNo":270,"n":270,"type":"narration","text":"A Ji ơi, mở cửa đi. Bà đây.\nBà đây mà.\nA Ji.\n[정숙] 아지야, 문 좀 열어 봐 할머니 할머니, 할머니 아유, 그래 [은정] 아지야…\nA-ji, open the door. It's Grandma. It's Grandma. A-ji.","sourceUid":"merged-mr9eb72u-143","sourceNo":270},{"id":123,"readerNo":124,"displayNo":272,"n":272,"type":"narration","text":"[Tiếng khóa cửa] - [Eunjeong thở dài] - [Tiếng điện thoại rung]\n[문 잠그는 소리]\n- [은정의 한숨] - [휴대전화 진동음]\n[Sound of door locking]\n- [Eunjeong’s sigh] - [Mobile phone vibrating sound]","sourceUid":"merged-mr9ebbv3-144","sourceNo":272},{"id":124,"readerNo":125,"displayNo":229,"n":229,"type":"narration","text":"Chị không đến sao? Mọi người đang đợi chị đấy. Chúng tôi muốn gặp cô! - Cô mau đến đi! - Cho Eun Jeong. - Cho Eun Jeong. - Cho Eun Jeong. Mau đến đi!\n아, 카피님 안 오실 거예요? 다들 카피님 찾아요, 어? [직원1] 카피님, 보고 싶어요! - [장우] 조은정 - [직원2] 빨리 오세요! [직원들] 조은정, 조은정 - [한숨] - 조은정\nAren't you coming?\nEveryone is waiting for you.\nWe're all waiting, Ms. Cho!\n-Please join us! -Cho Eun-jeong.\n-Cho Eun-jeong. -Cho Eun-jeong.\nHurry up and come!","sourceUid":"merged-mr9eikr3-145","sourceNo":229},{"id":125,"readerNo":126,"displayNo":236,"n":236,"type":"narration","text":"- Em lại phải ra ngoài à? - Mau đến đi!\n- Mau đến đi! - Mau đến đi!\n[직원3] 빨리 와라!\n- 또 나가야 돼? - [직원들] 빨리 와\n빨리 와, 빨리 와\n-Do you have to go out again? - Hurry up.\n-Hurry up. -Hurry up.","sourceUid":"merged-mr9epksl-146","sourceNo":236},{"id":126,"readerNo":127,"displayNo":282,"n":282,"type":"narration","text":"[Nhân viên hét lên 'Hãy đến nhanh!']\n[직원들이 '빨리 와'를 외친다]\n[Employees shout ‘Come quickly!’]","sourceUid":"ko-mr905ead-1153","sourceNo":282},{"id":127,"readerNo":128,"displayNo":283,"n":283,"type":"narration","text":"Bọn trẻ lớn nhanh lắm. Sau này, dù có muốn chơi với chúng thì chúng cũng chạy đi chơi với bạn cơ. Con nghĩ kỹ đi.\n[정숙이 한숨 쉬며] 나 애 금방 커 [정숙] 나중엔 같이 있고 싶어도 친구가 더 좋다고 도망간다 잘 생각해 봐라\nKids grow up quickly.\nThey'll soon choose their friends over you even if you want to spend time with them.\nThink carefully.","sourceUid":"merged-mr9eufe6-148","sourceNo":283},{"id":128,"readerNo":129,"displayNo":288,"n":288,"type":"narration","text":"Mẹ\nkhông xem phim cẩu huyết.\nNào là sóng gió gia đình, mâu thuẫn mẹ chồng nàng dâu,\nnào là xen vào việc dạy con.\nMẹ ghét nhất thể loại đó.\nCon cũng biết mà.\n막장 드라마 안 본다 여자가 어쩌니 저쩌니 고부 갈등에 자식 문제에 감 놔라, 배 놔라 아, 나 그런 거 딱 별로야 저도 알아요\nYou know,\nI don't watch soap operas.\nI hate the whole drama between a mother-in-law and daughter-in-law\nand fighting over children's matters.\nI despise it.\nI know.","sourceUid":"merged-mr9erau6-147","sourceNo":288},{"id":129,"readerNo":130,"displayNo":293,"n":293,"type":"narration","text":"[문 열리는 소리]\n[차분한 음악]\n[은정의 한숨]","sourceUid":"merged-mra27hml-2","sourceNo":293},{"id":130,"readerNo":131,"displayNo":250,"n":250,"type":"narration","text":"Cả em, anh và A Ji đều mệt mỏi. Em định làm việc quên giờ về, quên cả cuối tuần như vậy đến bao giờ? Hại sức khỏe lắm. Cũng chẳng to tát như việc nước.\n[정호] 너도 나도 아지도 다 힘들잖아 언제까지 그렇게 퇴근도 주말도 없이 일하려고 몸 상하면서 나라 지키는 일도 아닌데\nYou, me, and A-ji are all suffering. Until when are you going to keep devoting your life to work? It's not healthy for you. It's not like you're a soldier.","sourceUid":"merged-mr9evve6-149","sourceNo":250},{"id":131,"readerNo":132,"displayNo":303,"n":303,"type":"narration","text":"Eun Jeong à.\nAnh nghĩ đây là vấn đề mà em cần quyết định.\n은정아 네가 결심해야 되는 문제인 거 같아\nEun-jeong.\nI think you have to be really determined to make a decision.","sourceUid":"merged-mra2jl9j-3","sourceNo":303},{"id":132,"readerNo":133,"displayNo":308,"n":308,"type":"narration","text":"Hai năm mẫu giáo.\nSáu năm cấp một.\nSáu năm cấp hai và cấp ba.\nHọc gia sư, học thêm, thi đại học.\nBốn năm đại học.\n[은정] 유치원 2년\n초등 6년\n중고등 6년\n과외, 학원, 재수\n대학 4년…\nTwo years in kindergarten. Six years in elementary. Six years in middle and high school. Tutoring, academies, college readmission. Four years in university.","sourceUid":"merged-mra2oq2k-4","sourceNo":308},{"id":133,"readerNo":134,"displayNo":310,"n":310,"type":"narration","text":"Đi làm mười năm đã nghỉ việc\nthì làm sao lấy lại vốn cho đủ.\n회사 생활 10년 만에 접으면 원금도 못 뽑는 건데\nI've spent too much money\nfor me to quit working now, after just ten years.","sourceUid":"merged-mra2vhye-5","sourceNo":310},{"id":134,"readerNo":135,"displayNo":311,"n":311,"type":"narration","text":"Quả thật, muốn thành đạt\nthì chỉ có cách độc thân thôi.\n성공하려면 역시 미혼이 정답인가?\nI guess the only road to success\nis to stay single.","sourceUid":"merged-mra2xg3h-6","sourceNo":311},{"id":135,"readerNo":136,"displayNo":264,"n":264,"type":"dialogue","text":"IN\nĐANG IN\nHỒ SƠ NHÂN SỰ TÊN: HAN BYEONG SU\n[Âm nhạc ý nghĩa]\n[Âm thanh vận hành máy in]\n[의미심장한 음악]\n[프린터 작동음]\nIN\nPRINT\nPRINTING\nPERSONNEL RECORDS NAME: HAN BYEONG-SU\n[Meaningful music]\n[Printer operating sound]","sourceUid":"merged-mra2yrrw-7","sourceNo":264},{"id":136,"readerNo":137,"displayNo":315,"n":315,"type":"narration","text":"Bắt đầu tạo phe cho riêng mình là vừa rồi.\n[아인] 이제 슬슬 내 편 좀 만들어 볼까\nIt's time to bring people onto my side.","sourceUid":"merged-mra32cgz-8","sourceNo":315},{"id":137,"readerNo":138,"displayNo":316,"n":316,"type":"narration","text":"Dự là sẽ ồn ào một thời gian đây.\n한동안 큰 소리 좀 나겠네\nThis will cause some commotion.","sourceUid":"merged-mra36evy-9","sourceNo":316},{"id":138,"readerNo":139,"displayNo":317,"n":317,"type":"narration","text":"[la hét]\n[비명 소리]\n[screaming]","sourceUid":"ko-mr905ead-1188","sourceNo":317},{"id":139,"readerNo":140,"displayNo":320,"n":320,"type":"narration","text":"Có chuyện gì vậy?\nKhông thể nào.\nSao vậy?\n무슨 일이세요?\n말도 안 돼\n왜요?\nWhat's wrong?\nI can't believe this.\nWhat is it?","sourceUid":"merged-mra37wst-10","sourceNo":320},{"id":140,"readerNo":141,"displayNo":323,"n":323,"type":"narration","text":"[Âm nhạc thú vị]\n[흥미로운 음악]\n[Interesting music]","sourceUid":"ko-mr905ead-1194","sourceNo":323},{"id":141,"readerNo":142,"displayNo":324,"n":324,"type":"narration","text":"Có bài báo tiêu cực sao? Đây là trang mạng xã hội của một ca sĩ thần tượng mà?\n안 좋은 기사 났어요?\n이건 아이돌 SNS인데 뭐가…\nIs it a bad news article?\nCHELLA_XX\nIsn't this a K-pop idol's social media page?","sourceUid":"merged-mra3bzt1-12","sourceNo":324},{"id":142,"readerNo":143,"displayNo":327,"n":327,"type":"narration","text":"[thở chán nản]\n[답답한 숨소리]\n[frustrated breathing]","sourceUid":"ko-mr905ead-1198","sourceNo":327},{"id":143,"readerNo":144,"displayNo":330,"n":330,"type":"dialogue","text":"Nhìn đi, nhìn kỹ vào.\nNGƯỜI THEO DÕI: 2,73 TRIỆU\nTôi nhìn rồi.\nMới hôm qua tôi vẫn có nhiều người theo dõi hơn cô ta.\nNhưng giờ cô ta vượt mặt tôi\nnhờ phát hành nhạc mới!\n봐, 보라고\n봤는데요?\n어제까진 내가 얘보다 팔로워가 더 많았다고\n[한나] 근데 음원 하나 내더니\n내 위로 올라섰잖아!\nLook closely.\n2.73 MILLION FOLLOWERS\nI did look.\nI had more followers than her yesterday.\nBut she surpassed me\nwith an album release!","sourceUid":"merged-mra3dn1e-13","sourceNo":330},{"id":144,"readerNo":145,"displayNo":332,"n":332,"type":"narration","text":"[Hơi thở nặng nề của Hannah]\n[한나의 거친 숨소리]\n[Hannah’s heavy breathing]","sourceUid":"ko-mr905ead-1203","sourceNo":332},{"id":145,"readerNo":146,"displayNo":337,"n":337,"type":"narration","text":"Vâng.\nĐúng là chuyện lớn.\nKhông ổn rồi.\nĐành phải vậy thôi.\nTôi sẽ dùng đến giải pháp mạnh.\n네\n참 큰일이네요\n[한나] 안 되겠어\n어쩔 수 없네\n극약 처방을 해야지\nI see.\nWhat a big deal.\nI can't allow this.\nI have no choice.\nI'll have to take extreme measures.","sourceUid":"merged-mra3g429-14","sourceNo":337},{"id":146,"readerNo":147,"displayNo":339,"n":339,"type":"narration","text":"Anh ra ngoài mua sữa chua công ty mình đi. Tại sao?\n나가서 요거트 사 와 우리 회사 거\n왜요?\nGo buy some of our company's yogurt.\nWhy?","sourceUid":"merged-mra3ik6u-15","sourceNo":339},{"id":147,"readerNo":148,"displayNo":340,"n":340,"type":"narration","text":"[cười]\n[피식 웃는다]\n[laughter]","sourceUid":"ko-mr905ead-1211","sourceNo":340},{"id":148,"readerNo":149,"displayNo":286,"n":286,"type":"narration","text":"TRỰC TIẾP NÀY! CHÀO CHỊ HAN NA!\nIT'S A LIVE STREAM! HELLO, HAN-NA!","sourceUid":"merged-mra3j99w-16","sourceNo":286},{"id":149,"readerNo":150,"displayNo":341,"n":341,"type":"narration","text":"- [Âm thanh thao tác của điện thoại di động] - [Âm nhạc thú vị]\n- [휴대전화 조작음] - [흥미로운 음악]\n- [Mobile phone operation sound] - [Interesting music]","sourceUid":"ko-mr905ead-1212","sourceNo":341},{"id":150,"readerNo":151,"displayNo":343,"n":343,"type":"narration","text":"Xin chào, mọi người. Hôm nay, tôi sẽ thực hiện một thử thách camera ẩn.\n여러분, 안녕\n오늘은 몰카 한번 해 보려고요\nHello, everyone.\nToday, we're doing a hidden camera prank.","sourceUid":"merged-mra3jkj7-17","sourceNo":343},{"id":151,"readerNo":152,"displayNo":347,"n":347,"type":"narration","text":"Đây là một trong những thứ mà các bạn luôn tò mò. Tèn ten. Liệu tài phiệt có liếm nắp hộp sữa chua hay không đây? Cùng đón chờ nhé.\n[한나] 여러분들이 가장 궁금했던 것 중 하나\n짜잔!\n과연 재벌은 요거트 뚜껑 핥을까요, 핥지 않을까요?\n기대하세요\nYou guys were all curious about this. Ta-da. Do you think a chaebol would lick the lid of the yogurt cup? Hope you enjoy.","sourceUid":"merged-mra3n2le-18","sourceNo":347},{"id":152,"readerNo":153,"displayNo":295,"n":295,"type":"narration","text":"TÀI PHIỆT CŨNG ĂN SỮA CHUA À? HÌNH NHƯ AI CŨNG LIẾM MÀ?\nNGÀI CHỦ TỊCH ĐÂU RỒI? TÔI NGHĨ CHỦ TỊCH KHÔNG LIẾM ĐÂU\nTỚI RỒI! CHỦ TỊCH KÌA!\nDO CHAEBOLS EVEN EAT YOGURT? DOESN'T EVERYONE LICK THE LID?\nWHERE'S THE CHAIRMAN? I DON'T THINK THE CHAIRMAN WOULD DO THAT\nHE'S COMING! IT'S THE CHAIRMAN!","sourceUid":"merged-mra3nc6z-19","sourceNo":295},{"id":153,"readerNo":154,"displayNo":348,"n":348,"type":"narration","text":"[Hannah hắng giọng]\n[한나의 헛기침]\n[Hannah clears her throat]","sourceUid":"ko-mr905ead-1219","sourceNo":348},{"id":154,"readerNo":155,"displayNo":353,"n":353,"type":"narration","text":"- Chào buổi sáng, bố. - Ừ.\nBố ơi, bố ăn cái này đi ạ.\nSao tự nhiên lại lịch sự thế?\nMau lên đi.\nLâu rồi bố không ăn.\n- 아빠, 굿 모닝 - [용호] 응 아빠, 이거 드세요 갑자기 왜 존댓말이야? 어서 이야, 이거 오랜만이다\n-Good morning, Dad. -Yes.\nHave some of this, Dad.\nWhat's with your tone?\nGo on.\nI haven't had this in a while.","sourceUid":"merged-mra3o597-20","sourceNo":353},{"id":155,"readerNo":156,"displayNo":302,"n":302,"type":"narration","text":"THỰC PHẨM VC SỮA CHUA","sourceUid":"vi-mr905aae-302","sourceNo":302},{"id":156,"readerNo":157,"displayNo":354,"n":354,"type":"narration","text":"[Âm nhạc sôi động]\n[흥미진진한 음악]\n[Exciting music]","sourceUid":"ko-mr905ead-1225","sourceNo":354},{"id":157,"readerNo":158,"displayNo":355,"n":355,"type":"narration","text":"[Hiệu ứng âm thanh nhấn mạnh]\n[강조되는 효과음]\n[Emphasized sound effect]","sourceUid":"ko-mr905ead-1226","sourceNo":355},{"id":158,"readerNo":159,"displayNo":356,"n":356,"type":"narration","text":"Hồi con còn bé, bố đã ăn cái này nhiều lắm.\n[용호] 너 어렸을 때 이거 참 많이 먹었는데\nI used to eat this a lot when you were young.","sourceUid":"merged-mra3t9x8-21","sourceNo":356},{"id":159,"readerNo":160,"displayNo":360,"n":360,"type":"narration","text":"Tèn ten!\nCác bạn thấy rồi chứ?\nNgay cả bố tôi, người sở hữu công ty sản xuất sữa chua này,\ncũng liếm nắp hộp sữa chua!\n짜잔!\n[한나] 여러분, 보셨죠?\n요거트 만드는 회사를 가진 우리 아빠도\n뚜껑 핥아 먹습니다!\nTa-da!\nDid you see that, everyone?\nMy dad, who owns the company that produces these yogurts,\nlicks off the yogurt from the lid!","sourceUid":"merged-mra3vy47-22","sourceNo":360},{"id":160,"readerNo":161,"displayNo":368,"n":368,"type":"narration","text":"[Âm thanh xấu hổ của Yongho]\n[용호의 당황한 소리]\n[Yongho’s embarrassed sound]","sourceUid":"ko-mr905ead-1239","sourceNo":368},{"id":161,"readerNo":162,"displayNo":369,"n":369,"type":"narration","text":"Bố, chào mọi người đi.\nAi đấy?\nCông chúng.\nNày, phải là ông Chung chứ làm gì có ai tên ông Chúng.\nBố có quen ông Chúng nào đâu.\nAi cơ?\nCô ấy nói là \"công chúng\" ạ.\nXin chào, tôi là Kang Yong Ho.\n아빠, 인사해\n누구신데?\n대중\n야, 그 어르신 돌아가신 지 한참 됐어\n[용호] 대통령 퇴임하시고\n[한나] 누…\n[태완] 일반 시민들입니다\n안녕하세요, 강용호입니다\nDad, say hello.\nWho are they?\nThe public.\nWhat do you mean by public? We're in a private area right now.\nThis is our house.\nWhat?\nShe means public as in people.\nHello, my name is Kang Yong-ho.","sourceUid":"merged-mra404cy-24","sourceNo":369},{"id":162,"readerNo":163,"displayNo":319,"n":319,"type":"narration","text":"KẾT THÚC PHÁT TRỰC TIẾP?\nĐÃ KẾT THÚC\nEND THE LIVESTREAM?\nLIVESTREAM ENDED","sourceUid":"merged-mra42nli-26","sourceNo":319},{"id":163,"readerNo":164,"displayNo":371,"n":371,"type":"narration","text":"Mọi người đừng sống buông thả và phí phạm\nmà hãy tiết kiệm nhé.\nTạm biệt.\n다들 욜로 그런 거 하다 골로 가지 마시고 [한나] 아끼면서 사세요, 안녕\nDon't waste your life YOLO-ing it\nand stay frugal.\nGoodbye.","sourceUid":"merged-mra42fgb-25","sourceNo":371},{"id":164,"readerNo":165,"displayNo":377,"n":377,"type":"narration","text":"Này!\nCon dám biến bố thành trò cười quốc dân à?\nTịch thu máy nó.\n- Trợ lý Park! - Có.\n- Chạy đi! - Kang Han Na!\nTrợ lý Park nữa!\n[용호] 야! 너 아빠를 국가적인 웃음거리로 만들고\n쟤 핸드폰 저거 뺏어\n- [한나] 어, 박 차장! - [영우] 네\n튀어, 튀어, 튀어\n야, 강한나!\n[용호] 박 차장 너…\nHey! You just made me a fool in front of the public. Confiscate her phone. -Mr. Park! -Yes. -Run! -Kang Han-na! And you!","sourceUid":"merged-mra44gis-28","sourceNo":377},{"id":165,"readerNo":166,"displayNo":380,"n":380,"type":"narration","text":"Xin lỗi Chủ tịch.\nSao cậu lại để nó…\nThôi, bỏ đi.\n[당황한 소리] 죄송합니다, 회장님 쟤 저대로 정말… [용호] 아휴, 아니다\nMy apologies, sir.\nHow could you let her…\nNever mind.","sourceUid":"merged-mra468z7-29","sourceNo":380},{"id":166,"readerNo":167,"displayNo":382,"n":382,"type":"narration","text":"[Tiếng thở dài của Rồng Hổ]\n[용호의 한숨]\n[Dragon Tiger's Sigh]","sourceUid":"ko-mr905ead-1253","sourceNo":382},{"id":167,"readerNo":168,"displayNo":384,"n":384,"type":"narration","text":"Đến tôi còn chẳng cản được nó nữa là. Vậy tôi xin phép. - Này. - Vâng.\n나도 못 말리는데 네가 무슨 힘으로\n저, 그럼 가 보겠습니다\n- 야 - [영우] 네?\nEven I can't keep her under control.\nI'll get going, sir.\n-Hey. -Yes, sir.","sourceUid":"merged-mra47gy9-30","sourceNo":384},{"id":168,"readerNo":169,"displayNo":387,"n":387,"type":"narration","text":"Cậu chịu nổi không? Tôi thăng chức cho cậu nhé?\nMau lên đi!\nBố bắt được là bị chửi điếc luôn đó!\n버틸 만해? 승진시켜 줄까?\n아, 빨리 와!\n[한나] 아빠한테 잡히면 귀에서 피 난다니까?\nHow are you holding up? Do you want a promotion?\nMr. Park, come here!\nDad will nag you until your ears bleed out.","sourceUid":"merged-mra4vfbb-32","sourceNo":387},{"id":169,"readerNo":170,"displayNo":388,"n":388,"type":"narration","text":"[Âm thanh ngạc nhiên]\n[놀란 소리]\n[Sound of surprise]","sourceUid":"ko-mr905ead-1259","sourceNo":388},{"id":170,"readerNo":171,"displayNo":390,"n":390,"type":"narration","text":"- Này. - Vâng, Chủ tịch. Tôi dám đảm bảo với cậu là con bé đó kiểu gì cũng gây chuyện. - Thế nên là… - Vâng.\nChỉ cần làm sao để thân thể nó không bị thương thôi.\n- [용호] 야 - [영우] 네, 회장님\n[용호] 내가 장담하는데 저거 사고 친다, 반드시\n- 그니까 - [영우] 네\n몸만 성하게 안 다치게 하라고\n-Hey. -Yes, sir.\nI'm certain that she'll cause more trouble.\n-So just… -Yes, sir.\nKeep her from hurting herself.","sourceUid":"merged-mra4ytdc-34","sourceNo":390},{"id":171,"readerNo":172,"displayNo":397,"n":397,"type":"narration","text":"Còn đầu nó hết thuốc chữa rồi.\nCon bé điên. Nó giống ai không biết?\nCòn ai vào đây nữa?\nGiống bố chứ ai.\n이건 어쩔 수 없고 아유, 저 미친 아, 저게 누굴 닮아서, 참 [근철] 닮긴 누굴 닮니? 나 닮았디\nHer mind is beyond help.\nThat lunatic. Who does she take after?\nWho do you think?\nShe takes after me.","sourceUid":"merged-mra5062w-35","sourceNo":397},{"id":172,"readerNo":173,"displayNo":399,"n":399,"type":"narration","text":"[Âm nhạc thú vị]\n[Hannah cười]\n[흥미로운 음악]\n[한나의 웃음]\n[Interesting music]\n[Hannah laughs]","sourceUid":"merged-mra50cet-36","sourceNo":399},{"id":173,"readerNo":174,"displayNo":402,"n":402,"type":"narration","text":"Thời tiết đẹp quá.\nCô định gây chuyện thì phải báo trước chứ.\nGây chuyện là sao? Tôi lên kế hoạch tỉ mỉ mà.\n아, 날씨 좋다\n아니, 사고를 쳐도 예고를 좀…\n[한나] 사고라니? 철저한 계획하에 진행한 일인데?\nThe weather is so nice.\nIf you're going to cause trouble, at least let me know.\nWhat do you mean trouble? I had it thought through.","sourceUid":"merged-mra522zk-37","sourceNo":402},{"id":174,"readerNo":175,"displayNo":349,"n":349,"type":"dialogue","text":"Xem đi.\nHANNA_X_KANG NGƯỜI THEO DÕI: 3,32 TRIỆU\nĐảo ngược tình thế trong tích tắc.\nĐã cái nư.\nTrời đẹp ghê.\n봐 봐\n한 방에 역전하잖아\n아, 개운해\n좋다\nLook. 3.32 MILLION FOLLOWERS One livestream was all I needed. So satisfying. This is nice.","sourceUid":"merged-mra54wfq-40","sourceNo":349},{"id":175,"readerNo":176,"displayNo":408,"n":408,"type":"narration","text":"[Hannah cười]\n[Hơi thở sảng khoái của Geun-cheol]\n[한나의 웃음]\n[근철의 개운한 숨소리]\n[Hannah laughs]\n[Geun-cheol’s refreshing breathing]","sourceUid":"merged-mra54aks-39","sourceNo":408},{"id":176,"readerNo":177,"displayNo":412,"n":412,"type":"narration","text":"Khi bố nói tôi sẽ làm ăn với đám lính Mỹ, ai cũng bảo bố là thằng điên. \"Kang Điên\". Biệt danh của bố đấy.\nBố ăn đi.\n[근철] 내래 미군 놈들 상대로 사업한다 했을 때 [웃음]\n다들 나보고 미친놈이라고 했디\n'크레이지'가 내 별명이야\n식사하셔야죠\nWhen I said I was going to do business with the American soldiers,\neveryone called me a lunatic.\n\"Crazy Kang.\" That was my nickname.\nYou should eat.","sourceUid":"merged-mra5816g-42","sourceNo":412},{"id":177,"readerNo":178,"displayNo":414,"n":414,"type":"narration","text":"Trong thế giới khốc liệt này, sao có thể thành công với một cái đầu tỉnh táo được?\nYong Ho à, con vẫn chưa hiểu ra à?\nHiểu gì ạ?\nKinh doanh ấy.\n[근철] 이야, 이 험난한 세상에서\n제정신으로 성공할 수 있갔어, 어?\n용호야, 넌 왜 아직도 모르니?\nYou think you can succeed in this cruel world with a sane mind?\nYong-ho, how come you still don't understand?\nUnderstand what?\nRunning a business.","sourceUid":"merged-mra5acoq-45","sourceNo":414},{"id":178,"readerNo":179,"displayNo":361,"n":361,"type":"narration","text":"Con vẫn kinh doanh bằng đầu đấy à?\nVậy phải kinh doanh bằng gì ạ?\nPhải dùng bản năng. Trực giác.\nVậy mới là thương nhân đích thực.\n뭐가요?\n[근철] 아, 사업\n넌 사업을 여직 머리로 하니?\n그럼 뭘로 해요?\n- [흥미로운 음악] - 본능으로 해야디, 직감\n[근철] 그게 진짜 장사꾼이야\nDo you use your head to do business?\nWhat else should I use?\nUse your intuition. Your instincts.\nNow that's a true businessman.","sourceUid":"merged-mra5badk-46","sourceNo":361},{"id":179,"readerNo":180,"displayNo":427,"n":427,"type":"narration","text":"Chủ tịch, ngài xem đi ạ.\nGì thế?\nCHỦ TỊCH KANG TẬP ĐOÀN VC TẠO THIỆN CẢM VỚI HÌNH ẢNH GẦN GŨI\nPhản ứng tích cực thật đấy. Nhưng cũng chỉ toàn đám nhóc thôi.\nLần này cũng nhờ cô Han Na mà doanh số bán tủ lạnh mới\nđã tăng ba phần trăm.\n[태완] 회장님, 이거 좀 보시죠\n뭔데?\n[용호] 뭐, 좋은 말들이긴 한데\n애들 떠드는 거야, 뭐\n이번에 한나 씨 덕분에 저희 냉장고 신제품\n매출 3% 올랐습니다\nSir, please take a look.\nWhat is it?\nCHAIRMAN KANG OF VC GROUP ATTRACTS PUBLIC ATTENTION WITH HIS MODEST IMAGE\nThese are all flattering, but they're just kids talking.\nThe new refrigerator we launched had an increase in sales\nby three percent thanks to Ms. Kang.","sourceUid":"merged-mra5dtsx-48","sourceNo":427},{"id":180,"readerNo":181,"displayNo":430,"n":430,"type":"narration","text":"[Âm nhạc thú vị]\n[흥미로운 음악]\n[Interesting music]","sourceUid":"ko-mr905ead-1301","sourceNo":430},{"id":181,"readerNo":182,"displayNo":434,"n":434,"type":"narration","text":"- Thật sao? - Vâng.\nTrên toàn cầu ạ.\nToàn cầu ư?\nCon bé thì tác động được ai?\nCô ấy là người có tầm ảnh hưởng lớn trên mạng xã hội.\nNgài xem cả đây nữa đi.\n- 그래? - [태완] 네 글로벌 기준으로 글로벌로? [잔 탁 내려놓으며] 걔가 무슨 힘이 있어서? SNS에서 영향력 큰 인플루언서입니다\n[태완] 이것도 좀 보시죠\n-Really? -Yes, sir.\nGlobally.\nGlobally?\nBut she doesn't have influence.\nShe's a big influencer on social media.\nTake a look at this too.","sourceUid":"merged-mra5g6jz-50","sourceNo":434},{"id":182,"readerNo":183,"displayNo":377,"n":377,"type":"narration","text":"THỬ THÁCH SỮA CHUA LIẾM ĐỂ SỐNG!\nSỐNG TRỌN VẸN!\nTHỰC PHẨM VC SỮA CHUA\nYOGURT CHALLENGE LICK TO LIVE! YOLO-ING THIS LIFE! VC F&B YOGURT","sourceUid":"merged-mra5h3aq-51","sourceNo":377},{"id":183,"readerNo":184,"displayNo":435,"n":435,"type":"narration","text":"Doanh thu sữa chua chắc chắn cũng sẽ tăng đáng kể.\n이 요거트도 매출 상당히 오를 겁니다\nThis yogurt will see an increase in sales as well.","sourceUid":"merged-mra5h8h4-52","sourceNo":435},{"id":184,"readerNo":185,"displayNo":440,"n":440,"type":"narration","text":"Khi nào con bé bắt đầu đi làm?\nVài ngày nữa ạ.\nCứ tưởng con bé chỉ là đứa vô tích sự,\nhóa ra cũng biết báo hiếu.\n대행사로 언제부터 출근이지?\n며칠 내로 출근하십니다\n[용호] 거지발싸개로도 못 쓸 줄 알았던 게\n효도하네\nWhen does she start working?\nIn a few days.\nI thought she'd be utterly useless,\nbut what a surprise.","sourceUid":"merged-mra5kc3j-53","sourceNo":440},{"id":185,"readerNo":186,"displayNo":441,"n":441,"type":"narration","text":"Giám đốc Choi giờ chỉ còn đúng một quân cờ trong phòng sáng tạo.\n[은정] 와…\n제작 팀에 최 상무님 팔 하나 남았네요\nMr. Choi only has Mr. Kwon on the creative team now.","sourceUid":"merged-mra5mtu6-54","sourceNo":441},{"id":186,"readerNo":187,"displayNo":444,"n":444,"type":"narration","text":"Đúng vậy, chỉ còn lại Quản lý Kwon.\nCác quản lý sang Trung Quốc bao giờ về vậy?\n[원희] 그렇죠\n권 CD님은 남았으니까\n중국 지사 가신 분들은 언제 와요?\nYou're right since Mr. Kwon is still here.\nWhen are the directors in China coming back?","sourceUid":"merged-mra5of7z-56","sourceNo":444},{"id":187,"readerNo":188,"displayNo":445,"n":445,"type":"narration","text":"Chắc họ sẽ không về nếu Giám đốc Go còn ở đây đâu.\n고 상무님이 계시는 한 못 오지 않겠어?\nAs long as Ms. Go is here, probably never.","sourceUid":"merged-mra5t2nr-57","sourceNo":445},{"id":188,"readerNo":189,"displayNo":446,"n":446,"type":"narration","text":"[Âm thanh phê duyệt]\n[수긍하는 소리]\n[Sound of approval]","sourceUid":"ko-mr905ead-1317","sourceNo":446},{"id":189,"readerNo":190,"displayNo":447,"n":447,"type":"narration","text":"Vậy sẽ cần ba quản lý sáng tạo mới nhỉ?\nChắc vậy.\n그럼 CD 세 명 새로 뽑겠네요?\n쩝, 그렇겠죠?\nThen we'll need three new creative directors. Right.","sourceUid":"merged-mra5u8jd-59","sourceNo":447},{"id":190,"readerNo":191,"displayNo":451,"n":451,"type":"narration","text":"Giám đốc Go nói sao?\nChị ấy thì nói gì với bọn tôi.\nChỉ nói với anh ấy thôi.\n상무님은 뭐라고 하셔? 에이, 우리한테 무슨…\n[장우] 저분한테 하시지\nDid Ms. Go say anything?\nShe doesn't talk to us.\nShe talks to him.","sourceUid":"merged-mra5va4o-61","sourceNo":451},{"id":191,"readerNo":192,"displayNo":452,"n":452,"type":"narration","text":"[Tiếng gõ cửa]\n[노크 소리]\n[Knocking sound]","sourceUid":"ko-mr905ead-1323","sourceNo":452},{"id":192,"readerNo":193,"displayNo":454,"n":454,"type":"narration","text":"Cô phải ăn một bữa tử tế chứ.\nTôi quen không ăn gì tử tế rồi.\n[한숨 쉬며] 제대로 된 밥을 좀 드시지\n제대로 된 건 안 먹어 버릇해서\nYou should have a proper meal.\nI don't usually eat proper meals.","sourceUid":"merged-mra5whgw-62","sourceNo":454},{"id":193,"readerNo":194,"displayNo":457,"n":457,"type":"narration","text":"Hôm nay tăng ca với tôi đi.\nTăng ca?\nQuay lại xem đi.\n오늘 나랑 야근 좀 하자 야근이요? 돌아봐 봐\nYou're going to work overtime with me today.\nOvertime?\nTurn around.","sourceUid":"merged-mra5ylxw-63","sourceNo":457},{"id":194,"readerNo":195,"displayNo":458,"n":458,"type":"narration","text":"HỒ SƠ NHÂN SỰ\n[âm nhạc bí mật]\n[비밀스러운 음악]\nPERSONNEL RECORDS\n[secret music]","sourceUid":"merged-mra5yun7-64","sourceNo":458},{"id":195,"readerNo":196,"displayNo":400,"n":400,"type":"dialogue","text":"HỒ SƠ NHÂN SỰ TÊN: CHA SEONG WOO, EUN SU YEON\nĐây là gì vậy?\nTôi định nói với họ.\n이건 뭐 하시려고…\n[아인] 알려 주려고\nPERSONNEL RECORDS NAME: CHA SEONG-WOO, EUN SU-YEON\nWhat's all this?\nI'm going to tell them.","sourceUid":"merged-mra601bq-65","sourceNo":400},{"id":196,"readerNo":197,"displayNo":465,"n":465,"type":"narration","text":"Nói gì cơ?\nNói cho họ biết sự thật để họ khỏi ôm mộng.\nThật sự không nên đâu.\nTại sao?\nVì thế là sai.\n[병수] 뭐를요?\n헛꿈 꾸고 있을 애들한테 현실을 알려 줘야지\n상무님, 이거 안 됩니다\n왜?\n이건 아니죠\nTell them what?\nThe reality so they won't have false hopes.\nYou can't do this, Ms. Go.\nWhy not?\nThis is wrong.","sourceUid":"merged-mra62p0i-66","sourceNo":465},{"id":197,"readerNo":198,"displayNo":466,"n":466,"type":"narration","text":"Ai cũng biết họ sẽ kế nhiệm, giờ cũng đang ồn ào lắm rồi.\n[병수] 누가 봐도 차기 CD들인데 안 그래도 시끄러운 상황에서\nThey're the future creative directors and things are already chaotic.","sourceUid":"merged-mra63krd-67","sourceNo":466},{"id":198,"readerNo":199,"displayNo":470,"n":470,"type":"narration","text":"Sẽ náo động một phen nhỉ?\nGiờ cô mà làm vậy thì sẽ không gánh nổi đâu.\nPhòng sáng tạo sẽ chia làm hai phe ngay.\nĐó là mục đích của tôi.\n웅성웅성들 하지?\n지금 이러시면 이거\n감당 못 합니다 이러다 제작 팀 둘로 쪼개지죠\n[아인] 그러라고 하는 거야\nIt's chaotic out there, right?\nIf you do this right now, things may get out of control.\nThe creative team will divide into two.\nThat's the goal.","sourceUid":"merged-mra669uh-70","sourceNo":470},{"id":199,"readerNo":200,"displayNo":473,"n":473,"type":"narration","text":"Sao cơ?\nTôi định chia làm hai phe.\nGiờ tất cả đều về phe của Giám đốc Choi.\n네? 둘로 쪼개 놓으려고 [아인] 지금은 전부 최 상무 거니까\nSorry?\nI'll split the team into two.\nEveryone is on Director Choi's side right now.","sourceUid":"merged-mra67ht6-71","sourceNo":473},{"id":200,"readerNo":201,"displayNo":474,"n":474,"type":"narration","text":"Nên nếu tôi không có được tất, thì cũng phải có được nửa chứ.\n다 가지지 못할 거면 절반이라도 가져야겠지?\nSo if I can't have everyone, the least I can do is take half.","sourceUid":"merged-mra687d6-72","sourceNo":474},{"id":201,"readerNo":202,"displayNo":416,"n":416,"type":"narration","text":"THUỐC TRÁNH THAI KHẨN CẤP\nNEMO TÌM KIẾM\n- [Tiếng côn trùng] - [Tiếng chó sủa]\n[âm nhạc đen tối]\n[Tiếng chìa khóa leng keng]\n[Âm nhạc êm dịu]\n[Thở nặng nhọc]\n[Ho]\n[thở dài]\n- [풀벌레 소리] - [개 짖는 소리]\n[어두운 음악]\n[열쇠가 잘그랑거린다]\n[차분한 음악]\n[힘겨운 숨소리]\n[콜록거린다]\n[한숨]\nMORNING PILLS SEARCH - [Sound of insects] - [Sound of dog barking] [dark music] [Keys jingle] [Calm music] [Heavy breathing] [Coughing] [sigh]","sourceUid":"merged-mra693l5-73","sourceNo":416},{"id":202,"readerNo":203,"displayNo":421,"n":421,"type":"narration","text":"GO A IN \"NỮ NHÂN SỰ CẤP CAO ĐẦU TIÊN\" GO A IN NHẬM CHỨC GIÁM ĐỐC SÁNG TẠO KHUYẾN KHÍCH MÔI TRƯỜNG SÁNG TẠO. NHIỀU GIẢI THƯỞNG… ĐAM MÊ, NĂNG LỰC. NỮ NHÂN SỰ CẤP CAO ĐẦU TIÊN TRONG LỊCH SỬ TRUYỀN THÔNG VC TRUYỀN THÔNG VC GIÁM ĐỐC SÁNG TẠO GO A IN\nGO A IN GO A-IN VC COMMUNICATIONS \"FIRST FEMALE EXECUTIVE\" GO A-IN MAKES CHIEF CREATIVE OFFICER ENCOURAGES A CREATIVE ENVIRONMENT. HOLDS MANY AWARDS… PASSIONATE AND SKILLED. SHE IS THE FIRST FEMALE EXECUTIVE IN THE HISTORY OF VC COMMUNICATIONS VC COMMUNICATIONS CHIEF CREATIVE OFFICER GO A-IN","sourceUid":"merged-mra6a46c-74","sourceNo":421},{"id":203,"readerNo":204,"displayNo":483,"n":483,"type":"narration","text":"Con bé đã lớn lên thành một người giỏi giang vậy ư? Dù chỉ có một mình.\n[은자] 어떻게 이렇게 잘 자랐을까\n혼자서\nI can't believe she has grown into such a great woman.\nAll alone.","sourceUid":"merged-mra6dbk9-75","sourceNo":483},{"id":204,"readerNo":205,"displayNo":486,"n":486,"type":"narration","text":"Mình là kẻ có tội. Tất cả là lỗi của mình.\n내가 죄인이지\n내가 죄인이야\nIt's all my fault.\nAll mine.","sourceUid":"merged-mra6e3tr-76","sourceNo":486},{"id":205,"readerNo":206,"displayNo":495,"n":495,"type":"narration","text":"TRUYỀN THÔNG VC\nKhông được à?\nHỒ SƠ NHÂN SỰ\nTất cả đều không được?\nVậy ai thì được?\nCậu bạn này tuy năng lực không nổi trội nhưng tính cách rất tốt.\nThế nên cậu ta…\nGiám đốc.\n\"VC기획\"\n[아인] 안 된다?\n다 안 된다?\n그럼 되는 게 누구야?\n[병수] 이 친구는 실력이 도드라지진 않지만\n인성이 좋아요\n그러니까 얘를\n[병수] 상무님\nSo you disagree?\nPERSONNEL RECORDS\nYou disagree with all of them?\nThen who do you want?\nAlthough he isn't competent, he has a great character.\nThat's why he…\nMs. Go.","sourceUid":"merged-mra6o04v-79","sourceNo":495},{"id":206,"readerNo":207,"displayNo":497,"n":497,"type":"narration","text":"Bây giờ kiếm người về phe mình còn khó,\nsao cô cứ muốn kiếm thêm địch vậy?\nPhe tôi?\n[한숨]\n같은 편을 늘려도 부족할 판에 왜 자꾸 적을 늘리려고 하세요\n내 편?\nYou need people to be on your side.\nStop making more enemies.\nMy side?","sourceUid":"merged-mra6p2gy-80","sourceNo":497},{"id":207,"readerNo":208,"displayNo":499,"n":499,"type":"narration","text":"[âm nhạc đen tối]\n[어두운 음악]\n[dark music]","sourceUid":"ko-mr905eae-1370","sourceNo":499},{"id":208,"readerNo":209,"displayNo":501,"n":501,"type":"narration","text":"Làm gì có ai theo phe tôi.\nCon người đơn giản lắm. Ai có quyền thì người ta theo.\n내 편이 회사에 어디 있어?\n[아인] 인간은 간단해\n힘 있는 사람 편에 서는 거야\nNo one in this company is on my side.\nHumans are simple. They obey the ones with power.","sourceUid":"merged-mra6q4g9-81","sourceNo":501},{"id":209,"readerNo":210,"displayNo":504,"n":504,"type":"narration","text":"Không phải ai cũng vậy.\nKhông đâu.\nAi cũng vậy hết. Anh cứ chờ mà xem.\n다 그러진 않습니다 아니, 인간은 다 그래 두고 보면 알아\nNot all humans. You're wrong. All humans are like that. Trust me.","sourceUid":"merged-mra6rbs9-82","sourceNo":504},{"id":210,"readerNo":211,"displayNo":506,"n":506,"type":"narration","text":"GIỮ\nTiếp.\nTiếp đi!\n[아인] 다음 다음\nNext.","sourceUid":"merged-mra6uixs-84","sourceNo":506},{"id":211,"readerNo":212,"displayNo":508,"n":508,"type":"narration","text":"A Ji à, mẹ đi làm đây.\nCon đi đi.\nGì vậy?\nKhoan đã.\nNhưng nếu thất bại,\nMẹ đi nhé.\nMẹ đi thật đây.\nCon không ra thơm mẹ sao?\nVậy gặp lại con sau giờ làm nhé.\n[은정] 아지야, 엄마 출근한다\n뭐야\n잠시만요\n간다\n진짜 가?\n뽀뽀 안 해 줄 거야?\n그럼 퇴근하고 봐\nA-ji, I'm off to work. What? Hold on. If this fails, I'm off. I'm really going. No kisses? I'll see you after work then.","sourceUid":"merged-mradcyn5-1","sourceNo":508},{"id":212,"readerNo":213,"displayNo":518,"n":518,"type":"narration","text":"[Tiếng chim hót]\n[Tay nắm cửa kêu lạch cạch]\n[Âm nhạc êm dịu]\n[Âm thanh vận hành khóa cửa]\n[thở dài]\n[새가 지저귄다]\n[문고리가 덜걱거린다]\n[잔잔한 음악]\n[도어 록 작동음]\n[한숨]\n[Bird chirping]\n[The doorknob rattles]\n[Calm music]\n[Door lock operating sound]\n[sigh]","sourceUid":"merged-mra6v5mn-86","sourceNo":518},{"id":213,"readerNo":214,"displayNo":520,"n":520,"type":"narration","text":"BẠN CÓ PHÊ DUYỆT TÀI LIỆU NÀY KHÔNG?\n[Âm nhạc ý nghĩa]\n[의미심장한 음악]\nDO YOU WANT TO APPROVE THIS DOCUMENT? [Meaningful music]","sourceUid":"ko-mr905eae-1391","sourceNo":520},{"id":214,"readerNo":215,"displayNo":521,"n":521,"type":"narration","text":"cô định gánh hậu quả thế nào?\n근데 실패하면 뒷감당 어떻게 하시려고요?\nhow will you handle the backfire?","sourceUid":"merged-mra74b9o-88","sourceNo":521},{"id":215,"readerNo":216,"displayNo":524,"n":524,"type":"narration","text":"Con dao nguy hiểm nhất là khi nó còn nằm trong bao.\nNếu cô rút ra và đâm đối thủ, nhưng hắn không sao,\nvậy cô định sẽ khống chế hắn thế nào?\n칼은 칼집에 있을 때 가장 위협적인 거잖아요 꺼내서 목을 내리쳤는데 멀쩡하다 그럼 이후에 어떻게 통제하시려고요?\nA sword is most threatening when it's in the scabbard.\nIf you fail to kill your enemy with a slash,\nhow will you maintain control then?","sourceUid":"merged-mradhhcc-2","sourceNo":524},{"id":216,"readerNo":217,"displayNo":526,"n":526,"type":"narration","text":"Bây giờ thì sao?\nTôi có thể khống chế à?\n[아인] 지금은?\n[한숨] 지금은 통제가 돼?\nHow about now?\nDo I have control?","sourceUid":"merged-mradj0qe-3","sourceNo":526},{"id":217,"readerNo":218,"displayNo":530,"n":530,"type":"narration","text":"Ai cũng biết tôi chỉ được làm giám đốc một năm.\nĐám người chảnh chọe theo phe giám đốc Choi\ntrong đợt tuyển dụng công khai\nsẽ nghe lời tôi chắc?\n1년짜리 본부장인 걸 다 아는데\n머리 굵은 최 상무 라인인\n공채 출신 부장급들에게 내 말이 먹히겠냐고\nEveryone knows I'll be gone in a year.\nMr. Choi's big-headed managers\nfrom open recruitment\nwon't listen to a word I say.","sourceUid":"merged-mradkr8z-5","sourceNo":530},{"id":218,"readerNo":219,"displayNo":532,"n":532,"type":"narration","text":"Anh nghĩ tôi có thể làm cùng họ sao?\nAnh nói đội sáng tạo sẽ bị chia ra, nhỉ?\n얘네들 데리고 일 제대로 할 수 있겠어?\n[한숨] 제작 팀 둘로 쪼개진다고 했지?\nYou think I can work with these guys?\nYou said the team will be divided, right?","sourceUid":"merged-mradljil-6","sourceNo":532},{"id":219,"readerNo":220,"displayNo":535,"n":535,"type":"narration","text":"Đúng vậy.\nKhông có bọn họ, sẽ có vị trí trống.\nTôi sẽ thăng chức cho các nhân sự được mời về.\nRồi họ sẽ đứng về phía tôi.\nChia để trị.\n예\n[아인] 얘네들 밀어내면 새로운 자리 생길 거고\n그 자리에 비공채 출신들 승진시키면\n걔넨 다 내 편이야\n디바이드 앤 룰\nYes. Without them, their seats will be vacant. I'll give their seats to the target-recruited employees. Then they'll be on my side.","sourceUid":"merged-mradofbo-8","sourceNo":535},{"id":220,"readerNo":221,"displayNo":539,"n":539,"type":"narration","text":"Nếu không thể chiếm lấy tất cả, ít ra cũng phải nắm được phân nửa.\n다 못 가질 거면 절반이라도 확실하게 가져야겠지?\nIf you can't have everything, you have to take half.","sourceUid":"merged-mradpzlz-9","sourceNo":539},{"id":221,"readerNo":222,"displayNo":538,"n":538,"type":"narration","text":"[Âm nhạc ý nghĩa]\n[의미심장한 음악]\n[Meaningful music]","sourceUid":"ko-mr905eae-1409","sourceNo":538},{"id":222,"readerNo":223,"displayNo":541,"n":541,"type":"narration","text":"Nghe tàn nhẫn quá. Chỉ có độc tài mới làm cách đó.\n너무 잔인한 거 아닙니까?\n독재자들이 쓰는 그런 방법…\nThis is just too cruel. This is what dictators do.","sourceUid":"merged-mradriu1-10","sourceNo":541},{"id":223,"readerNo":224,"displayNo":543,"n":543,"type":"narration","text":"Anh thấy sư tử săn hươu là một việc tàn nhẫn sao?\nAnh phải làm mọi thứ để sinh tồn.\n사자가 사슴 잡아먹는다고 잔인하다고 하나?\n생존을 위해선 뭐든지 하는 거야\nDo you say it's cruel when a lion hunts a deer down?\nYou need to do everything to survive.","sourceUid":"merged-mradsbqc-11","sourceNo":543},{"id":224,"readerNo":225,"displayNo":549,"n":549,"type":"narration","text":"Nếu vậy…\nĐược rồi.\nCứ cho là cô đã thuyết phục được ban giám đốc\nvà biến điều không thể thành có thể.\nNhưng nếu tổng giám đốc từ chối?\nKhông có chuyện đó đâu.\n[병수] 그러면\n자, 좋아요\n임원들 다 설득했다고 해도 뭐, 물론 그것도 어렵겠지만\n만약에 대표님이 거절하시면요?\n그럴 리 없어\nThen…\nFine.\nLet's assume you convinced all the executives\nand made the impossible possible.\nWhat if the CEO refuses?\nThat won't happen.","sourceUid":"merged-mraduev9-14","sourceNo":549},{"id":225,"readerNo":226,"displayNo":479,"n":479,"type":"narration","text":"Tôi sẽ đề xuất một chuyện mà ông ấy không thể từ chối. PHÊ DUYỆT TÀI LIỆU\n거절하지 못할 제안을 할 거니까\nI'm going to offer him something he won't be able to refuse.\nDOCUMENT APPROVED","sourceUid":"merged-mradvauk-16","sourceNo":479},{"id":226,"readerNo":227,"displayNo":552,"n":552,"type":"narration","text":"Hôm nay anh nghỉ phép đi.\nAnh phải về nhà thì tôi mới yên tâm tiến hành vụ này.\n[아인] 넌 오늘 월차 내고 들어가\n네가 집에 가 있어야지 내가 마음 편히 진행할 수 있어\nTake the day off today. You need to be home so I can proceed with this in peace.","sourceUid":"merged-mradvw19-17","sourceNo":552},{"id":227,"readerNo":228,"displayNo":553,"n":553,"type":"narration","text":"[Âm thanh thao tác nút]\n[버튼 조작음]\n[Button operation sound]","sourceUid":"ko-mr905eae-1424","sourceNo":553},{"id":228,"readerNo":229,"displayNo":559,"n":559,"type":"narration","text":"Ôi, Đội phó Han.\nỪ, cô đến rồi à.\nĐêm qua anh thức trắng sao?\nĐã xảy ra chuyện gì vậy?\nKhông, mà sắp có chuyện rồi đấy.\n[은정] 어, 부장님 응, 왔어? [은정] 날 샜어요? 뭔 일 터졌어요? [하품하며] 아니 뭔 일 이제 곧 터질 거야\nHey, Mr. Han.\nHey, you're here.\nDid you stay up?\nDid something happen?\nNo, but it's about to.","sourceUid":"merged-mradzx8n-18","sourceNo":559},{"id":229,"readerNo":230,"displayNo":488,"n":488,"type":"dialogue","text":"TRUYỀN THÔNG VC THƯ MỚI: HAN BYEONG SU\nĐÁNH GIÁ NHÂN SỰ ĐẶC BIỆT CẤP ĐỘI PHÓ\n[Âm thanh thang máy đến]\n[Âm thanh thao tác nút]\n[âm thanh rung của điện thoại di động]\n[엘리베이터 도착음]\n[버튼 조작음]\n[휴대전화 진동음]\nVC COMMUNICATIONS MAIL: HAN BYEONG-SU MANAGER-LEVEL SPECIAL PERFORMANCE EVALUATION [Elevator arrival sound] [Button operation sound] [cell phone vibrating sound]","sourceUid":"merged-mrae0d0j-19","sourceNo":488},{"id":230,"readerNo":231,"displayNo":566,"n":566,"type":"narration","text":"Cái gì thế này? Thế khác gì bảo tôi nghỉ việc? Cô ta đang cố tình gây sự, phải không?\n[차 부장] 뭐야, 이거! 이거 회사 그만두라는 소리야? [은 부장] 이거 지금 대놓고 시비 거는 거죠?\nWhat is this? Is she telling me to quit? She's picking a fight, isn't she?","sourceUid":"merged-mrae3v1f-20","sourceNo":566},{"id":231,"readerNo":232,"displayNo":564,"n":564,"type":"narration","text":"[âm nhạc đen tối]\n[어두운 음악]\n[dark music]","sourceUid":"ko-mr905eae-1435","sourceNo":564},{"id":232,"readerNo":233,"displayNo":498,"n":498,"type":"narration","text":"VĂN PHÒNG GIÁM ĐỐC SÁNG TẠO","sourceUid":"vi-mr905aaf-498","sourceNo":498},{"id":233,"readerNo":234,"displayNo":571,"n":571,"type":"narration","text":"Tưởng tôi sẽ ngồi im chịu trận à? Tôi sẽ không để cô ta yên.\nCô ấy đánh giá nhân sự sao? Đã đến kỳ đánh giá đâu.\n절대 그냥 못 넘어가 [기호] 인사 평가를 했다고? 평가 시즌도 아닌데? [차 부장] 네, 그것도 [차 부장] 누가 뭐 그냥 가만있을 줄 아나, 씨\nI won't let her do this to us. I can't let this slide.\nShe evaluated your performance? It's not even the evaluation period.","sourceUid":"merged-mrae8m9g-22","sourceNo":571},{"id":234,"readerNo":235,"displayNo":567,"n":567,"type":"narration","text":"[Âm thanh của cú đập]\n[쾅 내려치는 소리]\n[Sound of slam]","sourceUid":"ko-mr905eae-1438","sourceNo":567},{"id":235,"readerNo":236,"displayNo":496,"n":496,"type":"narration","text":"Đúng, chưa kể chỉ có đội phó được tuyển dụng công khai. Giám đốc, cô ta điên rồi phải không? Chờ tôi kiểm tra đã.\n공채 출신 부장들만요\n[헛웃음 치며] 상무님\n고 상무 완전 미친 거 아니에요?\n잠깐만, 확인 좀 해 보고\nYes, and only the managers who got in with open recruitment.\nSir, has she lost her mind?\nWait, let me check.","sourceUid":"merged-mrae9w58-23","sourceNo":496},{"id":236,"readerNo":237,"displayNo":578,"n":578,"type":"narration","text":"ĐÁNH GIÁ NHÂN SỰ ĐẶC BIỆT CẤP ĐỘI PHÓ\nCHA SEONG WOO EUN SU YEON…\n[âm nhạc đen tối]\n[Quản lý Cha thở hổn hển]\n[어두운 음악]\n[차 부장의 어이없는 숨소리]\n- [차 부장] 하, 진짜 - [마우스 클릭음]\nMANAGER-LEVEL SPECIAL PERFORMANCE EVALUATION\nCHA SEONG WOO EUN SU YEON…\nCHA SEONG-WOO EUN SU-YEON…\n[dark music]\n[Manager Cha’s incredulous breathing]","sourceUid":"merged-mraedibi-25","sourceNo":578},{"id":237,"readerNo":238,"displayNo":579,"n":579,"type":"narration","text":"Cô ta đang làm gì…\n이게 지금 뭐 하자는…\nWhat in the world is she…","sourceUid":"merged-mrafvdwb-26","sourceNo":579},{"id":238,"readerNo":239,"displayNo":580,"n":580,"type":"narration","text":"[Tiếng gõ cửa]\n[노크 소리]\n[Knocking sound]","sourceUid":"ko-mr905eae-1451","sourceNo":580},{"id":239,"readerNo":240,"displayNo":581,"n":581,"type":"narration","text":"Anh đang định gọi cho tôi sao?\n저한테 전화하려고 하셨죠?\nWere you about to call me?","sourceUid":"merged-mrafwuay-27","sourceNo":581},{"id":240,"readerNo":241,"displayNo":582,"n":582,"type":"narration","text":"[Tiếng đặt xuống]\n[달각 내려놓는 소리]\n[Sound of putting down]","sourceUid":"ko-mr905eae-1453","sourceNo":582},{"id":241,"readerNo":242,"displayNo":586,"n":586,"type":"narration","text":"Tuyệt đối không được.\nGiám đốc, sao đột nhiên anh lại làm việc sáng tạo vậy?\nGiờ vẫn còn quá sớm để cô tự đánh giá năng lực của họ.\n절대 안 됩니다 [아인] 상무님 갑자기 일을 크리에이티브하게 하시네요? [기호] 며칠이나 됐다고 독단적으로 인사 평가를 합니까?\nI disapprove.\nWhy are you being creative all of a sudden?\nIt's too soon for you to evaluate their performance by yourself.","sourceUid":"merged-mrafymlr-28","sourceNo":586},{"id":242,"readerNo":243,"displayNo":511,"n":511,"type":"narration","text":"Tôi là giám đốc phòng sáng tạo. Dĩ nhiên là tôi được tự đánh giá họ rồi.\n그럼 제작 팀 인사 평가를 제작 본부장이 독단적으로 하지\nI'm the head of the team. Of course I'll evaluate them by myself.","sourceUid":"merged-mragbnin-29","sourceNo":511},{"id":243,"readerNo":244,"displayNo":588,"n":588,"type":"narration","text":"Chả lẽ tôi lại phải báo cáo với giám đốc dự án?\n기획 본부장에게 보고하고 할까요?\nAm I to report to the chief project officer beforehand?","sourceUid":"merged-mragc92m-30","sourceNo":588},{"id":244,"readerNo":245,"displayNo":592,"n":592,"type":"narration","text":"Anh hãy phê duyệt cuộc đánh giá đó đi.\nCô hãy nói lý do đột nhiên cô làm vậy trước đã.\n인사 평가 승인해 주세요\n일단 좀 들어나 봅시다\n갑자기\nPlease approve the evaluation.\nLet's hear your reasoning behind this sudden decision.","sourceUid":"merged-mragd6vh-31","sourceNo":592},{"id":245,"readerNo":246,"displayNo":593,"n":593,"type":"narration","text":"Sao cô chỉ đánh giá những người được tuyển dụng công khai? Anh biết mà.\n그것도 공채 출신 부장들만 골라서 이러는 그 이유\nSpecifically why you chose only those who got in with open recruitment.\nYou already know.","sourceUid":"merged-mraggrhr-32","sourceNo":593},{"id":246,"readerNo":247,"displayNo":599,"n":599,"type":"narration","text":"Vì họ vô dụng.\nĐâu thể chỉ vì lý do đó mà cô làm vậy!\nCông ty không cần người tài sao?\nTôi không thể chấp thuận việc này được.\n- Vậy sao? - Phải.\n아시잖아요\n쓸모없으니까\n겨우 그런 이유로 이러는 게 말이 됩니까?\n회사가 그런 곳 아닌가요?\n이번 건은 절대 통과 못 시켜 드립니다\n- [아인] 그래요? - 예\nBecause they're useless.\nThat's not a good enough reason!\nDon't companies want useful employees?\nI can't approve of this.\n-Really? -No, I can't.","sourceUid":"merged-mragjqzx-35","sourceNo":599},{"id":247,"readerNo":248,"displayNo":604,"n":604,"type":"narration","text":"Vậy thì…\nAnh triệu tập họp ban giám đốc đi.\nHọp ban giám đốc sao?\nCô nghĩ họ sẽ chấp thuận à?\n[아인] 그럼 임원 회의 소집해 주세요 임원 회의요? 이게 통과될 거 같으세요?\nThen… Please arrange a board meeting. A board meeting? You think they'll approve?","sourceUid":"merged-mragl9pk-36","sourceNo":604},{"id":248,"readerNo":249,"displayNo":602,"n":602,"type":"narration","text":"[Âm nhạc ý nghĩa]\n[의미심장한 음악]\n[Meaningful music]","sourceUid":"ko-mr905eae-1473","sourceNo":602},{"id":249,"readerNo":250,"displayNo":608,"n":608,"type":"narration","text":"Để tôi khuyên cô một câu.\nMời anh.\nTrừ giám đốc tài chính xuất thân từ công ty kế toán,\nnhững người khác đều được tuyển chọn công khai.\n제가 충고 하나 드릴까요?\n네\n회계 법인 출신 재무 상무님 제외하곤\n모두가 공채 출신입니다, 아시죠?\nLet me advise you.\nGo ahead.\nExcept for the chief financial officer, who was formerly in an accounting firm,\neveryone else was recruited through open recruitment.","sourceUid":"merged-mrago9qj-38","sourceNo":608},{"id":250,"readerNo":251,"displayNo":525,"n":525,"type":"narration","text":"Cô nên dừng lại đi.\nCẩn thận bị phản tác dụng, có thể ban giám đốc sẽ cách chức cô đấy.\nhọp ban giám đốc đi.\nAnh cứ triệu tập\n지금이라도 멈추세요\n역으로 상무님 해임 결의 진행할 수도 있습니다\n소집해 주세요\n임원 회의\nYou should stop now.\nIt can backfire and a board meeting may be held to have you dismissed.\na board meeting.\nArrange…","sourceUid":"merged-mragqi87-40","sourceNo":525},{"id":251,"readerNo":252,"displayNo":613,"n":613,"type":"narration","text":"[âm nhạc đen tối]\n[어두운 음악]\n[dark music]","sourceUid":"ko-mr905eae-1484","sourceNo":613},{"id":252,"readerNo":253,"displayNo":616,"n":616,"type":"narration","text":"Tôi sẽ triệu tập tất cả các nhân sự cấp cao dưới Tổng giám đốc.\nCô tự đào hố chôn mình như vậy thì tôi lại càng mừng.\n대표님 예하 임원 회의 소집하도록 하겠습니다 알아서 자빠져 주면 나야 땡큐지\nI'll call everyone under the CEO for a board meeting. I'm all for you digging your own grave.","sourceUid":"merged-mragsfs5-42","sourceNo":616},{"id":253,"readerNo":254,"displayNo":615,"n":615,"type":"narration","text":"- [âm thanh thao tác của điện thoại di động] - [thở dài]\n- [휴대전화 조작음] - [한숨]\n- [cell phone operation sound] - [sigh]","sourceUid":"ko-mr905eae-1486","sourceNo":615},{"id":254,"readerNo":255,"displayNo":627,"n":627,"type":"narration","text":"Ừ.\nTập hợp nhân sự cấp cao dưới Tổng giám đốc đi.\nKhông.\nBây giờ.\nNgay lập tức.\nMười phút nữa sẽ họp ban giám đốc.\nTôi biết rồi.\n[창수] 어 대표님 예하 임원 회의 잡아 줘 아니, 지금 당장 [아인] 알았어요 [수정] 10분 후에 임원 회의입니다\nHey.\nCall everyone under the CEO for a meeting.\nNo.\nRight now.\nImmediately.\nThe board meeting is in ten minutes, ma'am.\nOkay.","sourceUid":"merged-mragvi1k-45","sourceNo":627},{"id":255,"readerNo":256,"displayNo":626,"n":626,"type":"narration","text":"[Tiếng gõ trên bàn]\n[Hết cơn ho]\n[nhạc nặng]\n[Hít một hơi thật sâu]\n[Âm thanh chuông
