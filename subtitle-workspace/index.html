liên lạc]\n[책상 탁탁 두드리는 소리] [헛기침] [무거운 음악] [숨을 씁 들이켠다] [인터폰 벨 소리]\n[Sound of tapping on desk]\n[Clears cough]\n[heavy music]\n[Takes a deep breath]\n[Intercom ring sound]","sourceUid":"merged-mragvcxt-44","sourceNo":626},{"id":256,"readerNo":257,"displayNo":634,"n":634,"type":"narration","text":"Đúng thật là. - Cô ta làm gì vậy? - Đúng đó. Trời ạ.\nNào, ta bắt đầu đi.\n[임원1] 아이, 갑자기 무슨 얘길 하겠다 그래 [임원2] 그게 궁금한 거지\n자, 자, 시작합시다\nSeriously. -What's she up to? -Exactly. Goodness. Let's get started.","sourceUid":"merged-mraiypjw-49","sourceNo":634},{"id":257,"readerNo":258,"displayNo":631,"n":631,"type":"narration","text":"[Các nhà điều hành rất hào hứng]\n[âm nhạc hồi hộp]\n[임원들이 술렁인다]\n[긴장되는 음악]\n[Executives are excited]\n[nervous music]","sourceUid":"merged-mraitjhn-47","sourceNo":631},{"id":258,"readerNo":259,"displayNo":635,"n":635,"type":"narration","text":"[Nhân viên khó chịu]\n[직원들이 술렁인다]\n[Employees are upset]","sourceUid":"ko-mr905eae-1506","sourceNo":635},{"id":259,"readerNo":260,"displayNo":637,"n":637,"type":"narration","text":"Cô ta điên rồi à?\nSao lại chống đối tất cả mọi người vậy?\n[직원] 아, 미친 거 아니야?\n[장우] 카피님 빨리 점심 먹으러 가죠\nIs she crazy?\nShe's totally going against everyone.","sourceUid":"merged-mraj3fg3-50","sourceNo":637},{"id":260,"readerNo":261,"displayNo":641,"n":641,"type":"narration","text":"Chúng ta đi ăn trưa thôi.\n- Bí bách quá. - Cô ta tính hủy vụ tuyển…\nPhải đi ăn thôi.\nSao trông chị ủ rũ thế? Khách hàng yêu cầu chỉnh sửa sao?\n분위기 어수선한데 그래야지 왜 이렇게 기운이 없으세요? [장우] 광고주 수정 들어왔어요?\nLet's go have lunch.\nLet's do that.\nWhy are you so down today? Did the client ask for an edit?","sourceUid":"merged-mraj4wca-51","sourceNo":641},{"id":261,"readerNo":262,"displayNo":646,"n":646,"type":"narration","text":"Chị sao vậy?\nÀ, mà thôi.\nĐằng nào cậu cũng sẽ biết.\nMà chuyện gì?\nGì thế này?\n어, 뭔데요?\n아니다, 곧 알게 될 건데\n[장우] 아니, 뭔데요\n뭐예요, 이게?\n-Things don't seem great. -She's undermining the open recruitment…\nWhat is it?\nOh, well.\nYou'll find out soon.\nWhat's this?","sourceUid":"merged-mrakigt7-52","sourceNo":646},{"id":262,"readerNo":263,"displayNo":555,"n":555,"type":"narration","text":"Về việc cách chức các quản lý sáng tạo,\ntôi có thể hiểu được.\nTôi nói thẳng luôn nhé.\nChúng ta đều biết việc họ ăn hối lộ nhưng vẫn bỏ qua mà.\nĐúng là vậy thật.\n[기호] 예, 저번 CD들 인사는\n이해합니다, 솔직히 말씀드릴게요\n뭐, 다들 알지만 쉬쉬한 문제였죠 안 그렇습니까?\n[임원1] 뭐, 그러려니 했지만\nRegarding the demotion of creative directors,\nI completely understand.\nI'll be frank.\nWe knew about their misconduct but swept it under the rug.\nYes, we let them slide.","sourceUid":"merged-mrakohh0-56","sourceNo":555},{"id":263,"readerNo":264,"displayNo":652,"n":652,"type":"narration","text":"Thấy họ bị phạt như vậy, chúng tôi hả hê lắm.\nĐúng thế. Tôi cũng vậy.\n[임원2] 저희도 속은 좀 시원했습니다\n[재무 상무] 네, 저도요\nWe were glad they were taught a lesson.\nRight. Same here.","sourceUid":"merged-mrakp2gz-57","sourceNo":652},{"id":264,"readerNo":265,"displayNo":656,"n":656,"type":"narration","text":"Nhưng việc này thì không được.\nĐối xử với người tuyển công khai kiểu đó\nthì còn ai trung thành nữa?\nTrung thành?\n[기호] 하지만 이건 아니죠, 어?\n공채들 이렇게 천대하면\n누가 회사에 충성심을 보이겠습니까?\n[헛웃음] 충성심이라…\nBut this is going too far.\nIf we treat our openly recruited employees like this,\nwho'll stay loyal to the company?\nLoyal?","sourceUid":"merged-mrakq2h5-58","sourceNo":656},{"id":265,"readerNo":266,"displayNo":661,"n":661,"type":"narration","text":"Đấy chính là vấn đề.\nCô nói sao?\nChúng ta làm việc bằng năng lực,\nkhông phải bằng lòng trung thành.\n그게 문제인데\n뭐요?\n일을 능력으로 하지\n충성심으로 하면 되겠습니까?\nThat's the issue.\nWhat?\nWe work with our skills,\nnot our loyalty.","sourceUid":"merged-mrakr3yb-59","sourceNo":661},{"id":266,"readerNo":267,"displayNo":657,"n":657,"type":"narration","text":"[âm nhạc đen tối]\n[어두운 음악]\n[dark music]","sourceUid":"ko-mr905eae-1528","sourceNo":657},{"id":267,"readerNo":268,"displayNo":664,"n":664,"type":"narration","text":"Vì được tuyển dụng công khai,\nhay vì họ theo phe ai đó,\nvì cứ thăng chức cho những người kém cỏi như họ\n[아인] 공채라서, 누구 라인이라서\n회사에 피해 주는 일을 해도 승진시켜 주니까\n회사가 이 꼴 아닙니까\nWe're in a grim state\nbecause you promoted incompetent people\njust because they were loyal to certain people","sourceUid":"merged-mraksyqk-60","sourceNo":664},{"id":268,"readerNo":269,"displayNo":668,"n":668,"type":"narration","text":"nên công ty mới ra nông nỗi này.\nCô nói \"nông nỗi này\" là sao?\nChúng ta đứng đầu ngành kia mà.\nCô hơi quá lời rồi đấy.\nTôi quá lời sao?\n[기호] 상무님, 이 꼴이라니요\n[임원1] 업계 1위인데 무슨\n말씀이 과하시네요\n과하다고요?\nor they were part of the open recruitment.\nWhat do you mean \"grim state\"?\nWe're the best in the field.\nAren't you being too harsh?\nToo harsh?","sourceUid":"merged-mrakv3u3-62","sourceNo":668},{"id":269,"readerNo":270,"displayNo":671,"n":671,"type":"dialogue","text":"Đội phó Cha Seong Woo.\nHỒ SƠ NHÂN SỰ TÊN: CHA SEONG WOO\nĐỘI SÁNG TẠO 3 CHỈ ĐẠO SÁNG TẠO CHA SEONG WOO\nCậu viết nốt cái này rồi mai nộp lại nhé.\nLỜI DẪN NGẮN CHÚC MỪNG CÔ DÂU VÀ CHÚ RỂ\n[아인] 차성우 부장\n[차 부장] 이거 내일까지 써 가지고 줘\nManager Cha Seong-woo.\nPERSONNEL RECORDS NAME: CHA SEONG-WOO\nCREATIVE TEAM 3 CHA SEONG-WOO\nFinish writing this up by tomorrow.\nSHORT LINES ON CONGRATULATING THE BRIDE AND GROOM'S FUTURE","sourceUid":"merged-mrakxasj-65","sourceNo":671},{"id":270,"readerNo":271,"displayNo":670,"n":670,"type":"narration","text":"[âm nhạc đen tối]\n[어두운 음악]\n[dark music]","sourceUid":"ko-mr905eae-1541","sourceNo":670},{"id":271,"readerNo":272,"displayNo":680,"n":680,"type":"narration","text":"- Gì vậy ạ? - Thiệp cưới của khách hàng.\n- Tôi đang bận việc khác. - Còn cô làm cái này.\nĐây là ảnh cưới của họ.\nChỉnh sửa ảnh cho đẹp vào, giống quảng cáo làm đẹp ấy.\nSao tôi lại phải làm việc này?\nKhách hàng sắp kết hôn đó.\nCó thế cũng không làm nổi à?\n[직원1] 이거 뭔데요?\n광고주 청첩장\n아, 지금 다른 건 때문에 바쁜데…\n그리고 너는\n그거 웨딩 전 사진이니까 예쁘게 포토샵 해 가지고\n뷰티 광고 포스터처럼 만들어\n그걸 왜 제가 왜…\n광고주가 결혼한다잖아\n[차 부장] 그 정도도 못 해?\n-What's this? -A client's wedding invitation.\n-I have another project I'm working on. -And for you.\nIt's their wedding studio photos.\nPhotoshop them to look like beauty ad posters.\nWhy do I have to do this?\nThe client is getting married.\nCan't you do it?","sourceUid":"merged-mral89ja-67","sourceNo":680},{"id":272,"readerNo":273,"displayNo":683,"n":683,"type":"narration","text":"Vâng, Đội trưởng.\nAnh chuẩn bị lễ cưới đến đâu rồi?\nKhông, không sao đâu.\n아, 예, 팀장님 [웃음]\n결혼 준비는 잘되시죠?\n아유, 아유, 아, 아닙니다, 네\nHello, sir.\nHow's the wedding planning going?\nNo, it's nothing, sir.","sourceUid":"merged-mral9x56-68","sourceNo":683},{"id":273,"readerNo":274,"displayNo":686,"n":686,"type":"narration","text":"Không có năng lực, nhưng muốn giữ chân khách hàng,\nnên anh ta đã bắt cả đội làm đủ thứ vặt vãnh.\n[아인] 실력은 없는데 광고주는 잡아야 되니까\n별 지저분한 일들 다 시키고\n그러다 보니\nHe didn't want to lose his clients despite his incompetence,\nso he made his team members do all the dirty work.","sourceUid":"merged-mralbamp-69","sourceNo":686},{"id":274,"readerNo":275,"displayNo":598,"n":598,"type":"dialogue","text":"Kết quả là…\nVâng, ngày mai tôi có thể đến phỏng vấn.\nSÁNG MAI 10:00 CÔ ĐẾN PHỎNG VẤN NHÉ?\n[직원2] 네, 내일 면접 가능합니다\nAs a result…\nYes, I'm available tomorrow for the interview.\nHR MANAGER: CAN WE INTERVIEW YOU TOMORROW AT 10?","sourceUid":"merged-mraldrgc-70","sourceNo":598},{"id":275,"readerNo":276,"displayNo":689,"n":689,"type":"narration","text":"…cả copywriter và trợ lý nghệ thuật do công ty tốn tiền bạc và sức lực đào tạo\nđều đã nghỉ việc.\n돈 쓰고 시간 써서 힘들게 가르친 대리급 카피랑 아트\n다 퇴사하는 거 아닙니까?\n…the copywriter and art director we trained with our own money and efforts\nboth left the company.","sourceUid":"merged-mralf2xw-71","sourceNo":689},{"id":276,"readerNo":277,"displayNo":603,"n":603,"type":"narration","text":"Nào.\nTiếp theo.\nĐội phó Eun Su Yeon.\nTôi sẽ để mắt đến cô ấy.\nAnh khỏi cần bận tâm.\n[아인] 자, 다음은\n은수연 부장\n[창수] 그 부분은 내가 신경 써 볼게\n신경 쓰지 마세요\nAll right.\nNext.\nManager Eun Su-yeon.\nI'll take care of her.\nYou don't need to.","sourceUid":"merged-mralglzh-72","sourceNo":603},{"id":277,"readerNo":278,"displayNo":694,"n":694,"type":"narration","text":"Tôi, giám đốc sáng tạo mới được bổ nhiệm, sẽ để mắt đến cô ta.\n신임 제작 본부장인 제가 신경 쓰고 있으니까\nI'm on her case as the newly-appointed chief creative officer.","sourceUid":"merged-mralhs2t-73","sourceNo":694},{"id":278,"readerNo":279,"displayNo":701,"n":701,"type":"narration","text":"Coi anh ta kìa, ra vẻ quá rồi bị trời phạt đấy.\nVì cô ấy cố tình chia bè kết phái,\n[âm nhạc đen tối]\nnên mới đây một đội phó đã chuyển sang công ty đối thủ.\nAnh còn nhớ chứ?\nĐâu thể nói đó là lỗi của cô ấy.\n[은 부장] 그러게 왜 유난을 떨어서 저 꼴을 당해 [아인] 은 부장 사내 정치질 때문에\n[어두운 음악]\n최근에 부장 하나 경쟁사로 이직했죠?\n기억나세요?\n그건 뭐, 꼭 은 부장 때문이라기는…\n올해 들어\nLook at him go after all the fuss. Because of her workplace politics,\n[dark music]\na manager recently moved to a competing agency.\nDo you remember?\nIt's hard to say that's her fault.","sourceUid":"merged-mran0gzo-76","sourceNo":701},{"id":279,"readerNo":280,"displayNo":704,"n":704,"type":"narration","text":"Trong năm qua, số dự án đấu thầu mà công ty\nbị mất vào tay đội phó đã nghỉ việc đó\ncó giá trị gần 35 tỷ won.\nVì kiểu làm việc bè phái của Đội phó Eun mà các vị quý mến,\ncông ty đã vụt mất 35 tỷ won.\n그 이직한 직원네 팀이랑 붙어서 뺏긴 경쟁 PT 빌링만\n약 350억\n여러분들이 이뻐하는 은 부장 사내 정치질로 날린 돈이 350억\nThe presentation billings that we lost this year\nto the team the manager transferred to\nis a whopping 35 billion.\nBecause of your beloved Manager Eun's workplace politics,\nwe lost 35 billion won.","sourceUid":"merged-mran3ine-78","sourceNo":704},{"id":280,"readerNo":281,"displayNo":708,"n":708,"type":"narration","text":"Cô không phóng đại đấy chứ?\nPhóng đại sao?\nTrừ các công ty trực thuộc, ta đang mất dần khách hàng.\n거, 너무 과장하시는 거 아닙니까?\n과장이라고요?\n계열사 물량 제하면\n광고주 점점 줄어들고 있는 거 모르세요?\nAren't you exaggerating?\nAm I?\nApart from our affiliated companies, we're losing clients by the day.","sourceUid":"merged-mran5mqi-79","sourceNo":708},{"id":281,"readerNo":282,"displayNo":714,"n":714,"type":"narration","text":"Đó là vì tình hình chung của thị trường…\nTruyền thông VC đang trên đà sụp đổ.\nChỉ có tôi nhìn ra thôi sao?\nTôi giải thích nữa nhé?\n[임원2] 그거야 기업들 상황이 안 좋으니까\n여기서 VC기획 개판 된 거\n저만 알고 있는 사실입니까?\n더 설명해 드릴까요?\nThat's because they are in a bad financial--\nWe are going down the drain.\nAm I the only one who knows that?\nShould I enlighten you?","sourceUid":"merged-mran6s4p-80","sourceNo":714},{"id":282,"readerNo":283,"displayNo":717,"n":717,"type":"narration","text":"Dù vậy đi nữa, cũng không thể luân chuyển…\nTôi sẽ từ chức.\nNếu tôi không thể làm tăng 50 phần trăm doanh số trong vòng 6 tháng,\ntôi sẽ chịu trách nhiệm và nghỉ việc.\n거, 뭐, 아무리 그래도 지금 인사는\n사표 쓰겠습니다\n6개월 내로 매출 50% 상승 걸고 결과 못 내면\n책임지고 회사 나가겠습니다\nBut still, a transfer like this--\nI'll resign.\nIf I don't get our sales up by 50 percent within 6 months,\nI'll take responsibility and resign.","sourceUid":"merged-mrancclh-81","sourceNo":717},{"id":283,"readerNo":284,"displayNo":715,"n":715,"type":"narration","text":"[âm nhạc hồi hộp]\n[긴장되는 음악]\n[nervous music]","sourceUid":"ko-mr905eaf-1586","sourceNo":715},{"id":284,"readerNo":285,"displayNo":720,"n":720,"type":"narration","text":"Chị Cho, chị điên rồi sao?\nSao chị lại xin nghỉ việc?\nChị nói gì đi.\nSao đột nhiên chị lại nghỉ?\n[장우] 카피님 아, 미쳤어요? 사표를 왜 써요 아, 뭐라고 말씀을 좀 해 보세요 회사를 갑자기 왜 관둬요?\nMs. Cho. Are you nuts? Why would you quit? Come on, answer me. Why quit so suddenly?","sourceUid":"merged-mranijir-82","sourceNo":720},{"id":285,"readerNo":286,"displayNo":724,"n":724,"type":"narration","text":"Chị bị bệnh à? Hay là… Thôi nào, chị nói gì đi. Trời ạ, người ta đang ăn mà cứ bắt nói. Chờ chút.\n어디 아파요? 아님\n아, 뭐라고 말 좀…\n아, 왜 자꾸 먹고 있는데 말을 시켜\n[은정] 잠깐만\nAre you sick? Or…\nCome on, say something.\nDon't make me talk when I'm eating.\nWait.","sourceUid":"merged-mranqu38-83","sourceNo":724},{"id":286,"readerNo":287,"displayNo":726,"n":726,"type":"narration","text":"Tôi đã đắn đo về việc này từ lâu rồi.\nTôi nghĩ đã đến lúc rồi.\n아니, 하루 이틀 한 고민도 아니고 이젠 때가 된 거 같아\nI've thought about this for a long time.\nI think it's time now.","sourceUid":"merged-mraoi3nd-84","sourceNo":726},{"id":287,"readerNo":288,"displayNo":728,"n":728,"type":"narration","text":"Sao vậy? Vì con trai chị sao?\nTôi đâu thể bắt thằng bé sống như thể không có mẹ mãi được.\n왜요, 아들 때문에요?\n엄마 없는 자식으로 언제까지 살게 하겠어\nWhy? Because of your son?\nI can't let him stay as a motherless child.","sourceUid":"merged-mraote6p-85","sourceNo":728},{"id":288,"readerNo":289,"displayNo":730,"n":730,"type":"narration","text":"Nhưng có mẹ thành công thì cũng tốt mà.\nTrẻ con thường thích một người mẹ luôn ở cạnh chúng.\n아, 그래도 성공한 엄마 있으면 좋지\n애들한텐 하루 종일 옆에 있어 주는 엄마가 최고니까\nBut it's great to have a successful mom.\nFor kids, a mom who stays with them is the best.","sourceUid":"merged-mraou184-86","sourceNo":730},{"id":289,"readerNo":290,"displayNo":734,"n":734,"type":"narration","text":"Ôi, tôi nhạt miệng quá.\nChị nhìn mà xem.\nMới nói sẽ xin nghỉ mà chị đã nhạt miệng rồi.\n아유, 입맛도 없다\n[장우] 이거 봐요, 이거 봐, 어?\n사표 쓴다고 하니까 벌써부터 입맛 없어서\nI don't have the appetite.\nLook at this.\nYou lost your appetite because you're quitting.","sourceUid":"merged-mraousvk-87","sourceNo":734},{"id":290,"readerNo":291,"displayNo":737,"n":737,"type":"narration","text":"Chị chỉ ăn được mỗi hai bát cơm.\nDạo này tôi cứ như vậy hoài. Chẳng lúc nào thấy ngon miệng.\n밥도 두 공기밖에 못 드시잖아\n야, 내가 요즘 그래\n영 입안이 깔깔한 게\nYou only had two bowls of rice.\nI've been like this lately. I don't really have the appetite.","sourceUid":"merged-mraovy7v-88","sourceNo":737},{"id":291,"readerNo":292,"displayNo":732,"n":732,"type":"narration","text":"- [Âm nhạc thú vị] - [Jangwoo thở dài]\n- [흥미로운 음악] - [장우의 한숨]\n- [Interesting music] - [Jangwoo's sigh]","sourceUid":"ko-mr905eaf-1603","sourceNo":732},{"id":292,"readerNo":293,"displayNo":739,"n":739,"type":"narration","text":"Ta đi thôi.\nChị phải ăn đồ ngọt vào thì mới suy nghĩ tích cực được.\nĐi nào.\n나가요, 단걸 먹어야 생각을 긍정적으로 하지\n[장우] 자\nLet's go. You need something sweet to think positively.\nCome on.","sourceUid":"merged-mraoxfcx-89","sourceNo":739},{"id":293,"readerNo":294,"displayNo":741,"n":741,"type":"narration","text":"Giám đốc Go, chúng ta suy nghĩ tích cực hơn đi.\n[기호] 상무님, 우리 일 좀 긍정적으로 합시다, 긍정적으로\nMs. Go, why don't we think more positively?","sourceUid":"merged-mrap507m-90","sourceNo":741},{"id":294,"readerNo":295,"displayNo":740,"n":740,"type":"narration","text":"[Âm thanh sức mạnh của Jangwoo]\n[장우의 힘주는 소리]\n[Jangwoo’s sound of strength]","sourceUid":"ko-mr905eaf-1611","sourceNo":740},{"id":295,"readerNo":296,"displayNo":744,"n":744,"type":"narration","text":"Tôi nghĩ tất cả các vị ngồi đây đều nhầm lẫn rồi.\nTôi không có bố mẹ,\ntốt nghiệp trường tỉnh,\nvà có gia cảnh nghèo khó.\n대표님 예하 임원분들께서 착각하시나 본데요\n저는 부모도 없고 지방대 출신\n[아인] 흙수저 여자입니다\nI think all the executives have the wrong idea here.\nI am an orphan\nfrom a lousy university\nand a woman from a poor family.","sourceUid":"merged-mrap7j6p-92","sourceNo":744},{"id":296,"readerNo":297,"displayNo":746,"n":746,"type":"narration","text":"Nên các vị mới thăng chức cho tôi\nlàm giám đốc bù nhìn.\nKhông phải sao?\n그래서 저를 얼굴마담 임원으로 앉히신 거잖아요\n아닌가요?\nThat's why you made me\na figurehead executive.\nAm I wrong?","sourceUid":"merged-mrap8ktl-93","sourceNo":746},{"id":297,"readerNo":298,"displayNo":750,"n":750,"type":"narration","text":"Suy nghĩ tích cực?\nĐó là phong thái của những người sở hữu nhiều thứ trong tay.\nGiống như các vị.\n긍정적으로요?\n그건 많이 가진 사람들의 자세죠\n여러분들처럼\nThink positively?\nThat's the attitude of those who have a lot.\nLike all of you.","sourceUid":"merged-mrap9jyq-94","sourceNo":750},{"id":298,"readerNo":299,"displayNo":747,"n":747,"type":"narration","text":"[âm nhạc đen tối]\n[어두운 음악]\n[dark music]","sourceUid":"ko-mr905eaf-1618","sourceNo":747},{"id":299,"readerNo":300,"displayNo":752,"n":752,"type":"narration","text":"Với những kẻ chẳng có gì để mất như tôi,\ntôi không suy nghĩ tích cực được.\nSuy nghĩ về tiền thì dễ hơn.\n저처럼 잃을 게 없는 부류들은 긍정적으로 생각하지 않습니다\n금전적으로 생각하지\nFor those with nothing to lose like me,\nit's hard to be positive.\nIt's easier to be money-grubbing.","sourceUid":"merged-mrapbi05-95","sourceNo":752},{"id":300,"readerNo":301,"displayNo":756,"n":756,"type":"narration","text":"Tôi sẽ chứng minh\nbằng kết quả và những con số.\nDù vậy, nếu các vị vẫn muốn ngăn cản tôi,\nthì ít nhất các vị cũng nên\nđánh cược chức vị của mình giống tôi.\nCác vị có mất gì đâu.\n결과로\n오직 숫자로 보여 드리겠습니다\n그래도 저를 막고 싶으시다면 어떠세요?\n저처럼 여러분들 자리를 거시든가\n손해 보는 장사 아닐 텐데\nI will prove myself\nwith results and numbers.\nDespite all that, if you still want to hold me back,\nthen you should at least\nput your position on the line like me.\nYou don't have anything to lose.","sourceUid":"merged-mrape7b6-97","sourceNo":756},{"id":301,"readerNo":302,"displayNo":763,"n":763,"type":"narration","text":"Nhưng nếu tôi thành công,\nai trong số các vị muốn rời công ty đây?\nGiám đốc Choi có dám đánh cược\nchức vị của mình không?\n대신 제가 성공하면 누가 회사 나가실래요? 우리 최 상무님께서 자리를 거시겠어요? 어떠세요, 최 상무님?\nBut if I succeed,\nwho will leave the company?\nDo you want to put your position on the line,\nMr. Choi?","sourceUid":"merged-mraplhm8-98","sourceNo":763},{"id":302,"readerNo":303,"displayNo":760,"n":760,"type":"narration","text":"[Hiệu ứng âm thanh tối]\n[어두운 효과음]\n[Dark sound effect]","sourceUid":"ko-mr905eaf-1631","sourceNo":760},{"id":303,"readerNo":304,"displayNo":671,"n":671,"type":"narration","text":"Anh thấy thế nào?\nSao anh không đánh cược\nrằng tôi sẽ thất bại?\nKhông có ai à?\n제가 실패한다에\n자리를 한번 걸어 보시죠\n없으신가요?\nWhat do you say? Why don't you bet against me that I'll fail? No one?","sourceUid":"merged-mrapoygo-100","sourceNo":671},{"id":304,"readerNo":305,"displayNo":766,"n":766,"type":"narration","text":"[cười]\n[헛웃음]\n[laughter]","sourceUid":"ko-mr905eaf-1637","sourceNo":766},{"id":305,"readerNo":306,"displayNo":770,"n":770,"type":"narration","text":"Vậy tôi xin phép nói trước luôn.\nTừ nay nếu các vị muốn ngăn cản tôi,\nhãy lấy chức vị ra cược.\n그럼 미리 말씀드리겠습니다\n앞으로 저를 막고 싶으시다면\n여러분의 자리를 거세요\nThen let me make it clear.\nIf you want to stop me from now on,\nput your position on the line.","sourceUid":"merged-mrapr03s-101","sourceNo":770},{"id":306,"readerNo":307,"displayNo":775,"n":775,"type":"narration","text":"Tôi…\ntán thành.\nNghe rất minh bạch mà.\nGiám đốc sáng tạo mới đã hứa rõ ràng rằng sẽ tăng doanh số\nvới con số và kì hạn cụ thể.\nCô ấy cũng đã hứa sẽ xin nghỉ việc nếu thất bại.\n[재무 상무] 저는\n찬성이요\n명쾌하지 않습니까?\n새로 선출된 제작 본부장이\n명확한 매출 상승률과 기간을 숫자로 명시했고\n실패 시 사표 쓰겠다고 약속도 했고\nI…\napprove.\nThis is very clear.\nThe new chief creative officer presented us with a bump in sales\nand its time frame.\nAnd she promises to resign if she fails.","sourceUid":"merged-mrapwqpv-105","sourceNo":775},{"id":307,"readerNo":308,"displayNo":779,"n":779,"type":"narration","text":"Chắc do công việc của tôi là phân tích số liệu.\nNên tôi thích những thứ dễ tính toán.\nCác vị thấy sao?\n제가 숫자만 보는 사람이라서 그런지\n딱 떨어지는 게 좋네요\n어떠세요들?\nMy job is to analyze numbers.\nI like how this is all mathematical.\nWhat do you say?","sourceUid":"merged-mraq0gvq-106","sourceNo":779},{"id":308,"readerNo":309,"displayNo":782,"n":782,"type":"narration","text":"Giám đốc Go.\nVâng.\nCô có thể chịu trách nhiệm cho lời nói của mình không?\n[문호] 고 상무님\n네\n지금 하신 말씀 책임질 수 있습니까?\nMs. Go.\nYes, sir.\nDo you take full responsibility for your words?","sourceUid":"merged-mraq27ok-107","sourceNo":782},{"id":309,"readerNo":310,"displayNo":691,"n":691,"type":"narration","text":"Có ạ.\nTổng Giám đốc, đây không phải việc cô ấy có thể một mình…\nCứ làm vậy đi.\nTôi chấp thuận\nbằng quyền của tổng giám đốc.\n네 대표님 이게 고 상무 혼자 책임을… 그렇게 하세요 승인합니다, 대표 권한으로\nYes, sir.\nSir, this isn't something she can take--\nGo ahead then.\nI approve\nas the CEO.","sourceUid":"merged-mraq5d21-109","sourceNo":691},{"id":310,"readerNo":311,"displayNo":787,"n":787,"type":"narration","text":"[âm nhạc hồi hộp]\n[긴장되는 음악]\n[nervous music]","sourceUid":"ko-mr905eaf-1658","sourceNo":787},{"id":311,"readerNo":312,"displayNo":791,"n":791,"type":"narration","text":"Cảm ơn ngài.\nTôi xin phép đi trước.\nVậy tan họp nhé.\n감사합니다\n[아인] 먼저 나가 보겠습니다\n자, 그럼\nThank you, sir.\nPlease excuse me then.\nAll right then.","sourceUid":"merged-mraq76n3-110","sourceNo":791},{"id":312,"readerNo":313,"displayNo":793,"n":793,"type":"narration","text":"- [Phát nhạc êm dịu] - [Điện thoại di động rung]\n[Điện thoại di động rung liên tục]\n- [잔잔한 음악이 흘러나온다] - [휴대전화 진동음]\n[휴대전화 진동음이 연신 울린다]\n- [Calm music plays] - [Mobile phone vibrates]\n[Cell phone vibrates continuously]","sourceUid":"merged-mraq7ay8-111","sourceNo":793},{"id":313,"readerNo":314,"displayNo":802,"n":802,"type":"narration","text":"Nghe nào. GIÁM ĐỐC GO A IN \nVậy là cô thắng rồi.\nKhông phải thắng, tôi sống sót thôi.\nGiờ cô về luôn chứ?\nPhải.\n꺼, 꺼\n이기셨네요\n이긴 게 아니라 살아남은 거지\n퇴근하시는 거죠?\n[아인] 어\nPick it up.\nMANAGING DIRECTOR GO A-IN\nSo you won.\nNo, I managed to survive.\nAre you getting off work now?\nYes.","sourceUid":"merged-mraqa8x4-115","sourceNo":802},{"id":314,"readerNo":315,"displayNo":799,"n":799,"type":"narration","text":"[âm thanh rung của điện thoại di động]\n[Âm thanh thao tác của điện thoại di động]\n[nhạc nặng]\n[휴대전화 진동음]\n[휴대전화 조작음]\n[무거운 음악]\n[cell phone vibrating sound]\n[Mobile phone operation sound]\n[heavy music]","sourceUid":"merged-mraqfcqw-116","sourceNo":799},{"id":315,"readerNo":316,"displayNo":807,"n":807,"type":"narration","text":"Cô cứ xin nghỉ vài ngày cho thoải mái.\nBao giờ chết tôi sẽ nghỉ.\nChuẩn bị dự án Tập đoàn Woowon thôi.\nĐược rồi. Ngày mai gặp lại cô nhé.\n며칠 휴가 내고 푹 쉬세요 죽으면 쉬어야지 내일부터 우원그룹 준비하자\n네\n내일 뵙겠습니다\nYou should take a few days off and rest.\nI'll rest when I die.\nGet ready for the Woowon Group project.\nYes, ma'am. I'll see you tomorrow.","sourceUid":"merged-mraqgdsh-118","sourceNo":807},{"id":316,"readerNo":317,"displayNo":810,"n":810,"type":"narration","text":"- Anh nghĩ anh sẽ an toàn à? - Tôi không ngờ anh lại vậy. - Quá đáng thật đấy. - Để xem anh sống tốt đến mức nào.\n[차 부장] 한 부장 너는 무사할 거 같아?\n[은 부장] 한 부장님 그렇게 안 봤는데 너무한 거 아니에요?\n[차 부장] 고아인이랑 얼마나 잘 사는지 내가 두고 본다\n-You think you'll survive? -I didn't expect this from you.\n-This is too harsh. -I hope you live a good life with Go A-in.","sourceUid":"merged-mraqiui0-120","sourceNo":810},{"id":317,"readerNo":318,"displayNo":808,"n":808,"type":"narration","text":"- [điện thoại rung] - [thở dài]\n- [휴대전화 진동음] - [한숨]\n- [cell phone vibrates] - [sigh]","sourceUid":"ko-mr905eaf-1679","sourceNo":808},{"id":318,"readerNo":319,"displayNo":715,"n":715,"type":"narration","text":"Cô còn định đi xa tới đâu nữa?\nCô còn định chiến đấu đến bao giờ?\n[한숨 쉬며] 어디까지 가시려는 겁니까\n쯧, 언제까지 싸우시려는 거예요\nHow far are you taking this, Ms. Go?\nUntil when are you planning to fight?","sourceUid":"merged-mraqk5xz-121","sourceNo":715},{"id":319,"readerNo":320,"displayNo":717,"n":717,"type":"narration","text":"Sao?\nCháy mặt nhau bây giờ.\nMắt sắp bắn ra laser luôn rồi đó.\n[용호] 얼굴 탄다, 타\n눈에서 레이저 나오겠어\nSao?\nWhat?\nYou'll burn each other's faces.\nI can see lasers coming out of your eyes.","sourceUid":"merged-mraql6yo-122","sourceNo":717},{"id":320,"readerNo":321,"displayNo":819,"n":819,"type":"narration","text":"Trời ạ, thịt vẫn chưa chín hẳn này. Để con nướng thêm chút nữa nhé?\n하, 참\n[근철] 이야, 야, 야, 야 이 고기래 덜 익었어, 야\n아버님, 좀 더 익혀서 드릴까요?\nGosh, this meat is undercooked. Should I grill it more?","sourceUid":"merged-mraqnbu0-124","sourceNo":819},{"id":321,"readerNo":322,"displayNo":821,"n":821,"type":"narration","text":"Thế thì lại dai quá. Răng bố yếu lắm không nhai được nữa.\nÔng ơi, hay để cháu nhai hộ ông nhé?\n[근철] 아, 그럼 질겨서 못 먹디 이도 성치 않은데, 응? [한나] 할아버지 그럼 내가 씹어서 줄까?\nThen it'll be too tough to chew. My teeth aren't healthy anymore.\nGrandpa, you want me to chew it for you?","sourceUid":"merged-mraqwecm-126","sourceNo":821},{"id":322,"readerNo":323,"displayNo":823,"n":823,"type":"narration","text":"Thay vì vậy, cháu nên bỏ cái thói đay nghiến người khác trên mạng đi.\n씁, 너래 그 전화기로 SNS, 어?\n그걸로 사람들이나 씹지 말라우\nBefore that, you should stop chewing people out on social media.","sourceUid":"merged-mraqwnqh-127","sourceNo":823},{"id":323,"readerNo":324,"displayNo":826,"n":826,"type":"narration","text":"Ông tha thứ cho em ấy đi. Đó là sức hút của em ấy mà.\nDạo này em hay chơi gì vậy?\n[한수] 용서하세요 한나는 그런 게 매력이니까요 요즘 뭐 하고 놀아?\nPlease forgive her. It's part of her charm.\nWhat are you up to lately?","sourceUid":"merged-mraqxwo1-128","sourceNo":826},{"id":324,"readerNo":325,"displayNo":828,"n":828,"type":"narration","text":"Em đang chơi rất vui với bạn bè.\nEm không trả tiền cho bạn bè để họ chơi cùng em như anh.\n나야 친구들이랑 신나게 놀지\n오빠처럼 돈 받아야 놀아 주는 애들하고는 안 놀아 [웃음]\nI hang out with my friends and have fun.\nUnlike you, I don't pay my friends to hang out with me.","sourceUid":"merged-mraqz0vb-129","sourceNo":828},{"id":325,"readerNo":326,"displayNo":824,"n":824,"type":"narration","text":"- [Seojeong cười] - [Hannah]...\n- [서정이 풉 웃는다] - [한나] 씨…\n- [Seojeong laughs] - [Hannah]...","sourceUid":"ko-mr905eaf-1695","sourceNo":824},{"id":326,"readerNo":327,"displayNo":830,"n":830,"type":"narration","text":"Thật may vì em có nhiều bạn bè.\nCháu bận làm việc quá, không có thời gian gặp gỡ bạn bè luôn.\n다행이네, 친구 많아서\n[한수] 전 일만 하느라 친구 사귈 시간도 부족하네요\nI'm glad you have friends.\nI'm so busy with work that I don't have time to make friends.","sourceUid":"merged-mrar0hfl-130","sourceNo":830},{"id":327,"readerNo":328,"displayNo":833,"n":833,"type":"narration","text":"Anh không thiếu thời gian, mà thiếu nhân cách nên mới không có bạn.\nNày, cậu có bỏ cái thói ăn nói hỗn…\n[한나] 시간이 아니라 인성이 부족해서\n- [흥미로운 음악] - 친구가 없는 거겠지?\n[서정] 야, 강한나 너 말 자꾸 개같…\nYou lack character, not time.\nHey, stop talking like a little--","sourceUid":"merged-mrar17nk-131","sourceNo":833},{"id":328,"readerNo":329,"displayNo":836,"n":836,"type":"narration","text":"Ôi, con xin lỗi.\nTôi không có gì phải bận tâm đến chuyện hai đứa nhỏ kết hôn.\n- [서정] 죄송합니다 - [우원의 웃음]\n[우원] 아, 이거\n결혼할 당사자 사이는 걱정이 안 되는데\nI apologize.\nI'm not worried about these two getting married.","sourceUid":"merged-mrar2rmm-132","sourceNo":836},{"id":329,"readerNo":330,"displayNo":841,"n":841,"type":"narration","text":"Nhưng với sui gia thì hơi đáng ngại đó.\nHai đứa nó học cùng cấp một và cấp hai mà.\n- Chung cả trường đại học nữa nhỉ? - Khác đấy ạ.\nMay là tụi cháu được chọn trường đại học.\n이 시누이 사이가 걱정이 됩니다\n초중고 동창이었잖습니까\n[용호] 씁, 대학도 같은 데인가?\n대학은 다른데\n대학이야 원하는 데로 골라서 가니까요\nBut I'm quite worried about the in-law.\nThey went to the same primary and secondary school.\n-Was it also the same university? -No, different ones.\nThankfully, we get to choose universities.","sourceUid":"merged-mrar4lue-134","sourceNo":841},{"id":330,"readerNo":331,"displayNo":734,"n":734,"type":"narration","text":"Cậu đâu có được chọn. Điểm thấp quá mà.\nCòn cậu thì sao?\nThôi nào, hai đứa.\nTụi nó quen nhau, lại còn giống nhau nên mới cãi nhau được.\nCứ cãi nhau tiếp đi.\n네가 원하는 데로 갔냐? 점수 맞춰 갔지\n씨, 그러는 너는\n- [용호] 씁, 어허, 좀 - [근철의 말리는 소리]\n[근철] 아니까 싸우지 급이 맞으니까 싸우고\n계속 싸우라우\nYou didn't get to choose. You had poor grades.\nWhat about you?\nEnough.\nThey squabble because they know each other and are similar.\nKeep the argument going.","sourceUid":"merged-mrar7266-137","sourceNo":734},{"id":331,"readerNo":332,"displayNo":741,"n":741,"type":"narration","text":"Bên nào thắng là ông bênh.\nCháu đích tôn.\nVâng?\nCháu ăn nhiều vào mà chiến đấu.\nVâng ạ.\nKhi nào chúng ta nên tổ chức hôn lễ?\n이기는 편 우리 편이야\n장손\n네\n많이 먹어, 싸우려면\n[용호] 결혼식은 언제로 잡을까요?\nI'll be on the winner's team.\nHan-su.\nYes?\nYou should eat up for the fight.\nYes, sir.\nWhen should they get married?","sourceUid":"merged-mrar8ev0-139","sourceNo":741},{"id":332,"readerNo":333,"displayNo":848,"n":848,"type":"narration","text":"[Mọi người cười]\n[사람들의 웃음]\n[People laughing]","sourceUid":"ko-mr905eaf-1719","sourceNo":848},{"id":333,"readerNo":334,"displayNo":858,"n":858,"type":"narration","text":"Càng sớm càng tốt.\nTôi đồng ý.\nVới số cổ phần ông nắm giữ ở công ty tôi,\nmong ông sẽ hỗ trợ tôi.\nCòn số cổ phần ông nắm giữ ở công ty tôi,\nông cũng hãy hỗ trợ tôi nhé.\nTất nhiên rồi.\n[우원] 아, 빨리 합쳐야죠\n[용호] 그렇죠?\n우원 회장님이 가진 저희 회사 지분으로\n제 편에 서 주시고\n강 회장님이 가지신 저희 회사 지분으로\n제 편에 서 주시면\n- 아, 예 [웃음] - [우원의 웃음]\nAs soon as possible. I agree. With the shares you hold in our company, you can support me. And with the shares you hold in our company, you can support me as well. Of course.","sourceUid":"merged-mrargszf-145","sourceNo":858},{"id":334,"readerNo":335,"displayNo":861,"n":861,"type":"narration","text":"Có nhiều người cản trở việc vận hành công ty của tôi quá.\n[용호] 아, 자꾸 이 경영에 간섭하는 것들이 많아서\nThere are so many people that hinder me from running the company.","sourceUid":"merged-mrargomm-144","sourceNo":861},{"id":335,"readerNo":336,"displayNo":866,"n":866,"type":"narration","text":"Thưa Chủ tịch.\nSao?\nỞ đây sao?\nLỆNH BẮT GIỮ\nÔng đã vi phạm Luật Giao dịch Ngoại hối.\n[비서] 회장님\n뭐?\n여기로?\n[김 검사] 외국환 거래법 위반으로 영장 발부됐습니다\nSir.\nWhat?\nHere?\nARREST WARRANT\nYou have violated the Foreign Exchange Transactions Act.","sourceUid":"merged-mrari55h-146","sourceNo":866},{"id":336,"readerNo":337,"displayNo":863,"n":863,"type":"narration","text":"[âm nhạc đen tối]\n[어두운 음악]\n[dark music]","sourceUid":"ko-mr905eaf-1734","sourceNo":863},{"id":337,"readerNo":338,"displayNo":869,"n":869,"type":"narration","text":"Mời ông đi theo chúng tôi.\nCác anh có nhất định phải đến vào giờ này,\nvà đến tận đây không?\n같이 가시죠\n[우원] 굳이 이 시간에\n여기로 왔다?\nPlease come with us.\nDid you have to come at this hour\nto this place?","sourceUid":"merged-mrarki2o-147","sourceNo":869},{"id":338,"readerNo":339,"displayNo":761,"n":761,"type":"narration","text":"Các anh đang cố làm bẽ mặt tôi đấy à?\nThực thi công vụ\nthì đâu bị giới hạn giờ giấc và địa điểm.\nTôi nghĩ tạm thời ông nên đi, Chủ tịch.\n대놓고 망신 주겠다 이거야?\n공무 집행에 시간과 장소가 따로 있습니까?\n일단은 가셔야 될 거 같습니다 회장님\nAre you trying to humiliate me?\nCarrying out an official duty\nisn't constrained by time and place.\nI think you should go for now, sir.","sourceUid":"merged-mrarlzva-149","sourceNo":761},{"id":339,"readerNo":340,"displayNo":875,"n":875,"type":"narration","text":"Tôi xin lỗi vì đã gây ồn ào.\nChắc ông sẽ vất vả lắm đây.\nChúng tôi cũng sẽ giúp bằng mọi giá.\nCảm ơn ông.\n[우원] 시끄럽게 해서 죄송합니다\n골치 좀 썩으시겠네요\n[용호] 저희 쪽에서도 도울 일 있으면 돕겠습니다\nI'm sorry for all the commotion.\nThis must be hard for you.\nWe'll help however we can.\nThank you.","sourceUid":"merged-mraro5w6-151","sourceNo":875},{"id":340,"readerNo":341,"displayNo":774,"n":774,"type":"narration","text":"VĂN PHÒNG GIÁM ĐỐC DỰ ÁN","sourceUid":"vi-mr905aah-774","sourceNo":774},{"id":341,"readerNo":342,"displayNo":876,"n":876,"type":"narration","text":"Anh định thế nào đây?\n[임원1] 어쩌실 거예요?\nWhat will you do?","sourceUid":"merged-mrarot3h-152","sourceNo":876},{"id":342,"readerNo":343,"displayNo":879,"n":879,"type":"narration","text":"Anh biết Giám đốc Go vốn không dễ khuất phục mà.\nTrời ạ, tôi xấu hổ không dám nhìn mặt hậu bối luôn.\nSau này còn ai coi chúng ta là tiền bối nữa.\n[기호] 고 상무 원래 일 험하게 하는 거 아셨잖아요\n[임원2] 아, 이거 후배들 보기 부끄러워서\n[기호] 앞으로 누가 우리를 선배로 모시겠습니까?\nYou know Director Go isn't the type to back down.\nGosh, I'm too embarrassed to face my juniors.\nNo one will treat us as their seniors.","sourceUid":"merged-mrarr0pl-154","sourceNo":879},{"id":343,"readerNo":344,"displayNo":882,"n":882,"type":"narration","text":"Tôi cũng chả thể phản kháng vì cô ta nói đúng quá.\nTôi…\nsẽ xử lý việc này.\n[임원3] 맞는 말만 하니까 반대할 수도 없고, 참 [쓴웃음]\n제가\n해결하겠습니다\nI can't argue with her since she only states the facts.\nI will…\ntake care of it.","sourceUid":"merged-mrars0pr-156","sourceNo":882},{"id":344,"readerNo":345,"displayNo":887,"n":887,"type":"narration","text":"Với lại, sao các anh lại ngây thơ vậy?\nCác anh nghĩ Giám đốc Go làm vậy vì công ty sao?\nCô ta làm vậy để lôi kéo người về phe mình thôi.\n[창수] 그리고\n왜들 이렇게 순진들 하십니까?\n고 상무가 회사 위해서 저러는 거 같습니까?\n지 편 만들려고 저러는 거지\nAlso, why are you all so naive?\nYou think Director Go is doing that for the company?\nThis is her attempt to bring people to her side.","sourceUid":"merged-mrartau7-158","sourceNo":887},{"id":345,"readerNo":346,"displayNo":890,"n":890,"type":"narration","text":"Anh nói vậy là sao?\nCái đó gọi là \"chia để trị\".\nBắt đầu tạo phe cho riêng mình là vừa rồi.\n무슨 말씀이세요?\n디바이드 앤 룰 아닙니까\n[아인] 이제 슬슬 내 편 좀 만들어 볼까?\nWhat do you mean?\nIt's called \"divide and rule.\"\nIt's time to bring people onto my side.","sourceUid":"merged-mraruejn-159","sourceNo":890},{"id":346,"readerNo":347,"displayNo":892,"n":892,"type":"narration","text":"Cô ta đang cố chia rẽ và kéo một nửa nhân sự về phe mình.\nAnh biết rồi mà vẫn để việc này xảy ra sao?\n[창수] 내부에 대립을 만들어서\n절반은 확실하게 자기편을 만들겠다는\n그걸 아는 분이 일을 이렇게 만듭니까?\nShe's trying to divide them up and bring half of them onto her side.\nYou knew, but you still let this happen?","sourceUid":"merged-mrarvt46-161","sourceNo":892},{"id":347,"readerNo":348,"displayNo":897,"n":897,"type":"narration","text":"Mọi người ạ.\nSao các anh lại để một kẻ thấp kém như vậy lay động?\nGo A In\nsẽ sớm bị đuổi đi thôi.\n[창수] 여러분 왜 근본도 없는 애한테 휘둘리십니까? 고아인 곧 사그라집니다\nEveryone.\nWhy do you let some lowlife whip you like that?\nGo A In\nGo A-in\nwill be gone soon.","sourceUid":"merged-mrarx759-163","sourceNo":897},{"id":348,"readerNo":349,"displayNo":894,"n":894,"type":"narration","text":"[Tiếng cốc nước được đặt xuống]\n[잔을 탁 내려놓는 소리]\n[Sound of a glass being set down]","sourceUid":"ko-mr905eaf-1765","sourceNo":894},{"id":349,"readerNo":350,"displayNo":899,"n":899,"type":"narration","text":"Các anh nghĩ\ntôi không làm được chừng đó sao?\n제가\n그 정도도 못 할 거 같으세요?\nDo you think\nI'm incapable of making that happen?","sourceUid":"merged-mrarxzv9-164","sourceNo":899},{"id":350,"readerNo":351,"displayNo":903,"n":903,"type":"narration","text":"Vậy chúng tôi sẽ đặt niềm tin vào anh.\nAnh hãy xử lý cô ta đi.\nTóm lại,\ntôi thay mặt cô ta xin lỗi\nvì đã khiến các anh phải lo lắng.\n그럼 저희는 상무님만 믿겠습니다\n잘 해결해 주세요\n[창수] 어쨌든 심려 끼쳐 드린 점\n제가 대신 사과드리겠습니다\nThen we will put our trust in you. Please take care of her. Anyway, I apologize for any concern that was caused.","sourceUid":"merged-mrarza9b-166","sourceNo":903},{"id":351,"readerNo":352,"displayNo":904,"n":904,"type":"narration","text":"[Tiếng cửa từ từ mở]\n[스르륵 문 열리는 소리]\n[Sound of the door slowly opening]","sourceUid":"ko-mr905eaf-1775","sourceNo":904},{"id":352,"readerNo":353,"displayNo":794,"n":794,"type":"narration","text":"Chết tiệt. Mình ghét nhất là phải xử lý mấy vụ rắc rối thế này.\nCòn vụ này biết giải quyết sao đây?\n[창수] 아이씨\n가시 많은 생선 딱 질색인데\n아, 이걸 또 어떻게 발라야 하나\nDarn it.\nI hate dealing with a troublesome situation like this.\nHow should I take care of this now?","sourceUid":"merged-mras268e-168","sourceNo":794},{"id":353,"readerNo":354,"displayNo":905,"n":905,"type":"narration","text":"- [Tiếng đóng sầm cửa] - [Nhạc tối]\n- [문 탁 닫히는 소리] - [어두운 음악]\n- [Sound of door slamming] - [Dark music]","sourceUid":"ko-mr905eaf-1776","sourceNo":905},{"id":354,"readerNo":355,"displayNo":798,"n":798,"type":"narration","text":"Giám đốc có ở đây không?\nChị ấy vừa về rồi ạ.\nNày anh…\nChị ấy bảo tôi nếu các anh chị đến thì mời nhìn sang bên kia.\n상무님 계십니까? 방금 퇴근하셨는데 저기… 부장님들 오시면 저거 보시라고 하셨는데\nIs Ms. Go here?\nShe got off work just now.\nWell…\nShe told me to tell you guys that you should look over there.","sourceUid":"merged-mras4pe9-170","sourceNo":798},{"id":355,"readerNo":356,"displayNo":916,"n":916,"type":"narration","text":"[Quản lý thở dài]\n[âm nhạc hồi hộp]\n[부장들의 한숨]\n[긴장되는 음악]\n[The managers sigh]\n[nervous music]","sourceUid":"merged-mras4uit-171","sourceNo":916},{"id":356,"readerNo":357,"displayNo":920,"n":920,"type":"narration","text":"Ảo diệu thật đấy.\nNhững người phải chờ đợi hay nghĩ về điểm yếu của kẻ bắt họ đợi.\n[차 부장] 꼴 같지도 않네, 진짜 [아인] '기다리는 사람은' '기다리게 하는 사람의 단점을 생각한다'\nSeriously?\nThose who wait think about the faults of those that made them wait.","sourceUid":"merged-mras82c6-172","sourceNo":920},{"id":357,"readerNo":358,"displayNo":917,"n":917,"type":"narration","text":"[Quản lý cười]\n[부장들의 헛웃음]\n[Managers laugh]","sourceUid":"ko-mr905eaf-1788","sourceNo":917},{"id":358,"readerNo":359,"displayNo":924,"n":924,"type":"narration","text":"Tôi đã chờ rất lâu để xem các vị chứng tỏ bản thân.\nNhưng tôi chỉ thấy mỗi điểm yếu.\nTạm biệt.\n실력 보여 주길 한참이나 기다렸는데\n단점만 봤네요\n굿바이\nI've waited a long time for you to prove yourself. But I only saw the faults.","sourceUid":"merged-mrasagvm-173","sourceNo":924},{"id":359,"readerNo":360,"displayNo":808,"n":808,"type":"narration","text":"Giám đốc Choi.\nCô ta vừa tan làm rồi.\nNHỮNG NGƯỜI PHẢI CHỜ ĐỢI HAY NGHĨ VỀ ĐIỂM YẾU CỦA KẺ BẮT HỌ ĐỢI\nNội dung hay đấy.\nĐể tôi\nđi xác minh nội dung này đã.\n상무님\n[차 부장] 방금 퇴근했답니다\n카피 좋네\n요 카피 컨펌 좀 해 주고 올게\nMr. Choi.\nShe just got off work.\nTHOSE WHO WAIT THINK ABOUT THE FAULTS OF THOSE THAT MADE THEM WAIT.\nWhat a good copy.\nLet me\nget this copy confirmed.","sourceUid":"merged-mrasdo9h-175","sourceNo":808},{"id":360,"readerNo":361,"displayNo":929,"n":929,"type":"narration","text":"Giám đốc Go, cô tan làm đấy à?\n[창수] 고 상무, 퇴근해?\nGoing home?","sourceUid":"merged-mrasep5y-176","sourceNo":929},{"id":361,"readerNo":362,"displayNo":928,"n":928,"type":"narration","text":"[Âm thanh vận hành điều khiển từ xa của ô tô]\n[자동차 리모컨 조작음]\n[Car remote control operation sound]","sourceUid":"ko-mr905eaf-1799","sourceNo":928},{"id":362,"readerNo":363,"displayNo":934,"n":934,"type":"narration","text":"Cô đang đùa tôi đấy à?\nMuốn chế giễu tôi sao?\nAnh kích động quá.\nKhi bị kích động, con người rất dễ mắc sai lầm.\n장난하냐?\n놀리는 거야?\n[아인] 흥분하셨네요\n사람은 흥분하면 실수하니까\nAre you kidding me?\nYou think this is funny?\nYou're worked up.\nWhen people get worked up, they make mistakes.","sourceUid":"merged-mrasi7ie-178","sourceNo":934},{"id":363,"readerNo":364,"displayNo":937,"n":937,"type":"narration","text":"Khi nào anh bình tĩnh lại, chúng ta nói chuyện sau nhé?\nKhi bị kích động, con người rất dễ mắc sai lầm.\nKhi nào cô bình tĩnh lại, chúng ta sẽ nói chuyện sau.\n흥분 가라앉으면 그때 다시 얘기하실까요?\n[창수] 사람은 흥분하면 실수해\n흥분 가라앉으면 그때 다시 얘기하자\nShould we talk again when you have calmed down?\nWhen people get worked up, they make mistakes.\nLet's talk again when you have calmed down.","sourceUid":"merged-mraskjsi-179","sourceNo":937},{"id":364,"readerNo":365,"displayNo":819,"n":819,"type":"narration","text":"Cô muốn đối đầu?\nMuốn khiêu chiến tôi sao?\nKhông ngờ có ngày anh để lộ cảm xúc ở công ty.\n[창수] 막가자는 거야?\n한번 해보자는 거냐고\n상무님이 회사에서 얼굴 붉히실 때도 있네요?\nSo you want to play?\nAre you starting a fight with me?\nI never knew you'd show your emotions at work.","sourceUid":"merged-mrasllqb-181","sourceNo":819},{"id":365,"readerNo":366,"displayNo":830,"n":830,"type":"narration","text":"Tôi quyết định sẽ làm vậy với cô.\nĐược thôi, anh cố lên nhé.\nCô…\nPhải rồi.\n너한텐 그러기로 했어\n네, 파이팅 하세요\n[창수] 아이씨…\n[아인] 아, 맞다\nI decided that I would to you.\nSure, good luck with that.\nYou…\nThat's right.","sourceUid":"merged-mrasnkqe-182","sourceNo":830},{"id":366,"readerNo":367,"displayNo":948,"n":948,"type":"narration","text":"Phải làm sao đây?\nTôi đã cố bắt kịp anh,\nnhưng tôi không tự đào hố chôn mình…\n어떡하지?\n상무님 따라가려다 보니까\n이 예쁜 다리 사이에 달린 가랑이가 아니라\nThis is bad.\nI tried to keep up with you, Mr. Choi,\nand I didn't end up digging my own grave…","sourceUid":"merged-mrasopri-183","sourceNo":948},{"id":367,"readerNo":368,"displayNo":951,"n":951,"type":"narration","text":"mà chỉ làm đứt tay thôi.\nĐáng tiếc quá.\nTrên bàn tay xinh đẹp này sẽ có sẹo.\n손이 찢어졌네요?\n어떡하지?\n이 예쁜 손바닥에 흉터가 남았는데\nbut I cut my hand instead.\nWhat a shame.\nMy beautiful hand is going to have a scar.","sourceUid":"merged-mraspsht-184","sourceNo":951},{"id":368,"readerNo":369,"displayNo":954,"n":954,"type":"narration","text":"Thì bôi thuốc vào.\nVết thương có thể sẽ nhanh lành,\nnhưng sẽ cần nhiều thời gian\n약 발라\n상처는 금방 아물지만\n흉터는 사라지려면 시간이 좀 걸리죠?\nApply ointment.\nA wound may heal quickly,\nbut for a scar to disappear,","sourceUid":"merged-mrasr86x-185","sourceNo":954},{"id":369,"readerNo":370,"displayNo":836,"n":836,"type":"narration","text":"để vết sẹo biến mất. Chắc cũng phải… cỡ một năm? Tôi sẽ phải ngắm vết sẹo gớm ghiếc này mỗi ngày.\nKhông lâu đến vậy đâu.\n한 1년쯤?\n[아인] 그때까지 이 끔찍한 걸 매일 보고 살아야겠네\n그렇게나 오래 걸리겠어?\nit takes quite a while.\nMaybe…\nabout a year?\nI'll have to look at this hideous scar until then.\nIt won't take that long.","sourceUid":"merged-mrastmv8-188","sourceNo":836},{"id":370,"readerNo":371,"displayNo":956,"n":956,"type":"narration","text":"[Âm nhạc ý nghĩa]\n[의미심장한 음악]\n[Meaningful music]","sourceUid":"ko-mr905eaf-1827","sourceNo":956},{"id":371,"readerNo":372,"displayNo":962,"n":962,"type":"narration","text":"Cô cứ quên luôn đi.\nLàm sao mà quên được?\nVì nhớ dai nên tôi mới có vị trí này.\n빨리 잊어\n잊혀지겠어요?\n머리 좋아서 여기까지 올라왔는데\nJust forget about it.\nIt's hard to forget.\nI made it this far because I don't forget.","sourceUid":"merged-mrasujkg-189","sourceNo":962},{"id":372,"readerNo":373,"displayNo":958,"n":958,"type":"narration","text":"[헛웃음]","sourceUid":"ko-mr905eaf-1829","sourceNo":958},{"id":373,"readerNo":374,"displayNo":965,"n":965,"type":"narration","text":"Khi trời nổi cơn bão,\nanh sẽ nhận ra sự khác biệt\ngiữa bông hoa trong nhà kính và hoa dại ven đường.\n비바람 불면 알게 돼요\n하우스에서 곱게 자란 꽃과\n길바닥에서 자란 들꽃의 차이를\nWhen there's a storm,\nyou realize the difference\nbetween a sheltered flower and a wildflower.","sourceUid":"merged-mrasvdfx-190","sourceNo":965},{"id":374,"readerNo":375,"displayNo":970,"n":970,"type":"narration","text":"Cái gì?\nAnh hãy đợi đi.\nTôi sẽ gửi cho anh một cơn bão\nđến khuấy đảo tinh thần nhu nhược của anh.\n- 뭐? - [아인] 기다리세요\n곱게 자란 그 멘털에\n비바람 몰아쳐 드릴 테니까\nWhat?\nYou'll see.\nI'll send a storm\ninto that feeble and spoiled mind of yours.","sourceUid":"merged-mraswpkt-191","sourceNo":970},{"id":375,"readerNo":376,"displayNo":969,"n":969,"type":"narration","text":"[Âm nhạc cảm xúc]\n[감성적인 음악]\n[Emotional music]","sourceUid":"ko-mr905eag-1840","sourceNo":969},{"id":376,"readerNo":377,"displayNo":974,"n":974,"type":"narration","text":"Họ nổi dậy rồi.\nĐây là bản kiến nghị sa thải cô.\nLá bài của tôi thế nào?\nKém cỏi không thể tả.\n[병수] 들고일어났습니다\n[우철] 상무님 해고 결의안입니다\n[창수] 어때? 내 카드가?\n[한나] 후지다, 진짜 후져\n[아인] 차원이 다른 사람에게 뒷정리시킬 거야\nThey're protesting.\nIt's a petition for your resignation.\nHow do you like my move?\nIt's so lousy.","sourceUid":"merged-mrasymc5-192","sourceNo":974},{"id":377,"readerNo":378,"displayNo":862,"n":862,"type":"narration","text":"Tôi sẽ khiến một người ở góc độ khác thu dọn việc này.\nĐừng xem thường Kang Han Na chỉ vì cô ta tỏ ra dễ gần.\nPhải chào đón cô ta thật nồng nhiệt.\nQuả bom hạt nhân này là sao?\nTuyệt đối không được.\nGiám đốc Choi có vẻ không biết…\nẢ điên đó…\n…một cơn bão lớn đến độ thổi bay được nhà kính\nsắp ập đến đây.\n[태완] 강한나 겉으로 실실거린다고 쉽게 보지 마\n[창수] 성대하게 환영해 드려야지\n[은정] 이 무슨 핵폭탄을…\n[병수] 절대 안 됩니다\n[아인] 최 상무님이 잘 모르시더라고\nI'm going to have someone on another level handle this.\nDon't take Han-na lightly because she's easygoing on the outside.\nWe should give her a warm welcome.\nWhat is this mess?\nYou can't do that.\nMr. Choi doesn't seem to know…\nThat crazy…\n…that there is a storm strong enough\nto blow a house away.","sourceUid":"merged-mrat1m31-193","sourceNo":862},{"id":378,"readerNo":379,"displayNo":861,"n":861,"type":"dialogue","text":"Biên dịch: Nguyễn Phương Hà\nSubtitle translation by: Jea-heon Chung","sourceUid":"merged-mrat1q5p-194","sourceNo":861},{"id":379,"readerNo":380,"displayNo":982,"n":982,"type":"dialogue","text":"[Changsu] Thật điên rồ…\n[Ain] Có những cơn mưa đủ thổi bay cả căn nhà\nPhụ đề: Choi In Jeong\n[창수] 저 미친…\n[아인] 하우스가 날아갈 정도의 비바람도 있다는 걸\n자막: 최인정\n[Changsu] That crazy…\n[Ain] There are rainstorms that are enough to blow the house away\nSubtitle: Choi In-jeong","sourceUid":"merged-mrat1xx1-195","sourceNo":982}],"types":{"0":"narration","1":"narration","2":"narration","3":"narration","4":"narration","5":"narration","6":"narration","7":"narration","8":"narration","9":"narration","10":"narration","11":"narration","12":"narration","13":"narra function render(){let q=($('q').value||'').toLowerCase(),h='';blocks.forEach((b,i)=>{if(q&&!b.text.toLowerCase().includes(q))return;let L=split(b.text),vr=vi[String(b.id)],kr=ko[String(b.id)];let time=(vr?`VI ${fmt(vr.start)}→${fmt(vr.end)}`:'No VI')+' · '+(kr?`KO ${fmt(kr.start)}→${fmt(kr.end)}`:'No KO');h+=`<div class="seg ${i===cur?'active':''}" onclick="cur=${i};render();side()"><div class="meta"><span>Cue #${label(b,i)}</span><span>${time}</span></div><div class="txt">${esc(b.text)}</div><div class="row" style="margin-top:8px"><button class="good" onclick="event.stopPropagation();cur=${i};playCurrent('vi')">VI Dub</button><button class="violet" onclick="event.stopPropagation();cur=${i};playCurrent('ko')">KO Live</button><button class="warn" onclick="event.stopPropagation();cur=${i};smart()">Smart</button></div></div>`});$('list').innerHTML=h;$('stat').textContent=blocks.length+' blocks · current Cue #'+label(blocks[cur]||{},cur)+(isIOS()?' · iPhone mode: dùng 1 audio engine':'');side()}
function side(){let L=split(blocks[cur]?.text||'');$('vip').textContent=L.vi;$('kop').textContent=L.ko}

function play(kind,i=cur,token=++tok){return new Promise(async res=>{let r=getRange(kind,i);if(!r)return res();try{let a=await prepareEngine(kind,r.start);let end=Number(r.end||0);let done=false;let cleanup=()=>{a.removeEventListener('timeupdate',check);a.removeEventListener('ended',ended);a.removeEventListener('error',errored)};let finish=()=>{if(done)return;done=true;cleanup();a.pause();res()};let check=()=>{if(done)return;if(token!==tok||!flow&&token!==tok)return finish();if(a.currentTime>=end-0.03)finish()};let ended=()=>finish();let errored=()=>finish();a.addEventListener('timeupdate',check);a.addEventListener('ended',ended,{once:true});a.addEventListener('error',errored,{once:true});setMsg(`Đang phát ${kind.toUpperCase()} Cue #${label(blocks[i]||{},i)} ${fmt(r.start)} → ${fmt(r.end)}`);try{await a.play();}catch(e){cleanup();if(isIOS()&&!unlocked){alert('iPhone cần unlock audio trước. Bấm Unlock iPhone Audio rồi thử lại.')}else{alert('Không phát được audio: '+(e&&e.message?e.message:e));}return res()}setTimeout(check,80)}catch(e){alert(e.message||e);res()}})}
function playCurrent(k){stopAll(false);tok++;play(k,cur,tok)}
function sequenceFor(mode){if(mode==='vi')return['vi'];if(mode==='ko')return['ko'];if(mode==='vi-ko-vi')return['vi','ko','vi'];return['vi','ko']}
async function smart(){let token=++tok;flow=true;if(isIOS()&&!unlocked){let ok=await unlockAudio(false);if(!ok){alert('Trên iPhone, hãy bấm Unlock iPhone Audio trước, sau đó bấm Smart Flow.');flow=false;return}}let mode=$('mode').value, seq=sequenceFor(mode);for(let i=cur;i<blocks.length&&token===tok&&flow;i++){cur=i;render();document.querySelector('.seg.active')?.scrollIntoView({block:'center'});for(const k of seq){if(token!==tok||!flow)break;await play(k,i,token)}}if(token===tok)setMsg('Smart Flow đã dừng/kết thúc')}
function stopAll(inc=true){if(inc)tok++;flow=false;via.pause();koa.pause();engine.pause();setMsg('Đã stop')}
function next(){cur=Math.min(blocks.length-1,cur+1);render()}function prev(){cur=Math.max(0,cur-1);render()}
$('viaf').onchange=e=>{let f=e.target.files[0];if(f){via.src=URL.createObjectURL(f);applyVisibleVolume('vi');if(!engine.src){engine.src=via.src;engineKind='vi';applyEngineVolume('vi')}unlocked=false;setMsg('Đã chọn VI audio. Nếu dùng iPhone, bấm Unlock.')}};
$('koaf').onchange=e=>{let f=e.target.files[0];if(f){koa.src=URL.createObjectURL(f);applyVisibleVolume('ko');unlocked=false;setMsg('Đã chọn KO audio. Nếu dùng iPhone, bấm Unlock.')}};
function tryAuto(){let vu=candidateUrls('vi')[0], ku=candidateUrls('ko')[0]; if(vu)via.src=vu; if(ku)koa.src=ku; applyVisibleVolume('vi');applyVisibleVolume('ko'); try{via.load();koa.load();}catch(e){} setMsg('Đã khai báo audio từ GitHub. Nếu iPhone chưa nghe, chờ vài giây rồi bấm Unlock/Smart Flow.')}initReaderVolumeControls();tryAuto();
(function addIphoneButtons(){let row=document.querySelector('.float .row');if(row){let b=document.createElement('button');b.textContent='Unlock iPhone Audio';b.className='warn';b.onclick=()=>unlockAudio(true);row.insertBefore(b,row.children[3]||null);let d=document.createElement('button');d.textContent='Audio paths';d.onclick=()=>showAudioPaths();row.appendChild(d);}})();
render();</script></body></html>
